body:
  text: 卷之二肩部第三凡二十六穴凡取肩部諸穴為三次取肩髃肩髎肩貞是一次也上肩端取巨骨秉風逾骨取天宗臑俞是二次也取肩井其後定天窖舉臂取曲垣肩外肩中是三次也而後取臑會肩貞肩部諸穴難分故今定此法肩井甲乙一名膊井資生肩上陷者中缺盆上大骨前甲乙大骨前一寸半以三指按取之當中指下陷者是聖濟前直乳中增注禁深刺聖濟孕婦禁刺類經按膊聖濟作髆陷者千金千金翼次注聖濟類經作陷解寶鑑作陷罅大骨肩上大骨也非胸前大骨一寸半資生類經聚英入門皆同不可必拘也肘後方曰兩肩小近頭凹處指捏之安令正得中穴耳千金曰卵偏大㿗病灸肩井在肩解臂接處龔廷賢萬病回春曰拿棍一條伸手主棍在地與肩一般高肩上有窩名肩井穴肩中俞甲乙肩胛內廉去脊二寸陷者中甲乙按胛舊作甲千金翼外臺明堂同古字通用今據千金訂之從易讀下皆效此入門作脾字誤金鑑作𩨹類經曰大椎旁二寸金鑑從之拘入門曰大杼旁二寸非矣就胛內廉而取之肩外俞甲乙肩胛上廉去脊三寸陷者中甲乙按類經云與大杼平似拘入門作去大杼旁三寸寶鑑從之並誤但可就胛上廉而取之大窖甲乙肩缺盆中毖骨之間陷者中甲乙一曰直肩井後一寸類經須缺盆陷處上有空起肉上聚英誤針陷處令人卒死聚英所引銅人今本無所見按資生作天上髎毖骨千金入門吳文炳大成作上毖骨千金翼外臺聖濟類經作上毖骨次注作上伏骨張介賓曰毖音祕肩髃向肩井缺盆中兩叉骨之際內間有祕伏之小骨此毖骨也作毖誤秉風甲乙挾天髎外肩上小髃骨後舉臂有空舉臂取之甲乙按天舊作人刊誤今訂之在字衍外臺在挾字上是也千金並翼方作肩上髃後外臺聖濟發揮作小髃後資生髃作髎字誤吳文炳作天髎髎肩上小顒後不可讀蓋錯置入門曰天宗前疑窖誤曲垣甲乙肩中央曲胛陷者中按之動脈應手甲乙按動脈應手千金以下諸書作應手痛外臺作按之痛應手央作尖字誤天宗甲乙肩解下三寸素問秉風后大骨下陷者中甲乙肩貞素問肩曲胛下兩骨解間肩髃後陷者中甲乙禁灸入門按解入門作罅通評虛實論云刺大骨之會各三次注曰大骨之會肩也謂肩貞穴在肩髃後骨解間巨骨素問肩端上行兩叉骨間陷者中甲乙一曰禁刺類經按明堂作肩端上兩行骨兩行二字倒置臑俞甲乙肩臑後大骨下胛上廉陷者中舉臂取之甲乙按氣府論云曲掖上骨空各一次注曰謂臑俞穴也臑大全作脅誤肩臑次注同千金並翼方外臺以下諸書作肩窖非矣金鑑云從肩貞上行肩端臑上肩骨下肩髃靈樞一名扁骨明堂一名中肩井一名扁肩類經一名肩尖外科樞要舉臂肩上陷者素問肩端兩骨間甲乙肩外頭近後以手按之有解宛宛中千金肩頭正中同上髆骨頭資生按素問髃骨之會各一次注曰肩髃穴也又曰雲門髃骨次注曰今中誥孔穴圖經無髃骨穴有肩髃刺熱論新校正曰驗今明堂中誥圖經不載髃骨穴尋其穴以瀉四肢之熱恐是肩髃穴醫門摘要曰上有巨骨後有秉風不可混無用之辨哉千金注曰外臺名扁骨肩窖甲乙肩端臑上斜舉臂取之甲乙肩端外陷入門肩髃後外廉岡本按外臺臑上之下有陷中二字斜作針誤入門曰臑會上非臑發揮作腨誤臑會甲乙一名臑窖甲乙一名臑交聚英臂前廉去肩頭三寸甲乙宛宛中資生按肩頭次注作肩端外臺臂作肩背腰部第四氣府論曰大椎以下至尻尾及旁十五穴至胝下凡二十一節脊椎法也骨度篇曰膂骨以下至尾骶二十一節長三尺上節長一寸四分分之一奇分在下故上七節至於膂骨九寸八分分之七凡取背部諸穴除脊骨者諸説紛紛按背俞篇曰胸頭注曰一本作背中大俞在杼骨端肺俞在三焦之間心俞在五焦之間膈俞在七焦之間肝俞在九焦之間脾俞在十一焦之間腎俞在十四焦之間皆挾脊相去三寸所則欲得而驗之按其處應在中而痛解乃其俞也灸之則可刺之則不可氣盛則瀉之虛則補之以火補者毋吹其火須自滅也以火瀉者疾吹其火傳甲乙作拊其艾須其火滅也甲乙經曰兩旁挾脊各一寸五分按量兩乳間去其半四寸有奇除兩旁各一寸五分余分一寸半有奇是脊骨之分也又素問云譩嘻在背下挾脊旁三寸所厭之令病者呼譩嘻譩嘻應手挾字旁字除骨而言也所者許也古人不必拘分寸以大概示之故云按之應在中而痛解或云譩嘻應手也神應經曰如背俞前賢書中皆云挾脊各寸半是共折三寸分兩旁取之殊不知言挾脊其挾字是除骨而言若帶脊骨當以兩旁各二寸共折四寸分兩旁此説雖得折為四寸者不是後世又用兩乳八寸之説度背腰故云去脊中二寸或一寸五分共不可從也張介賓遂驗魚骨就突處而定穴蓋原王叔權里醫之説妄矣凡節字取義於竹節故有骨節關節手指本節等語脊骨突處謂之節經曰節下間則突處下間是穴也且張氏取經文之節下間之語而作異説何矛盾之甚邪凡人之項骨有三名曰柱骨又曰天柱骨即頭莖也連脊共二十四節今人誤以項骨高者為大椎其弊依肘後方灸大椎在項上大節高起者外臺類經針灸大全等以平肩者為大椎香川太衝曰凡大椎以椎大為名若其骨不大何得謂大椎乎故稱一椎為極當今定以與肩齊為一椎雖椎小亦可也大小固非所拘設令一椎之上或一椎之下有椎特大者則雖在何處亦可稱大椎如是或有二十二椎或有二十椎而不應二十一椎之數矣唯是一椎而後次第等下而以平肩者為大椎者此膠柱之説也為費解香月牛庵卷懷食鏡曰先師玄益曰凡定大椎法令患人端坐正面動首頸則項骨共動取其不動為大椎甚易知故據此説使人頭俯項骨高起仰則不見是項骨第三節也其下乃大椎也下第七節八節之間第十四節十五節之間是俯仰屈折之處也從其處上行數之定大椎此亦一法也馬蒔曰大椎乃督脈經穴至腰俞共二十一椎其曰二十四椎者以項骨三椎不等也至尾骶穴亦不等今人灸大椎者但是項骨高起者見其骨高而大誤以為大椎而取之愚今除項骨三節則大椎又數為第一椎此説得之按脊椎二十一節古來通説亦無異論蓋是皮上隔肌肉摸索而命之也非剮剝視之數之而言之者陳明善洗冤録曰項與脊骨各十二節注曰自項至腰共二十四椎骨上有一大椎骨人身項骨五節背骨十九節合之得二十有四是項之大椎即在二十四骨之內此説與今之所見不符東洋先生臟志曰脊骨背面有鰭如魚其節十有七上細下巨如箏之狀此言一出而天下大疑之今驗之脊骨實十七節也隔皮膚而數之為二十一節者並腰髁骨也其骨比脊骨巨大內拘而為臀尻其窮處即所謂尾骶骨者是也其骨背有椎節形凡四於皮肉上摸之則與脊骨齊乃與十七節連數為二十一椎其椎節形旁宛陷處有孔通內面左右各四即八髎也古書曰第一空第二空者不誣洗冤録曰男女腰間各有一骨大如掌有八孔作四行樣者是也此骨男則圓女則平者所以護子宮受胎之地也今取腧穴則連數之為二十一椎處置諸穴而不為誤發揮注曰按腰髁即腰監骨人脊椎骨有二十一節自十六椎節而下為腰監骨挾脊附著之處其十七至二十凡四椎為腰監骨所掩附而入髎穴則挾脊第一二空云云也又按督脈當脊中起於長強在二十一椎下等而上之至第十六椎下為陽關穴其二十椎至十七椎皆無穴乃知為腰監骨所掩明矣此説誤謬不俟辨焉腰髁骨又名腰監骨又名腰尻骨八髎者即其空今以朽骨圖之內抅而為臀尻其窮處即尾骶骨金鑑曰尾閭一名骶端一名撅骨一名窮骨在肛門後其骨上端俗名膀骨又名尾摏背中行自第一椎下行至尾骶骨凡十四穴大椎素問一名百勞類經第一椎上陷者中甲乙宛宛中資生按甲乙經脫上字今據千金諸書補之明堂作下非靈樞本事方聖濟椎作顀同義千金翼曰第一椎名大杼無所不主挾左右一寸半或一寸二分此文有倒置入門大全作大杼蓋受其誤椎骨又名杼骨後人遂混稱大椎為大杼大全等大杼一名百勞不可從焉類經曰一云平肩説己見傷寒論曰大椎第一間蓋指陶道陶道甲乙大椎節下間俯而取之甲乙陷者中明堂按千金千金翼作下節間下皆同聚英醫統吳文炳等無節字非千金諸風篇與甲乙同身柱甲乙第三椎節下間俯而取之甲乙宛宛中明堂按和名塵氣以治塵氣名之梶原性全蝢醫抄曰塵氣發於肺臟是也村上良亢慈幼密旨載其候有四紅知利氣知利知利氣波美知利氣黃知利氣醫門摘要曰和俗謂之塵氣預灸則不生諸病病氣積於此而傷其身猶塵氣積柱下生濕氣而破家宅故即名此穴謂之塵氣釋西懸所著方書訓瘧為知利氣神道甲乙一名臟俞千金第五椎節下間俯而取之甲乙禁刺入門類經一説按千金曰治卒病惡風欲死及肉痹不知人灸第五椎名曰臟俞百五十壯多至三百壯便愈翼方肉痹下有乳癰二字靈臺次注第六椎節下間俯而取之次注禁刺入門按刺熱篇云六椎下間主脾熱是謂靈臺穴然其名甲乙千金外臺並不載資生以下皆載之程衍道外臺注引聖濟總録且云後人論注所增穴也按甲乙所載十一穴素問云督脈氣所發者二十八穴項中央二次注曰謂風府啞門二穴髮際後中八次注曰謂神庭上星囟會前頂百會後頂強間腦戶八穴面中三次注曰謂素窖水溝齦交三穴大椎以下至尻尾及旁十五穴次注以會陽而解及旁二字然會陽是雙穴也加之為十六穴其數不合經文蓋亡一穴也否則督脈氣所發者二十八穴者二十九穴之誤而十五穴則十六穴之誤歟至陽甲乙第七椎節下間俯而取之甲乙宛宛中明堂按刺熱篇云七椎下間主腎熱明堂作微俯而取之筋縮甲乙第九椎節下間俯而取之甲乙按入門作筋束字誤中樞次注第十椎節下間俯而取之次注按類經曰此穴諸書皆失之惟氣府論督脈下王氏注中有此穴及考之氣穴論曰背與心相控而痛所治天突與十椎者其穴即此按氣穴論曰天突與十椎及上紀次注曰按甲乙經經脈流注孔穴圖經當脊十椎下並無穴目恐是七椎又注氣府論曰中樞在第十椎節下間何其説矛盾乎與彼背俞注同王冰疏滷不足深責也馬蒔曰十椎下無穴當是大椎亦遺有中樞金鑑載此穴脊中甲乙一名神宗資生一名脊俞資生引明堂第十一椎節下間俯而取之甲乙禁灸甲乙禁刺入門按骨空論曰灸脊中説見陽關大全中作柱懸樞甲乙第十三椎節下間伏而取之甲乙按資生曰銅人云懸樞在十三椎節下間明堂上經作十二椎節間下經作十一椎下脊中穴既在十一椎下不應懸樞又在十一椎下固知其誤矣考之素問亦與銅人同當以銅人為正明堂上經亦誤三字作二字也要之接脊穴在十二椎節下爾接脊穴載奇穴部命門甲乙一名屬纍甲乙一名竹杖俗名第十四椎節下間伏而取之甲乙按千金曰胞落頺灸背脊當臍不稱穴名類經曰平臍用線牽而取之恐有差故不取又曰千金云腰痛不得動者令病千金作患人正立以竹杖千金無杖字拄地度至臍千金有斷竹二字乃取杖取杖千金作以度度背脊灸杖杖千金作竹上二字頭盡千金無盡字處此法舊出於肘後方而文有異同今閲千金方無竹杖字類經所引證者千金翼之文而腎俞之説也詳於腎俞條俗呼為竹杖穴者蓋同於類經洗冤録曰凡命門骨最屬虛怯以手擊之即可立斃因命門骨左右兩穴有紅筋若細絲通於兩內腎拍斷即死外無痕迹若有稱拍著命門處身死只檢驗命門骨紫赤者是也命門骨自尾蛆骨倒數上第七椎兩旁各有一小穴者是陽關次注第十六椎節下間坐而取之次注按甲乙千金外臺不載資生作伏而取之素問曰失枕在肩上橫骨間折使榆臂齊肘正灸脊中次注曰榆讀為搖搖謂搖動也然失枕非獨取肩上橫骨間乃當正形灸脊中也欲而驗之則使搖動其臂屈折其肘自項之下橫齊肘端當其中間則其處也是曰陽關在第十六椎節下間督脈氣所發按榆是揄誤腰俞甲乙一名背解一名髓空一名腰戶甲乙一名髓孔一名腰柱外臺一名髓俞大全一名髓府大成第二十一椎節下間甲乙宛宛中以腹挺地舒身兩手相重支額縱四體後乃取其穴資生按神應經作自大椎至此折三尺舒身以腹挺地聚英作挺身伏地舒身素問直解髓空為肩井者誤俞扁鵲傳作輸無異義長強靈樞一名窮骨一名骶上一名骨骶靈樞一名氣之陰郤甲乙一名龜尾肘後一名尾翠骨千翼一名龍虎穴一名曹溪路一名三分閭一名河車路一名朝天巔一名上天梯衛生寶鑑一名撅骨類經一名尾閭醫統一名氣郤大成尻骨下空素問脊骶端甲乙趺地取之資生骶骨端許三分聚英陷者中明堂按癲狂篇云灸窮骨二十壯窮骨骶骨也馬蒔曰長強也又云灸骨骶二十壯又刺骶上張注曰長強也今移入一名骨空論云脊骨下空在尻骨下空次注曰不應主療經闕其名新校正云按長強在脊骶端正在尻骨下王氏得非誤乎又曰灸撅骨次注曰尾窮謂之撅撅當作䕅字典曰䕅本作蒚音厥説文曰臀骨也明堂脊骶作脊骸誤尾翠骨上三寸骨陷間不合諸説聚英大成趺作伏是也背第二行自第一椎兩旁挾脊各一寸半下行至骶骨下及八髎凡四十四穴按內經曰大椎上兩旁各一凡二穴王冰曰未詳何俞新校正曰按大椎上旁無穴張介賓曰今於大椎上旁按之甚痠當有穴意者甲乙經等猶有未盡吳昆曰當是天柱二穴在挾項後髮際大筋外廉陷中者馬蒔曰大椎乃督脈經穴至腰俞共二十一椎其曰二十四椎者以項骨三椎不算也至尾骶穴亦不算今人灸大椎者俱是項骨高起者見其骨高而大誤以為大椎而取之愚今除項骨三節則大椎又數為第一椎其兩旁即大杼穴乃足太陽膀胱經穴名也新校正以為大椎旁無穴意者亦若今人以項之高骨為大椎耳此説不是以王張為穩當千金曰治百種風灸腦後大椎平處兩廂量二寸三分須取病人指寸量兩廂各灸百壯得瘥是不説穴名蓋大椎上兩旁也分寸稍異大杼素問項第一椎下兩旁各一寸五分陷者中甲乙正坐而取之類經禁灸資生按類經金鑑每穴作去脊中二寸説既見千金類經作項後入門作第一節外下諸穴皆作幾節外王冰注氣府論刺瘧篇以背俞為大杼穴又注水熱穴論為風門熱府又注刺熱論為未詳又注舉痛論為心俞令讀者範然刺熱論新校正曰王注水熱穴論以風門熱府為背俞又注氣穴論以大杼為背俞此注云未詳蓋疑之素問直解曰背俞指肺俞非也骨空論曰視背俞陷者灸之是似泛指背部俞穴與形志篇曰欲知背俞云云同水熱穴論曰大杼膺俞缺盆背俞此八者以瀉胸中之熱也由是觀之為大杼者蓋非也背俞必有所指舉痛論曰寒氣客於背俞之脈則血脈泣脈泣則血虛血虛則痛其俞注於心其為心俞者為有所據千金翼曰第一椎名大杼無所不主挾左右一寸半或二寸二分蓋斯文錯置大全曰大杼一名百勞説見大椎下難經云骨會大杼似指大椎風門熱府甲乙第二椎下兩旁各一寸五分甲乙陷者中明堂正坐取之大成按千金外臺以下諸書皆分熱府以為一名只千金翼同甲乙今從古説肺俞素問三焦之間素問第三椎下兩旁各一寸五分甲乙按氣穴論云中呂兩旁各五凡十穴次注曰謂五臟之背俞也千金曰對乳引繩度之此捷法也資生曰甄權針經云以搭手左取右右取左當中指末是穴今試度之共不當其穴不可從神應經肺俞膈俞肝俞腎俞共作二寸説己見闕俞千金一名厥陰俞千金第四椎下兩旁各一寸五分千金正坐取之類經按此穴千金肺臟篇引扁鵲心俞素問一名背俞次注五焦之間素問第五椎下兩旁各一寸五分甲乙陷者中明堂正坐取之類經禁灸甲乙禁刺入門按千金諸風篇一云第七節對心橫三間寸非也又治不能食胸中滿膈上逆氣悶熱灸心俞二七壯小兒減之千金翼曰心煩短氣灸心俞百壯針入三分膈俞素問七焦之間素問第七椎下兩旁各一寸五分甲乙陷者中明堂正坐取之類經按難經曰血會膈俞肝俞素問九焦之間素問第九椎下兩旁各一寸五分甲乙陷者中明堂正坐取之類經按千金一云九椎節脊中非矣形志篇云欲知背俞先度其兩乳間中折之更以他草度去半已即以兩隅相拄也乃舉以度其背令其一隅居上齊脊大椎兩隅在下當其下隅者肺之俞也復下一度左角肝之俞也右角脾之俞也復下一度腎之俞也是謂五臟之俞灸刺之度也肝脾二俞果是異説可見素問者各家之説而不出一人之手也膽俞脈經第十椎下兩旁各一寸五分正坐取之甲乙陷者中明堂按氣府論云六腑之俞各六痹論云六腑亦各有俞金鑑作第九椎下而無肝俞蓋脫簡脾俞素問十一焦之間素問第十一椎下兩旁各一寸五分甲乙陷者中明堂按千金賊風篇曰凡人脾俞無定所隨四季月應病即灸臟俞是脾穴當時蓋有此説而行殆墮穿鑿胃俞脈經第十二椎下兩旁各一寸五分甲乙宛宛中明堂正坐取之類經三焦俞甲乙第十三椎下兩旁各一寸五分甲乙正坐取之陷者中明堂腎俞素問一名高蓋大成第十四椎下兩旁各一寸五分甲乙陷者中明堂正坐取之類經按通評虛實論云少陰俞去脊椎三寸旁次注曰謂足少陰腎俞也千金翼曰對臍當脊兩邊相去一寸五分名腎俞本事方曰與臍平此捷法也千金翼又曰腎俞主五臟虛勞少腹弦急脹熱灸五十壯老小損之若虛冷可至百壯橫三間寸灸之腰痛不得動者令病人正立以竹杖拄地度至臍取杖度背脊灸杖頭隨年壯良灸訖藏竹杖勿令人得之丈夫痔下血脫肛不食長泄痢婦人崩中去血帶下淋露去赤白雜汁皆灸之此挾兩旁各一寸橫三間寸灸之又諸書載杖子至臍中截斷卻回杖於背上當脊骨中杖盡處即是十四椎命門穴也用稗心取同身寸三寸折作一寸五分兩頭是腎腧穴也皆不取大腸俞脈經第十六椎下兩旁各一寸五分甲乙伏而取之類經按脈經曰在第十六椎闕其詳小腸俞脈經第十八椎下兩旁各一寸五分甲乙伏而取之類經按難經本義云謝氏曰在十六椎下兩旁各一寸五分非也膀胱俞脈經第十九椎下兩旁各一寸五分甲乙陷者中明堂伏而取之類經中膂俞甲乙一名脊內俞資生第二十椎下兩旁各一寸五分挾脊胛而起甲乙伏而取之類經按膂次注作呂外臺以下諸書皆作中膂內俞或以為一名甲乙千金千金翼並無內字入門金鑑從之此編凡徵古典故不補內字脊胛而起外臺作脊起肉次注作脊呂胂起肉胛當作胂胛是肩甲也不與此穴關涉蓋傳寫之誤膂音呂與呂通膂謂脊側肉也胂肑也胂謂之蜸蜸背側之肉也起者言背側肉逼臀肉復起者也人或疑起下脫肉字不審古義也聚英作脊伸字誤白環俞甲乙第二十一椎下兩旁各一寸五分伏而取之甲乙腹挺地端身兩手相重支額縱息令皮膚俱緩乃取其穴資生禁灸甲乙類經醫統灸三壯禁針灸入門上窖甲乙第一空腰髁下一寸挾脊陷者中甲乙按類經曰腰髁骨即十六椎下腰脊兩旁起骨之挾脊者次注曰餘三髎少斜下按之陷中是也入門曰上闊下狹類經曰十六椎者不是當十七椎次窖甲乙第二空挾脊陷者中甲乙中窖甲乙一名中空大成第三空挾脊陷者中甲乙下窖甲乙第四空挾脊陷者中甲乙按以上四穴謂之八髎素問曰八髎在腰尻分間是也又曰尻骨空在髀骨之後相去四寸次注曰是謂八髎穴也今按髀當作髁千金曰大小便不利灸八髎穴在腰目下三寸挾脊相去四寸兩邊各四穴計八穴故名八窖甲乙以八窖非脊中屬二行又言挾脊而自明不繫二行者蓋便覽者此穴驗枯骨則其空自明會陽甲乙一名利機甲乙陰尾骨兩旁甲乙骨外各開一寸半入門按陽入門作陰誤也機外臺作機陰尾舊作陰毛傳寫之誤據千金外臺而訂之發揮作尾髎骨髎是骶之誤金鑑作陰尾尻骨兩旁五分許背第三行自第二椎兩旁挾脊各三寸至二十一椎下凡二十八穴附分甲乙第二椎下附項內廉兩旁各三寸甲乙陷中入門正坐取之類經按氣府論云挾脊以下至尻尾二十一節十五間各一次注曰今中誥孔穴圖經所存者十三穴左右共二十六謂附分魄戶神堂譩嘻膈關魂門陽綱意舍胃倉肓門志室胞肓秩邊十三也類經金鑑作三寸半下皆同魄戶甲乙一名魂戶寶鑑第三椎下兩旁各三寸甲乙正坐取之上直附分次注宛宛中明堂按水熱穴論云五臟俞旁五此十者以瀉五臟之熱也次注曰俞旁五者謂魄戶神堂魂門意舍志室五穴膏肓俞千金第四椎下兩旁各三寸資生令人正坐曲脊伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂得動搖從胛骨上角摸索至胛骨下頭其間當有四肋三間灸中間依胛骨之裡肋間空去胛骨容側指許摩呂肉之表肋間空處按之自覺牽引胸戶中外臺作於肩中灸兩胛中各一處若病人已困不能正坐當令側臥挽上臂令前求取穴灸之也求穴大較以右手從右千翼作左肩肩上拄指頭表所不及者是也左手亦然乃以前法灸之若不能久正坐當伸兩臂者亦可伏衣袱上伸兩臂令人挽兩胛骨使相離不爾胛骨覆穴不可得也其穴近第五椎相準望取之千金按千金翼外臺胛作甲古字通用神應經作第五椎下兩旁各三寸半大全作四柱下三分並非大成曰人年二旬後方可灸此二穴又按此穴古書不載千金始有此名蓋原左傳醫緩之語杜預曰心上膈下不可屬肩背也腹中論曰肓之原出於臍下九針十二原篇曰膏之原出於鳩尾肓之原出於悖胦膏肓之字既見於此而悖胦者氣海也謝士泰刪繁方説其病形全依左傳而為説者也以非經穴之事故不録於此千金及翼方系奇穴不屬太陽經今時人間習熟以肺俞呼狹肓呼膏肓為廣肓故今舉於此云神堂甲乙第五椎下兩旁各三寸陷者中甲乙正坐取之明堂按次注曰上直魄戶甲乙無膏肓穴素問曰挾脊以下至尻尾二十一節十五間各一次注曰今中誥孔穴圖經所存者十三穴王亦不記膏肓故不言上直膏肓而言直魄戶張介賓以大杼列於此行曰近世有膏肓一穴亦合十五穴然此穴自晉以前所未言而原數則左右共二十八穴也非矣今加膏肓為十四穴不可考者一穴也譩嘻素問背下挾脊旁三寸所厭之令病者呼譩嘻譩嘻應手素問肩髆內廉挾第六椎下兩旁各三寸甲乙上直神堂次注陷者中明堂正坐取之資生按刺瘧篇曰五胠俞各一適肥瘦出其血也王冰曰五胠俞謂譩嘻吳昆以為魄戶神堂譩嘻膈關魂門之五穴張介賓曰胠脅也一曰旁開也水熱穴論云五臟俞旁各五以瀉五臟之熱即此謂也蓋此五者乃五臟俞旁之穴以其旁開近脅故曰旁五胠俞即魄戶神堂魂門意舍志室也應手入門作指下動原骨空論注也膈關甲乙第七椎下兩旁各三寸陷者中正坐開肩取之甲乙上直譩嘻次注按膈次注聚英醫統作鬲外臺發揮開作闊魂門甲乙第九椎下兩旁各三寸陷者中正坐取之甲乙上直鬲關次注按千金注及聚英吳文炳大成引外臺云作魂門十椎下陽綱十一椎下意舍九椎下今本與甲乙同大全作膈關七柱八魂門非也陽綱甲乙第十椎下兩旁各三寸陷者中正坐取之甲乙上直魂門次注按綱明堂作搰入門作剛正字通搰剛字之訛資生聚英醫統曰闊肩取之明堂曰微俯而取之似無謂意舍甲乙第十一椎下兩旁各三寸陷者中甲乙正坐取之上直陽綱次注按明堂作第九椎下闊肩取之非矣胃倉甲乙第十二椎下兩旁各三寸陷者中甲乙上直意舍次注正坐取之類經按金鑑作十椎脫二之字肓門甲乙第十三椎下兩旁各三寸入肋間甲乙上直胃倉次注陷中類經按肓金鑑作育誤入門載痞根穴蓋指此穴詳於奇穴部資生曰經云與鳩尾相直未詳為何經千金並翼方次注無入肋字外臺以下諸書作叉肋甲乙本作入肘肓門不可入肘又無叉肋甲乙肘字肋之誤諸書叉字入之誤故改作入肋志室甲乙一名精宮大成第十四椎下兩旁各三寸陷者中正坐取之甲乙上直肓門次注按室入門作堂誤明堂作三寸半微俯而取之非胞肓甲乙第十九椎下兩旁各三寸陷者中伏而取之甲乙上直志室次注秩邊甲乙第二十一椎下兩旁各三寸陷者中伏而取之甲乙上直胞肓次注按資生髮揮入門聚英大全醫統吳文炳寶鑑外臺程敬通注一説大成並作二十椎下
