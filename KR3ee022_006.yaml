body:
  text: 卷之六經脈流注第十素問云夫人之常數太陽常多血少氣少陽常少血多氣陽明常多氣少血少陰常少血多氣厥陰常多血少氣太陰常多氣少血此天之天恐人字常數新校正云甲乙經十二經水篇血氣多少與素問不同太陽多血多氣太陰多血少氣足太陽與少陰為表裡少陽與厥陰為表裡陽明與太陰為表裡是為足陰陽也手太陽與少陰為表裡少陽與心主為表裡陽明與太陰為表裡是為手之陰陽也難經云經脈者行血氣通陰陽以榮於身者也其始從中焦注手太陰陽明陽明注足陽明太陰太陰注手少陰太陽太陽注足太陽少陰少陰注手心主少陽少陽注足少陽厥陰厥陰復還注手太陰醫種子曰足三陰經胸腹無脈銅人圖強為陰經者非也然人手之陰經自腋而出足之陰經自髀而入入者入於腹內故能屬臟絡府上膈挾咽連舌入腦非在皮膚肌肉之外者也注圖者惑於甲乙強膺俞胸俞衝脈之穴以為屬足三陰經脈氣所發十四經發揮尤為謬甚真千古之長夜矣遍考陰陽離合氣府氣穴經脈經別等篇深知所列之穴的非陰經故表而出之手太陰肺經左右凡二十二穴經脈篇云肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下雲門中府下循粗內天府俠白行少陰心主之前下肘中尺澤循臂內上骨下廉孔最入寸口經渠太淵上魚循魚際即魚際出大指之端少商其支者從腕後列缺直出次指內廉出其端又云手太陰之別名曰列缺起於腕上分間並太陰之經直入掌中散入於魚際取之去腕半寸馬蒔曰半寸當作寸半別走陽明經別篇云手太陰之正別入淵腋少陰之前入走肺散之大腸上出缺盆循喉嚨復合陽明繆刺論云邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角邪客篇云手太陰之脈出於大指之端內屈循白肉際至本節之後太淵留以淡外屈上於本節之下內屈與陰諸絡會於魚際數脈並注其氣滑利伏行壅骨之下外屈出於寸口而行上至於肘內廉入於大筋之下內屈上行臑陰入腋下內屈走肺此順行逆數之屈折也經筋篇云手太陰之筋起於大指之上循指上行結於魚後行寸口外側上循臂結肘中上臑內廉入腋下出缺盆結肩前髃上結缺盆下結胸裡散貫賁合賁下抵季脅中府手太陰之會氣穴論新校正曰手足太陰之會類經同雲門手太陰肺氣所發天府同上俠白手太陰之別尺澤手太陰之所入也孔最手太陰之郤列缺別走陽明經渠手太陰之所行太淵手太陰脈之所注魚際手太陰脈之所溜聖濟曰所流少商手太陰脈之所出按千金有臑會大腸經注曰銅人經屬三焦外臺無中府雲門二穴入脾經程衍道曰論行不論經也腧穴折衷曰諸家皆以為本經之穴始於中府標幽賦蠡海集錦囊祕録並曰本經之穴始於雲門今考其經行之勢則以雲門為始者是也手陽明大腸經左右凡四十二穴經脈篇云大腸手陽明之脈起於大指次指之端商陽循指上廉二間三間出合谷兩骨之間合谷上入兩骨之中陽溪循臂上廉偏歷溫溜下廉上廉三里入肘外廉曲池上臑外前廉肘髎五里臂臑臑會上肩出髃骨之前廉肩髃上出於柱骨之會上巨骨秉風下入缺盆天鼎絡肺下膈屬大腸其支者從缺盆上頸扶突貫頰入下齒中還出挾口地倉交人中左之右右之左禾髎上挾鼻孔迎香又云手陽明之別名曰偏歷去腕三寸別入太陰其別者上循臂乘肩髃上曲頰偏齒其別者入耳合於宗脈氣府論雲手陽明脈氣所發者二十二穴鼻空外廉項上各二次注謂迎香扶突二穴也大迎骨空各一大迎穴名也柱骨之會各一謂天鼎二穴也髃骨之會各一謂肩髃二穴也肘以下至手大指次指各六俞謂三里陽溪合谷三間二間商陽六穴也經別篇云手陽明之正從手循膺乳別於肩髃入柱骨下走大腸屬於肺上循喉嚨出缺盆合於陽明也經筋篇云手陽明之筋起於大指次指之端結於腕上循臂上結於肘外上臑結於髃其支者繞肩胛挾脊直者從肩髃上頸其支者上頰結於頄直者上出手太陽之前上左角絡頭下右頷商陽手陽明脈之所出二間所溜寶鑑作所流非三間所注合谷所過陽溪所行偏歷別走太陰溫溜郤下廉上廉抵陽之會外臺作陽明之會三里曲池所入肘髎五里臂臑陽明絡之會聚英作手足太陽陽維之會臑會絡氣府論云手少陽之會次注曰手陽明少陽二絡氣之會聚英曰陽維會肩髃蹺脈之會聚英曰足少陽陽蹺之會巨骨同上天鼎所發扶突同上禾髎同上迎香手足陽明之會氣府論曰手陽明脈氣所發次注曰謂迎香扶突按千金無臑會入肺經發揮同入三焦經外臺曰兩旁四十二穴並下三單穴共四十五穴無迎香入胃經有肩髎三焦兌端齦交水溝共督脈甲乙經曰兌端手陽明脈氣之所發足陽明胃經左右凡九十二穴經脈篇云胃足陽明之脈起於鼻之交頞中旁迎香納太陽之脈睛明下循鼻外承泣四白巨窖入上齒中還出挾口地倉環唇下交承漿卻循頤後下廉出大迎循頰車上耳前下關過客主人循髮際懸釐懸顱頷厭頭維至額顱神庭其支者從大迎前下人迎循喉嚨水突氣舍入缺盆下膈屬胃上中脘絡脾其直者從缺盆下乳內廉氣戶庫房屋翳膺窗乳中乳根下不容承滿梁門關門太乙滑肉門挾臍天樞外陵大巨水道歸來入氣街中氣衝其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中陰市梁丘犢鼻下循脛外廉三里上巨虛條口下巨虛下足跗解溪衝陽入中指內間陷谷內庭厲兌其支者下廉三寸而別豐隆下入中指外間其支者別跗上入大指間出其端又云足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭項合諸經之氣下絡喉嚨氣府論云足陽明脈氣所發者六十八穴額顱髮際旁各三次注謂懸顱陽白頭維左右共六穴也面鼽骨空各一謂四白穴也大迎骨空各一大迎穴名也人迎各一人迎穴名也缺盆外骨空各一謂天髎二穴也膺中骨間各一謂膺窗等六穴也氣戶庫房屋翳乳中乳根挾鳩尾之外當乳下三寸挾胃脘各五謂不容承滿梁門關門太一五穴也挾臍廣三寸各三謂滑肉門天樞外陵也下臍二寸挾之各三謂大巨水道歸來也氣街動脈各一氣街穴名也伏兔上各一謂髀關二穴也三里以下至足中指各八俞分之所在穴空謂三里上廉下廉解溪衝陽陷谷內庭厲兌八穴也經別篇云足陽明之正上至髀入於腹裡屬胃散之脾上通於心上循咽出於口上額䪼還系目系合於陽明經筋篇云足陽明之筋起於中三指結於跗上斜外上加於輔骨上結於膝外廉直上結於髀樞上循脅屬脊其直者上循骭結於尻其支者結於外輔骨合少陽其直者上循伏兔上結於髀聚於陰器上腹而布至缺盆而結上頸上挾口合於頄下結於鼻上合於太陽太陽為目上綱陽明為目下綱其支者從頰結於耳前動輸篇云足之陽明何因而動岐伯曰胃氣上注於肺其悍氣上衝頭者循咽上走空竅循眼系入絡腦出顑下客主人循牙車合陽明並下人迎此胃氣別走於陽明者也平人氣象論云胃之大絡名曰虛里貫膈絡肺出左乳下其動應衣脈宗氣也承泣陽蹺任脈足陽明之會四白所發巨髎蹺脈之會地倉蹺脈手足陽明之會蹺聚英作任大迎足太陽脈氣所發太陽外臺作陽明頰車所發上關手少陽足陽明之會次注曰手足少陽足陽明三脈之會下關足陽明少陽之會氣府論云足少陽脈氣所發頭維足少陽陽維之會聚英陽維作陽明人迎所發聚英曰足少陽之會水突所發氣舍同上缺盆氣府論云足少陽脈氣所發次注曰足陽明脈氣所發新校正曰骨空注作手陽明氣戶所發以下直行庫房同上屋翳外臺曰足陽明脈氣所發膺窗次注曰足陽明脈氣所發乳中同上乳根不容承滿梁門關門太乙滑肉門天樞外陵大巨水道歸來氣衝乳根以下十三穴足陽明脈氣所發歸來一穴甲乙無説次注曰足陽明脈氣所發髀關氣府論云足陽明脈氣所發伏兔上各一次注曰髀關二穴也以下支伏兔所發陰市同上梁丘郤犢鼻所發三里所入氣府論云足陽明脈氣所發上廉與大腸合條口所發下廉與小腸合豐隆別走太陰解溪所行衝陽所過陷谷所注內庭所溜寶鑑曰所流厲兌所出按中指外間岡本曰足中指者大指之次指不與手中指同焉按手足五指以在其中曰中指足而以大指次指為中指者可疑入中指外間之中指蓋誤字何則本輸篇云厲兌者足大指次指之端也內庭次指外間也以次指言之未嘗言之中指至陷谷乃曰中指內間上行二寸夫陷谷在第三指內間若此中指為大指次指則與厥陰經行間同處也凡曰中指者手足共以第三指為中指也又類經曰大指次指謂大指之次指即食指也足亦同古人不必以大指次指為中指中指當作次指按頰車大迎缺盆氣衝四穴經脈篇膽經條明説足少陽之會焉甲乙等不記者遺脫也外臺曰兩旁九十三穴去下承漿一單穴共九十二穴無頭維入膽經缺盆入三焦經有迎香大腸耳門三焦承漿任脈大全有膝眼四穴載奇穴部發揮以下諸書無上關入膽經足太陰脾經左右凡四十二穴經脈篇云脾足太陰之脈起於大指之端隱白循指內側白肉際大都過核骨後太白公孫上內踝前廉商丘上腨內三陰交循脛骨後漏谷交出厥陰之前地機陰陵泉上膝股內前廉血海箕門入腹衝門府舍腹結大橫屬脾絡胃上膈腹哀日月期門大包食竇天溪胸鄉周榮中府挾咽連舌本散舌下其支者復從胃別上膈注心中又云足太陰之別名曰公孫去本節之後一寸別走陽明其支者入絡腸胃經別篇云足太陰之正上至髀合於陽明與別俱行上結於咽貫舌中此為三合也經筋篇云足太陰之筋起於大指之端內側上結於內踝其直者絡於膝內輔骨上循陰股結於髀聚於陰器上腹結於臍循腹裡結於肋散於胸中其內者著於脊隱白足太陰脈之所發大都所溜寶鑑作流太白所注公孫別走陽明商丘所行三陰交足太陰厥陰少陰之會漏谷絡地機郤陰陵泉所入血海所發箕門太陰內市太陰脈氣所發衝門足太陰厥陰之會外臺厥陰作陰維府舍足太陰陰維厥陰之會此脈上下入腹絡胸結心肺從胸上至肩比太陰郤三陰陽明支別外臺無厥陰二字此脈以下二十六字資生作此三脈上下三入腹又比作此聚英作入腹絡肝肺結心肺腹結大橫太陰陰維之會腹哀同上食竇所發次注曰手太陰脈氣所發天溪所發胸鄉同上周榮同上大包脾之大絡布胸脅中出九肋間及季脅端別絡諸陰者外臺無別絡諸陰者五字聚英作總統陰陽諸絡由脾灌溉五臟按外臺無大包入膽經中府期門日月本經之會下脘關元中極本經之會手少陰心經左右凡十八穴經脈篇云心手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下極泉下循臑內後廉青靈行太陰心主之後下肘內少海循臂內後廉抵掌後鋭骨之端靈道通里陰郤神門入掌內後廉少府循小指之內出其端少衝又云手少陰之別名曰通里去腕一寸半別而上行循經入於心中系舌本屬目系其實則支膈虛則不能言取之掌後一寸別走太陽也經別篇云手少陰之正別入淵腋兩筋之間屬於心上走喉嚨出於面合目內眥此為四合也經筋篇云手少陰之筋起於小指之內側結於鋭骨上結肘內廉上入腋交太陰挾乳里結於胸中循臂下繫於臍氣府論云手少陰各一次注謂手少陰郤穴也陰陽蹺各一陰蹺一謂交信穴也陽蹺一謂趺陽穴也邪客篇云黃帝曰少陰獨無腧者不病乎岐伯曰其外經病而臟不病故獨取其經於掌後鋭骨之端其餘脈出入屈折其行之徐疾皆如手少陰心主之脈行也少陰銅人作厥陰極泉手少陰脈氣所發以下直者青靈少海所入靈道甲乙或云手少陰脈之所行也為經通里少陰經別走太陽少陰郤神門所注少府所溜少衝所出按古書無青靈穴左右一十六穴也本輸篇曰心出於中衝手少陰也是手厥陰而言少陰説見於第四卷中手太陽小腸經左右凡三十六穴經脈篇云小腸手太陽之脈起於小指之端少澤循手外側前谷後溪上腕腕骨陽谷出踝中養老直上循臂骨下廉支正出肘內側兩筋之間小海上循臑外後廉出肩解肩貞繞肩胛臑俞天宗秉風曲垣肩外肩中大椎大杼交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸天窗上頰顴窖至目鋭眥瞳子窖卻和窖入耳中聽宮其支者別頰上䪼抵鼻至目內眥睛明斜絡於顴又云手之太陽之別名曰支正上腕五寸內注少陰其別者上走肘絡肩髃氣府論云手太陽脈氣所發者三十六穴目內眥各一次注謂睛明二穴也目外各一謂瞳子髎二穴也鼽骨下各一謂顴髎二穴也耳廓上各一謂角孫二穴也耳中各一謂聽宮二穴也巨骨穴各一巨骨穴名也曲掖上骨空各一謂臑俞二穴也柱骨上陷者各一謂肩井二穴也天窗上四寸各一謂天窗竅陰四穴也肩解各一謂秉風二穴也肩解下三寸各一謂天宗二穴也肘以下至手小指本各六俞謂小海陽谷腕骨後溪前谷少澤六穴也經別篇云手太陽之正指地別於肩解入腋走心系小腸也經筋篇云手太陽之筋起於小指之上結於腕上循臂內廉結於肘內鋭骨之後彈之應小指之上入結於腋下其支者後走腋後廉上繞肩胛循頸出走太陽之前結於耳後完骨其支者入耳中直者出耳上下結於頷上屬目外眥少澤手太陽脈之所出前谷所溜後溪所注腕骨所過陽谷所行養老郤支正絡別走少陰小海所入肩貞氣府論云手少陽脈氣所發甲乙次注作手太陽臑俞太陽陽維蹺脈之會外臺作手足太陽聚英作陽蹺天宗所發秉風手陽明太陽手足少陽之會曲垣肩外俞肩中俞天窗所發顴髎手少陽太陽之會聽宮手足少陽手太陽之會按外臺二十六穴無肩貞曲垣肩外肩中顴髎聽宮六穴共入三焦經而有睛明膀胱發揮有天容膽經諸書從之非也銅人圖曰天容十四經為手太陽經甲乙經言手少陽脈氣所發靈樞二篇二條俱為足少陽五篇曰足少陽根於竅陰入於天容故知甲乙經手字當是足字誤也是以豫所圖天容為膽經求不從後人之誤此説為得大椎大杼本經之會上脘本經之會下脘本經所生足太陽膀胱經左右凡百二十六穴經脈篇云膀胱足太陽之脈起於目內眥睛明上額攢竹神庭曲差五處承光通天交巔百會其支者從巔至耳上角天衝率谷曲鬢浮白竅陰完骨其直者從巔入絡腦還出絡卻玉枕別下項天柱大椎陶道循肩膊內挾脊大杼風門肺俞厥陰俞心俞膈俞肝俞膽俞脾俞胃俞三焦俞腎俞大腸俞小腸俞膀胱俞中膂俞白環抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀上窖次窖中窖下窖會陽承扶殷門入膕中委中其支者從膊內左右別下貫胛挾脊內附分魄戶膏肓神道譩嘻膈關魂門陽綱意舍胃倉肓門志室胞肓秩邊過髀樞環跳循髀外從後廉浮郤委陽下合膕中以下合陽承筋貫踹內承山飛陽跗陽出外踝之後崑崙僕參申脈金門循京骨京骨束骨至小指外側通谷至陰又云足太陽之別名曰飛陽去踝七寸別走少陰經別篇云足太陽之正別入於膕中其一道下尻五寸別入於肛屬於膀胱散之腎循膂當心入散直者從膂上出於項復屬於太陽此為一經也氣府論云足太陽脈氣所發者七十八穴兩眉頭各一次注謂攢竹穴也入發至項三寸半旁五相去三寸謂大杼風門各二穴也新校正後人誤認將頂為項其浮氣在皮中者凡五行行五五五二十五中行則囟會前項百會後項強間五督脈氣也次挾旁兩行則五處承光通天絡卻玉枕各五本經氣也又次旁兩行則臨泣目窗正營承靈腦空各五足少陽氣也項中大筋兩旁各一謂天柱二穴也風府兩旁各一謂風池二穴也挾背以下至尻尾二十一節十五間各一今中誥孔穴圖所存者十二穴左右共二十六謂附分魄戶神堂譩嘻膈關魂門陽綱意舍胃倉肓門志室胞肓秩邊十三穴也五臟之俞各五六腑之俞各六肺俞心俞肝俞脾俞腎俞膽俞大腸俞胃俞三焦俞小腸俞膀胱俞委中以下至足小指旁各六俞謂委中崑崙京骨束骨通谷至陰六穴也經筋篇云足太陽之筋起於足小指上結於踝邪上結於膝其下循足外踝結於踵上循跟結於膕其別者結於踹外上膕中內廉與膕中拜上結於臀上挾脊上項其支者別入結於舌本其直者結於枕骨上頭下顏結於鼻其支者為目上綱下結於頄其支者從腋後外廉結於肩髃其支者入腋下上出缺盆上結於完骨其支者出缺盆邪上出於頄睛明手足太陽足陽明之會外臺作手足太陽陽明次注加陰蹺陽蹺五脈之會攢竹足太陽脈氣所發曲差五處承光通天絡卻玉枕天柱以上七穴與攢竹同大杼手足太陽之會次注曰督脈別絡手足太陽三脈之會外臺作足太陽手少陽之會聚英作手足太陽少陽之會風門督脈足太陽之會肺俞五臟之俞次注曰並足太陽脈之會厥陰俞心俞膈俞肝俞膽俞所發脾俞胃俞三焦俞所發腎俞大腸俞小腸俞膀胱俞中膂俞白環俞所發上髎足太陽少陽之絡次髎中髎次注曰足厥陰支別者與太陰少陽結於腰踝下挾脊第三第四骨空中其穴即中髎下髎發揮曰足少陰少陽聚結之會也聚英少陰作厥陰下髎次注曰足太陰之絡從前合陽明上貫尻骨中與厥陰少陽結於下髎新校正曰詳王注曰足太陰之絡按甲乙經乃太陰之正非絡也王氏謂之絡者未詳其旨會陽督脈氣所發承扶殷門浮郤委陽太陽之別絡委中所入附分太陽之會外臺作手足太陽之會魄戶以下除膏肓之外十三穴皆太陽脈氣之所發膏肓神堂譩嘻膈關魂門陽綱意舍胃倉肓門志室胞肓秩邊合陽承筋所發承山飛揚別走少陰跗陽陽蹺之郤崑崙所行僕參同上聚英曰陽蹺之本申脈陽蹺所生聚英曰陽蹺所出金門太陽郤陽維所別屬也京骨所過束骨所注通谷所溜聚英所流至陰所出按氣府論曰手太陽脈氣所發者三十六穴目內眥各一次注曰謂睛明二穴也千金無跗陽入膽外臺曰兩旁一百二十恐脫二字穴注曰並二十二單穴及膏肓附穴共一百四十四穴程衍道曰按本經原六十三穴此少二穴睛明入小腸厥陰俞缺只六十一穴左右共一百二十二穴又加督脈二十二穴共一百四十四穴督脈本二十七穴今少五穴齦交兌端水溝三穴入大腸靈臺入陽關入膽經故只二十二穴也今按外臺不載靈臺穴程注為入者缺訂也入門有眉沖氣海俞關元俞今入奇穴部大椎陶道本經之會環跳次注曰手少陽足太陽之會天衝曲鬃竅陰完骨本經之會率谷浮白腦戶本經之會風府聚英曰足太陽督脈陽維之會足少陰腎經左右凡五十四穴經脈篇云腎足少陰之脈起於小指之下斜走足心湧泉出於然谷之下然谷循內踝之後照海水泉別入跟中太溪太鍾以上踹內復溜交信三陰交築賓出膕內廉陰谷上股內後廉貫脊長強屬腎絡膀胱橫骨大赫氣穴四滿中注肓俞關元中極其直者從腎上貫肝膈商曲石關陰都通谷幽門入肺中步廊神封靈墟神藏彧中俞府循喉嚨挾舌本其支者從肺出絡心注胸中又云足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下外貫腰脊氣府論云足少陰舌下厥陰毛中急脈各一次注足少陰舌下二穴在人迎前陷中動脈前是曰舌本左右二也急脈在陰髦中陰上兩旁經別篇云足少陰之正至膕中別走太陽而合上至腎當十四椎出屬帶脈直者系舌本復出於項合於太陽經筋篇云足少陰之筋起於小指之下並足太陰之筋邪走內踝之下結於踵與太陽之筋合而上結於內輔之下並太陰之筋而上循陰股結於陰器循脊內挾膂上至項結於枕骨與足太陽之筋合湧泉足少陰脈之所出然谷所溜外臺作留聚英曰別於太陰蹺脈之郤足少陰脈氣所流太溪所注大鐘別走太陽足少陰絡照海陰蹺脈所生水泉郤復溜所行交信陰蹺之郤築賓陰維之郤陰谷所入橫骨大赫氣穴四滿中注肓俞商曲石關陰都通谷幽門自橫骨以下至此十一穴衝脈足少陰之會步廊神封靈墟神藏彧中俞府自步廊以下六穴共足少陰脈氣所發按骨空論云衝脈者起於氣街並少陰之經挾臍上行至胸中而散甲乙經自橫骨至幽門十一穴皆云衝脈之會者原於此俞穴折衷有廉泉三陰交足太陰厥陰心陰之會長強本經所結關元中極天池本經之會手厥陰心包經左右凡十八穴經脈篇云心主手厥陰心包絡之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸出脅下腋三寸天池上抵腋下循臑內天泉行太陰少陰之間入肘中曲澤下臂行兩筋之間郤門間使內關大陵入掌中勞宮循中指出其端中衝其支者別掌中循小指次指出其端又云手心主之別名曰內關去腕二寸出於兩筋之間循經以上繫於心包絡心系經別篇云手心主之正別下淵腋三寸入胸中別屬三焦出循喉嚨出耳後合少陽完骨之下經筋篇云手心主之筋起於中指與太陰之筋並行結於肘內廉上臂陰結腋下下散前後挾脅其支者入腋散胸中結於臂邪客篇云心主之脈出於中指之端內屈循中指內廉以上留於掌中伏行兩骨之間外屈出兩筋之間骨肉之際其氣滑利上二寸外屈出行兩筋之間上至肘內廉入於小筋之下留兩骨之會上入於胸中內絡於心脈天池手厥陰足少陰之會聚英曰手足厥陰少陰之會天泉曲澤心主脈之所入郤門郤間使所行內關絡別走少陽千金作太陽大陵所注勞宮所溜中衝所出按外臺兩旁一十六穴無天池入膽手少陽三焦經左右凡四十四穴經脈篇云三焦手少陽之脈起於小指次指之端關衝上出兩指之間腋門中渚循手表腕陽池出臂外兩骨之間外關支溝會宗三陽絡四瀆上貫肘天井循臑外清冷淵消濼臑會上肩肩窖肩貞秉風而交出足少陽之後天窖入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項肩井系耳後天牖翳風瘈脈顱息直上出耳上角角孫懸釐頷厭以屈下頰至䪼顴窖其支者從耳後入耳中聽宮出走耳前聽會耳門和窖過客主人前交頰至目鋭眥瞳子窖又云手少陽之別名曰外關去腕二寸外繞臂注胸中合心主氣府論云手少陽脈氣所發者三十二穴鼽骨下各一次注謂顴髎二穴也眉後各一謂絲竹空二穴也角上各一謂懸釐二穴也下完骨後各一謂天牖二穴也項中足太陽之前各一謂風池二穴也挾扶突各一謂天窗二穴也肩貞各一肩貞穴名也肩貞下三寸分間各一謂肩髎臑會消濼各二穴也肘以下至手小指次指本各六俞謂天井支溝陽池中渚液門關衝六穴也經別篇云手少陽之正指天別於巔入缺盆下走三焦散於胸中也經筋篇云手少陽之筋起於小指次指之端結於腕上循臂結於肘上繞臑外廉上肩走頸合手太陽其支者當曲頰入系舌本其支者上曲牙循耳前屬目外眥上乘頷結於角本輸篇云三焦下腧在於足大指甲乙作太陽之前少陽之後出於膕中外廉名曰委陽是太陽絡也手少陽經也又云手少陽出耳後上加完骨之上衛氣篇云手少陽之本在小指次指之間上二寸標在耳後上角下外眥也關衝手少陽脈之所出液門所溜中渚所注陽池所過外關絡別走心主支溝所行會宗郤三陽絡四瀆天井所入清冷淵消濼肩髎所發天髎手少陽陽維之會千金手作足次注作手足少陽陽維三脈之會天牖所發翳風手足少陽之會瘈脈顱息足少陽脈氣所發足當作手角孫手足少陽手陽明之會氣府論云手太陽脈氣所發太恐少之誤次注聚英陽明作太陽耳門聽會所發次注曰手陽明脈之分和髎手足少陽手太陽之會次注無手陽明三字按外臺曰兩旁五十六穴無肩髎入大腸顱息入膽耳門入胃而有肩井膽聽宮小腸天容膽顴髎肩貞肩外俞肩中俞曲垣共小腸缺盆胃九穴發揮有臑會大腸肩井秉風本經之會肩貞氣府論雲手少陽脈氣之所發臑會氣府論雲手少陽之會頷厭懸顱懸釐聽宮上關瞳子窖顴窖本經之會足少陽膽經左右凡八十六穴經脈篇云膽足少陽之脈起於目鋭眥瞳子窖上絲竹空抵頭角頭維頷厭懸顱懸釐曲鬢率谷天衝下耳後浮白竅陰完骨角孫本神陽白臨泣目窗正營承靈腦空風池循頸行手少陽之前至肩上肩井卻交出手少陽之後入缺盆大椎大杼大窖秉風缺盆其支者從耳後入耳中出走耳前至目鋭眥後其支者別鋭眥下大迎迎合於手少陽抵於䪼下加頰車頰車下頸天容合缺盆以下胸中貫膈日月絡肝屬膽循脅裡章門出氣街氣衝繞毛際橫入髀厭中環跳其直者從缺盆下腋淵腋輒筋循胸過季脅京門帶脈五樞維道居窖下合髀厭中以下循髀陽中瀆陽關出膝外廉陽陵泉下外輔骨之前陽交外丘光明直下抵絶骨之端陽輔懸鐘下出外踝之前丘墟循足跗上臨泣地五會入小指次指之間俠溪竅陰其支者別跗上入大指之間循大指岐骨內出其端還貫爪甲出三毛又云足少陽之別名曰光明去踝五寸別走厥陰下絡足跗氣府論云足少陽脈氣所發者六十二穴兩角上各二次注謂天衝左右各二穴也直目上髮際內各五謂臨泣目窗正營承靈腦空左右是也耳前角上各一謂頷厭二穴也耳前角下各一謂懸釐二穴也鋭發下各一謂和髎二穴也客主人各一客主人穴名也耳後陷中各一謂翳風二穴也下關各一下關穴名也耳下牙車之後各一謂頰車二穴也缺盆各一缺盆穴名也腋下三寸脅下至胠八間各一腋下謂淵腋輒筋天池脅下至胠則日月章門帶脈五樞維道居髎九穴也左右共十八穴也髀樞中傍各一謂環跳二穴也膝以下至足小指次指各六俞謂陽陵泉陽輔丘墟臨泣俠溪竅陰六穴也經別篇云足少陽之正繞髀入毛際合於厥陰別者入季脅之間循胸裡屬膽散之上肝貫心以上挾咽出頤頷中散於面系目系合少陽於外眥也經筋篇云足少陽之筋起於小指次指上結外踝上循脛外廉結於膝外廉其支者別起外輔骨上走髀前者結於伏兔之上後者結於尻其直者上乘䏚季脅上走腋前廉繫於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄支者結於目眥為外維熱論云少陽主膽其脈循脅絡於耳又云少陽病衰耳聾微聞瞳子髎手太陽手足少陽之會絲竹空足少陽脈氣所發頷厭手少陽足陽明之會外臺曰足少陽陽明會懸顱所發聚英曰手足少陽陽明會懸釐手足少陽陽明之會曲鬢足太陽少陽之會率谷同上天容手少陽脈氣所發手當作足説見手太陽條下天衝足太陽少陽之會浮白同上竅陰同上外臺曰手足太陽少陽之會聚英作足太陽手足少陽完骨同上本神足少陽陽維之會聚英曰陽維脈所止陽白同上次注曰足陽明陰維二脈之會新校正曰按甲乙經陽白足少陽陽維之會今王氏注云足陽明陰維之會詳此在足陽明脈氣所發中則足陽明近是然陽明經不到此又不與陰維會疑王注非發揮曰手足太陽少陽足陽明五脈之會聚英曰手足陽明少陽陽維五脈之會臨泣足太陽少陽陽維之會外臺無陽維目窗足少陽陽維之會正營同上承靈同上腦空同上風池同上氣府論云足少陽脈氣之所發肩井手少陽陽維之會手外臺作手足環跳所發次注曰足少陽太陽之會淵腋次注曰足少陽脈氣之所發輒筋所發聚英曰足太陽少陽之會日月足太陰少陽之會類經曰太陰少陽陽維之會京門腎募也帶脈次注曰足少陽帶脈二經之會五樞次注曰足少陽帶脈二經之會維道足少陽帶脈之會居髎陽蹺足少陽之會中犢所發聚英曰絡別走厥陰陽關陽陵泉所入陽交陽維之隙外丘隙少陽所生光明絡別走厥陰陽輔所行懸鐘足三陽絡外臺曰大絡丘墟所過臨泣所注地五會俠溪所溜竅陰所出按外臺曰兩傍一百四穴無肩井入三焦經日月入脾經而有頭維胃經顱息三焦經大包脾經天池心包經章門肝經後腋轉谷飲隙應突脅堂旁庭始素此七穴今入奇穴部千金丘墟下有跗陽膀胱經資生神應入門大全寶鑑有風市今入奇穴部聚英闕日月發揮聚英無絲竹空入三焦經天容入小腸經而有聽會三焦經寶鑑有角孫重復也按膽經流注據經脈篇則其經穴有所不經瀝者岡本氏實如所辨但絲竹空天容二穴説見於小腸經甲乙云足少陽脈氣所發外臺既屬此經聽會一穴甲乙云手少陽脈氣所發外臺亦屬之三焦經不言其會發揮以曲差睛明為會者諸書所不説也又頰車大迎氣街三穴經脈篇明言其會甲乙以下不記者蓋遺脫也頭維下關聽宮和窖角孫翳風本經之會缺盆氣府論云足少陽脈氣所發足厥陰肝經左右凡二十八穴經脈篇云肝足厥陰之脈起於大指叢毛之際大敦上循足跗上廉行間太衝去內踝一寸中封上踝三陰交蠡溝中都八寸交出太陰之後上膕內廉膝關曲泉循股陰陰包五里陰廉入毛中急脈衝門府舍過陰器抵小腹曲骨中極關元挾胃屬肝絡膽上貫膈章門期門布脅肋循喉嚨之後上入頑顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺會於巔下甲乙經注有一云其支者從小腹結於腰髁挾脊下第三第四骨孔中之文又云足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者循脛結於莖經別篇云足厥陰之正別跗上上至毛際合於少陽與別俱行此為二合衛氣篇云足厥陰之本在行間上五寸所標在背腧也經筋篇云足厥陰之筋起於大指之上上結於內踝之前上循脛上結內輔之下上循陰股結於陰器絡諸筋熱論云厥陰脈循陰器而絡於肝大敦足厥陰脈之所行行間所溜太衝所注中封所注聚英作所行蠡溝絡別走少陽中都郤膝關所發千金曰足厥陰郤曲泉所入陰包絡別走注曰此處有缺五里陰廉急脈次注曰厥陰之大絡章門足厥陰少陽之會期門足太陰厥陰陰維之會按類經曰急脈自甲乙經以下諸書皆無外臺二十二穴無章門入膽經期門入脾經入門大全有羊矢詳於奇穴部三陰交本經之會府舍衝門曲骨中極關元本經之會督脈凡二十八穴氣府論云督脈氣所發者二十八穴次注今少一穴項中央二謂風府啞門也髮際後中八謂神庭上星囟會前頂百會後頂強間腦戶八穴也面中三謂素髎水溝齦交三穴也大椎以下至尻尾及旁十五穴脊椎之間有大椎陶道身柱神道靈臺至陽筋縮中樞脊中懸樞命門陽關腰俞長強會陽十五俞也至胝下凡二十一節脊椎法也骨空論云督脈者起於小腹以下骨中央女子入系廷孔其孔溺孔之端也其絡循陰器合篡間繞篡後別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎與太陽起於目內眥上額交巔上入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎其男子循莖下至篡與女子等其少腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之下中央營氣篇云上額循巔下項中循脊入骶是督脈也經脈篇云督脈之別名曰長強挾膂上項散頭上下當肩胛左右別走太陽入貫膂難經曰督脈者起於下極之俞並於脊裡上至風府入屬於腦長強督脈別絡少陰所結聚英曰足少陰少陽結會督脈別走任脈腰俞所發陽關次注曰督脈氣所發命門所發懸樞同上脊中同上中樞次注曰督脈氣所發筋縮所發至陽同上靈臺次注曰督脈氣所發神道所發身柱同上陶道督脈足太陽之會大椎三陽督脈之會聚英有手足二字啞門督脈陽維之會風府同上聚英曰足太陽督脈陽維之會腦戶督脈足太陽之會強間所發後頂同上百會督脈足太陽之會聚英曰手足三陽督脈之會前頂所發囟會同上上星同上神庭督脈足太陽陽明之會素髎所發水溝督脈手足陽明之會外臺次注無足字兌端手陽明脈氣所發齦交次注曰任督二經之會聚英曰任督足陽明之會按甲乙千金外臺無陽關中樞靈臺外臺無兌端入大腸經折衷有會陽曰氣府甲乙本穴明系督脈至銅人經系之足太陽經蓋推其意甲乙千金無嫌他經之相混以本穴列於足太陽第三行之末故遂襲取之耳今系之於督脈以復其舊比之他經之有絡穴者發揮穴歌作二十七穴無會陽滑壽曰按內經督脈所發者二十八穴據法十椎下一穴名中樞陰尾骨兩旁二穴名長強共有二十九穴今多齦交一穴少中樞一穴會陽二穴則系督脈別絡與少陽會故止載二十七穴此説謬誤不可讀也又長強一穴為兩傍者古所無也不可從焉風門本經之會會陽督脈氣所發任脈凡二十四穴氣府論云任脈之氣所發者二十八穴次注今少一穴喉中央二謂廉泉天突二穴也膺中骨陷中各一謂璇璣華蓋紫宮玉堂膻中中庭六穴也鳩尾下三寸胃脘五寸胃脘以下至橫骨六寸半一新校正云詳一字疑誤腹脈法也鳩尾巨闕上脘中脘建里下脘水分臍中陰交脖胦丹田關元中極曲骨十四俞也下陰別一謂會陰一穴也目下各一謂承泣二穴也下唇一謂承漿穴也齦交一齦交穴名也骨空論云任脈者起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目按骨空論督脈者起少腹之條有其少腹直上者貫臍中央貫心上頤環唇上系兩目之下中央之文宜合考營氣篇云絡陰器上過毛中入臍中上循腹裡入缺盆下注肺中復出太陰馬蒔曰此任脈也五音五味篇云衝脈任脈皆起於胞中上循背裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口經脈篇云任脈之別名曰尾翳下鳩尾散於腹難經曰任脈者起於中極之下以上毛際循腹裡上關元至喉咽會陰任脈別絡挾督脈衝脈之會曲骨任脈足厥陰之會中極足三陰任脈之會關元同上石門所發氣海同上陰交任脈氣衝之會外臺曰任脈衝脈少陰之會次注作任脈陰沖之會銅人曰任脈氣所發神闕水分所發下脘足太陰任脈之會建里中脘手太陽少陽足陽明所生任脈之會次注曰手太陽少陽足陽明三脈所生任脈氣所發也上脘任脈足陽明手太陽之會巨闕所發鳩尾任脈之別中庭膻中玉堂紫宮華蓋璇璣中庭以下六穴任脈氣所發天突陰維任脈之會廉泉同上承漿足陽明任脈之會按氣府論云任脈之氣所發者二十八穴王冰曰今少一穴乃今所載二十四穴也加承泣齦交二十七穴外臺無承漿入胃經折衷無廉泉入腎經據口齒類要舌下廉泉此屬腎經也氣府論云足少陰舌下厥陰毛中急脈各一王冰曰足少陰舌下二穴在人迎前陷中動脈前是曰舌本左右二也又類經曰按刺瘧論所載曰舌下兩脈者廉泉也氣府論曰足少陰舌下各一衛氣篇曰足少陰之標在背腧與舌下兩脈然則廉泉非一穴當是舌根下之左右泉脈而且為足少陰之會也承泣本經之會齗交次注曰任督二經之會
