食右捻能和脾胃此穴一針有四效凡下針後良久覺脾磨食覺針動為一效次針破病根腹中作聲為二效次覺流入膀胱為三效又次覺氣流行腰後骨空間為四效醫綱龍頷心痛冷氣上灸龍頷百壯在鳩尾頭上行一寸半不可刺千金天瞿旁穴癭灸天瞿三百壯橫三間寸灸之千金按天瞿即天突一名東洋先生曰按瞿疑當作衢千金明堂云天衢在耳上如前三寸此解不是說見天衝胸堂上氣厥逆灸胸堂百壯穴在兩乳間千金不刺千金按千金曰吐血唾血灸胸堂百壯又出驚癇篇千金翼堂作膛並無穴注此穴似指膻中醫學綱目以為膻中然千金既言灸膻中次灸胸堂則非膻中疰市一切疰無新久先仰臥灸兩乳邊斜下三寸第三肋間隨年壯可至三百壯又治諸氣神良一名疰市千金按疰千金翼作注與旁廷同名其處不遠石關在心下二寸兩旁各五寸灸五十壯主産後兩脅痛不可忍衛生寶鑑按與腹部石關同名異穴轉谷在旁二骨間陷者中主胸脅支滿不欲食谷入穀不化嘔吐復出舉腋取之外臺按此穴在後腋條後在旁蓋指後腋歟似有脫字後腋見背部外臺以後腋飲郤應突脅堂旁廷始素七穴入足少陽經今移入於奇穴飲郤食門下一寸骨間陷者中主腹滿臚腫痛引臍旁腹鳴濯濯若中有水聲仰腹取之外臺按食門未知何處蓋指轉谷歟應突飲郤下一寸主飲食不入腹中滿大便不得節腹鳴泄注仰腹取之外臺脅堂腋陰下二骨陷者中主胸脅支滿臚脹賁㹠噫噦喘逆膽視目黃舉腋取之外臺忌針千翼按東洋先生曰膽疑當作瞻千金翼曰吐血唾血灸脅堂百壯資生曰在腋下引明堂下經居髎下載此穴大全曰居髎合取八寸三脅堂二骨門腋下按門腋蓋指章門淵腋而不的是作歌括之弊也旁廷一名注市腋下四肋間高下正與乳相當乳後二寸陷中俗名注市舉腋取之刺入五分灸五十壯主卒中惡飛尸遁尸注胸脅滿千金脅堂下二骨間陷者中舉腋取之外臺按廷外臺作庭與前條疰市同名其處亦不遠始素腋脅下廉下二寸骨陷者中主脅下支滿腰痛引腹筋攣陰氣上縮舉臂取之外臺九曲中府旁廷注市下三寸千金刺入五分灸三十壯主惡風邪氣遁尸內有瘀血千金帝門脾胃之間名曰帝門在季肋下前一寸半脈經按類經所載九門無此穴腋門一名大陽陰一名腋間腋下攢毛中一寸灸五十壯主風千金按手少陽液門易混又與大巨同名異穴千金淵腋穴下注引中風篇曰腋門在腋下攢毛中一名泉液即淵腋是也今本無此文氣門婦人絶嗣不生灸氣門穴在關元旁三寸各百壯千金按類經載九門曰氣門溲溺之門居前陰中由氣化而出故曰氣門不與此同大抵與水道相似薜息千金見乳根下神府心痛暴絞急絶欲死灸神府百壯在鳩尾正心有忌千金按千金翼作附鳩尾正當心肓募結氣囊里針藥所不及灸肓募隨年壯肓募二穴從乳頭邪度至臍中屈去半從乳下行度頭是穴千金按千金翼邪作斜行下有盡字肓一本作胃非也乳上以繩橫度口以度從乳上行灸度頭千翼按千金治卒癲灸兩乳頭三壯又曰小兒暴癇灸兩乳頭女兒灸乳下二分又幼科準繩曰小兒喘脹俗謂馬脾風又謂之風喉者以草莖病兒手中指里近掌紋至中指尖截斷如此二莖自乳上微斜直立兩莖於稍盡頭橫一莖兩頭盡頭點穴灸三壯此法多曾見愈通谷心痛惡氣上脅急痛灸通谷五十壯在乳下二寸千金按與腹部二行通谷同名異穴魂舍小腸泄痢膿血灸魂舍一百壯小兒減之穴在挾臍兩邊相去各一寸千金按千金翼無各字天樞云魂魄之舍不可下針蓋天樞之異名分寸稍差大抵似肓俞穴暫俟再考肋頭第一屈肋頭近第二肋下即是灸處第二肋頭近第三肋下向肉翅前亦是灸處千翼肋罅以繩量病人兩乳間中屈之又從乳頭向外量使當肋罅於繩頭灸隨年壯千翼長谷一名循際泄痢不嗜食雖食不消灸長谷五十壯三報穴在挾臍相去五寸千金按千金天樞注以長谷為天樞一名說已見千金翼曰多汗四肢不舉少力灸長平五十壯在挾臍相去五寸不針按長平章門一名而此穴似章門說見章門醫學綱目作循元腋下噫噦膈中氣閉塞灸腋下聚毛下附肋宛宛中五十壯千金按千金又云一切瘰癧灸患人背兩邊腋下後紋上隨年壯千金翼曰灸癭法垂兩手兩腋上紋頭各灸三百壯針亦良千金又曰一切瘰癧灸兩胯里患癧處宛宛中日一壯七日止神驗兩胯外臺作兩腋直骨灸遠年咳嗽不愈者將本人乳下大約離一指頭看其低陷之處與乳直對不偏者此名為直骨穴如婦人即按其乳頭直向下看其乳頭所到之處即是直骨穴之地位灸艾三炷其艾只可如赤豆大男灸左女灸右不可差錯其嗽即愈如不愈則其病再不可治矣壽世保元緑竹堂簡便方同按乳根也乳下小兒癬灸兩乳下一寸各三壯千金按灸乳下者多其穴處又小異並録於此千金曰治反胃灸兩乳下各一寸以瘥為度又灸乾嘔三十壯又灸五尸隨病左右多其壯數灸卒吐逆七壯又嗽灸兩乳下黑白際各百壯又轉筋四厥灸兩乳根黑白際各一壯又曰小兒溫瘧灸兩乳下一指三壯又婦女人月經不嘗來服黃芩牡丹湯後灸乳下一寸黑圓際各五十壯千金翼曰一切惡注氣急不得息欲絶者及積年不瘥者男左手虎口紋於左乳頭並四指當小指節下間灸之婦人以右手也活人書間咳逆曰若服藥不瘥者灸之必愈其法婦人屈乳頭向下盡處骨間灸三壯丈夫及乳小者以一指為牽正以男左女右艾炷如小豆許與乳相直間陷中動脈處是資生云灸咳逆法乳下一指許正與乳相直骨間陷中中胞門太倉左右三寸脈經關元左邊二寸是也右二寸名子戶千金按脈經胞又作膀子戶關元穴旁右二寸金鑑按胞門子戶者氣穴之別名詳於第三卷中子宮中極兩旁各開三寸大成按醫經小學曰治婦淋關元兩旁各開三寸半濟世良方云子宮虛冷不能成孕灸子宮三穴各七壯揣心坎中高骨以墨記之用草心一條從墨記至胸中折斷揩作七分以四分量臍上灸之補血三分量臍中灸之補氣仍以臍下三分折半正子宮穴灸之溫暖精氣受孕之所有神效錢孔度乳至臍中屈肋頭骨是灸百壯治黃疽千金臍四邊穴治小兒暴癇者身軀正直如死人及腹中雷鳴灸太倉及臍中上下兩旁各一寸凡六處千金又治小兒卒腹皮青黑灸臍上下左右去臍半寸並鳩尾骨下一寸凡五處各三壯同上臍上下小兒囟陷灸臍上下各半寸千金又療黃疽當灸臍上下兩邊各一寸半一百壯外臺引崔氏鳩尾骨穴小兒囟陷灸臍上下及鳩尾骨端各一壯千金漏灸鳩尾骨下宛宛中七十壯同上又少年房多短氣灸鳩尾頭五十壯同上按醫學綱目引田氏云胸下骨尖上灸三壯主小兒疳瘦身交胞落頽灸身交五十壯三報之臍下橫紋中千翼遺道遺溺灸遺道挾玉泉五寸千金按千金翼作遺尿針遺道入二寸補之灸隨年壯腸遺挾玉泉相去各二寸千金按寶鑑作腸逵千金翼作二寸半類經從之玉泉男陰卵大㿗病灸玉泉百壯報之穴在屈骨下陰以其處卑多不灸之及泉陰穴亦在其外千金腰痛小便不利苦胞轉灸玉泉七壯穴在關元下一寸大人從心下度取八寸是玉泉穴小兒斟酌以取之同上按玉泉與中極同名異穴泉門婦人絶嗣不生漏赤白灸泉門十壯三報穴在橫骨當陰上際千金按千金翼作漏下泉陰陰卵偏大㿗病灸泉陰百壯三報在橫骨邊千金按邊字上當有兩字千金翼邊下有三寸二字千金又曰㿗病灸橫骨兩邊二七壯挾莖是蓋指此穴類經邊作旁尿胞一名屈骨端千金見曲骨下金門千金見會陰下按與四肢部金門同名異穴羊矢氣衝外一寸入門會陰旁三寸股內橫紋中按皮肉間有核如羊矢類經按入門入足厥陰經蘭門曲泉兩旁各三寸大全歸來下莖根毛內旁五寸小學毛際玉莖旁開二寸針入二寸半主治水腎紅腫如升大不痛醫綱按寶鑑曰蘭門在玉莖旁二寸治疝氣衝心欲絶男陰縫一名鬼藏拔陰反向上灸治馬黃黃疽等病若女人玉門十三鬼穴並千金翼有頭字是穴男女針灸無在千金按千金風癲篇灸陰囊縫三十壯令人立以筆正注當下已臥核卵上灸之勿令近前中卵核恐害陽氣也又十三鬼穴陰下縫風癲篇囊下縫即是醫學綱目曰小兒偏墜若非胎中所有在後生者於莖中腎囊前中間弦子上灸七壯立愈此法相似在囊前縫上關門玉莖旁二寸針入二寸半灸二七壯主治疝氣衝心欲死醫綱鬼門牛釣弄舌撮口灸鬼門穴在乳下一麥粒七壯幼幼新書按與十三鬼穴鬼門同名異穴氣衝一名氣中醫綱氣衝在氣海旁各一寸半針入二寸半灸五十壯主治腹痛腸鳴又名氣中主治婦人血溺氣喘醫綱按與胃經氣衝同名異穴千金曰失缺頰車蹉灸背第五椎一日二七壯滿三日不瘥灸氣衝二百壯胸前喉下甲骨中是亦名氣堂此氣衝亦是異穴說既見水分在水分旁各一寸半針二寸半灸五十壯主治單蠱脹氣喘醫綱食倉食關治脾胃在中脘旁寸半位小學血門血門中脘旁三寸小學神庭在龜尾注曰一作鳩尾下五分脈經水道三焦膀胱腎中熱氣灸水道隨年壯穴在挾屈骨相去五寸千金屈骨在臍下五寸屈骨端水道挾兩旁各二寸半千翼按屈骨橫骨之一名說既見水道與腹部三行水道同名異穴宜合考囊底一名海底醫綱陰囊十字紋中大成按千金曰若眼反口噤腹中切痛灸陰囊下第一橫理十四壯灸卒死亦良蓋此穴綱目奇效良方等皆云治陰中濕癢外腎生瘡小腸疝氣小兒疝卵偏重龍門婦人胞落頽灸龍門二十壯三報在玉泉下女人入陰內外之際此穴卑今廢不針灸千金陰中上外際千翼按玉泉見上非中極之一名千金曰婦人遺尿不知出時灸橫骨當陰門七壯陰莖卒癲灸陰莖上宛宛中三壯得小便通即瘥千金治卒㿗牽陰頭正上灸莖頭所極又牽下向穀道又灸所極又牽向左右髀直行灸莖所極同上當尿孔上是穴千翼又灸陰莖頭三壯千金按千金又曰凡男㿗當騎碓軸以莖伸置軸上齊陰莖頭前灸軸木上隨年壯此他灸法多多不集録衝門去大橫五寸在府舍下橫骨端約中動脈外科大成
