body:
  text: 卷之七奇穴部第十一奇穴者乃所謂阿是天應是也而無共名目者及此土灸法傳漢地者載在神應經聖濟總録總收諸主治部中不録於此以無其名目也岡本氏阿是要穴曰皇甫士安甲乙經素問氣府論王注及滑伯仁十四經發揮所載俞穴今所存惟有三百五十六穴此他四花風市腰眼痞根等諸穴以為之奇俞亦皆阿是也內經無奇輸靈樞刺節直邪論有奇輸二字而非云三百五十六穴之外別有奇輸也又阿是名素靈所無千金方始見之經筋篇云以痛為輸馬玄臺注證發微曰俗曰天應穴者是也夫輸穴本系經絡者而奇輸阿是豈有外經絡之理乎風市者足少陽膽經之所注腰眼者足太陽膀胱經之所流其他可類推也崔氏四花穴四明高武考之為足太陽第二行膈俞膽俞四穴凡奇俞明所屬之經絡及本穴而針灸之效始可照然也乃今以阿是要穴所載遺漏不為不少更輯奇輸名目散在諸書者以録之又只淺見寡聞何能盡於此乎又以俟後進君子而如馬蒔所謂其奇穴必系經絡者間有與諸書所載不符者云頭面第一天聰傷寒三四日以上宜先灸胸上二十壯以繩度鼻正上盡髮際中屈繩斷去半便從髮際入發中灸繩頭名曰天聰千金按千金翼聰作窗胸作胸神聰四穴資生前神聰後神聰類經百會四面各相去一寸資生去前頂五分自神庭至此穴共四寸後神聰去百會一寸類經神聰百會四花求各取一寸大全以百會穴為中四邊各開二寸半銀海精微按資生經曰明堂有此四穴而銅人無之其穴治頭風目眩狂亂風癇亦所不可廢者明堂鼻直上入髮際一寸資生按資生曰按銅人明堂及諸家針灸經鼻直上入髮際一寸皆云上星穴明堂經於此復云明堂穴不知何所據所謂疑以傳疑也大全曰府下五分府下言風府啞門中門下五分發際終更有明堂一穴差大門猥退風半身不隨灸大門腦後尖骨上一寸千翼髮際兩眼小眥上髮際資生平眉上三寸類經按資生曰岐伯灸頭旋目眩及偏頭痛不可忍牽眼䀮䀮不遠視灸一壯立瘥類經曰主治頭風眩暈疼痛延久不愈灸三壯又曰治衄血於項後髮際兩筋間宛中穴灸三壯蓋血自此入腦注鼻中故灸立止寅門從鼻頭直入髮際度取通繩分為三斷繩取一分入髮際當繩頭針是穴治馬黃疽等病千金按千金翼針作鋥陽維耳風聾雷鳴灸陽維五十壯在耳後引耳令前弦弦筋上是千翼囟中千金額上千金耳上千金若目反上視眸子動當灸囟中取之法橫度口盡兩吻際又橫度鼻下亦盡兩邊折去鼻度半都合口為度從額上髮際上行度之灸度頭一處正在囟上未合骨中隨手動者是此最要處也次灸當額上入髮際二寸許直望鼻為正次灸其兩邊當目瞳子直上入髮際二分許次灸頂上回毛中次灸客主人穴在眉後際動脈是次灸兩耳門當耳開口則骨解開動張陷是也次灸兩耳上卷耳取之當卷耳上頭是也一法大人當耳上橫三指小兒各自取其指也次灸兩耳後完骨上青脈亦可以針刺令血出次灸玉枕項後高骨是也次灸兩風池在項後兩轅動肋肋恐當作脈外發際陷中是也次灸風府當項中央髮際亦可與風池三處高下相等次灸頭兩角兩角當回毛兩邊起骨是也千金耳尖按耳尖上卷耳取尖上大成耳孔中耳門孔上橫梁是針灸之治馬黃黃疽寒暑疫毒等病又治卒中風口喎不正以葦筒長五寸以一頭刺耳孔中四畔以面密塞之勿泄氣一頭納大豆一顆並艾燒令燃灸七壯即瘥患右灸左患左灸右千金不傳耳病亦可灸之千金郁中耳前兩邊雲林神谷按雲林神谷曰灸哮吼神法患者耳前兩邊名郁中二穴壽世保元耳前作胸中未知孰是顳顬眉眼尾中間上下有來去絡脈千金按與腦空異千金曰針灸之治四時寒暑所苦疽氣溫病等當陽眼急痛不可遠視灸當瞳子上入髮際一寸隨年壯千金去臨泣五分類經按資生曰銅人無當陽穴而明堂下經有之亦不可廢者其穴與臨泣相近大全曰當陽二穴當瞳人當容肝勞邪氣眼赤灸當容百壯兩邊各爾穴在眼小眥近後當耳前三陽三陰之會處以兩手按之有上下橫脈則是與耳門相對是也千金按千金翼無小眥近三字外臺耳前下有客主人三字眉沖一名小竹當兩眉頭直上入髮際資生禁灸入門按資生曰明堂上經有眉衝穴而銅人經無之又曰其穴與曲差相近入門曰直眉頭上神庭曲差之間大全曰眉沖二穴兩眉頭直上入髮際相求針灸大成作直眉頭神庭曲差之間膀胱經攢竹後有此穴曲眉兩眉間千翼按面風遊風雲云灸二百壯魚腰眉中間大成印堂兩眉中間大全陷中大成按此穴曲眉魚腰穴同處蓋異名也針之治目疼灸之治急慢驚風大全曰兩眉角痛不已太陽眉後陷中太陽紫脈上大成按絲竹空也洗冤録曰眉際之末者太陽穴宜與瞳子髎合考奇效良方曰太陽二穴在眉後陷中太陽紫脈上是穴治眼紅腫及頭痛宜用三稜針出血出血之法用帛一條緊纏其頂紫脈即見刺見血立愈魚尾目眥外頭類經按銀海精微曰小眥橫紋盡處大全曰眉外頭小字是外之誤眉字是目之誤此穴似瞳子髎疑是其穴千金曰眼戴精上插灸目兩眥後二十壯蓋指魚尾睛中眼黑珠正中取穴之法先用布搭目外以水淋一刻吳文炳作冷水方將三稜針於目外角離黑珠一分許刺入半分之微然後入金針約數分深旁入吳文炳無旁入二字自上層轉撥向瞳人輕輕而下斜插定目角即能見物一飯頃吳文炳作一法要出針輕扶偃臥仍用青布搭目外再以冷水淋三日夜止初針之時正坐盤膝將筋一把兩手握於胸前寧心正視其穴易得治一切內障年久不能視物頃刻光明神祕穴也大成光明對瞳人上眉中是光明穴銀海精微內迎香鼻孔中治目熱暴痛用蘆管子搐出惡血效大成鼻交頞中鼻孔頞中一穴針入六分得氣即瀉留三呼瀉五吸不補亦宜灸然不如針千翼按經脈篇曰足陽明之脈起於鼻之交頞中是其名稱所出鼻準鼻柱尖上是穴專治鼻上生酒酢風宜三稜針出血效大成鼻柱治涕出不止灸鼻兩孔與柱齊七壯千金夾上星治鼻中息肉夾上星相去三寸各百壯千金上齦里正當人中及唇針三鋥治馬黃黃疽等病千金按千金翼作三分鋥上齶入口裡邊在上縫赤白脈是針三鋥治馬黃黃疽四時等病千金按千金翼脈下有上字舌下挾舌兩邊針治黃疸等病千金按千金翼灸黃法作舌下挾舌兩邊針鋥次注曰足少陰舌下二穴在人迎前是曰舌本不與是同口齒類要曰舌下廉泉此屬腎經說已見唇里正當承漿裡邊逼齒齦針三鋥治馬黃黃疽寒暑溫疫等病千金按內經集注曰任脈之齦交入下齒詳齦交下俠人中火針治馬黃黃疽疫通身並黃語音已不轉者千金俠承漿去承漿兩邊各一寸千金燕口狂風罵詈撾斫人名為熱陽風灸口兩吻邊燕口處赤白肉際各一壯千金按千金風喑狂邪口眼相牽等往往灸之宜據本類考之千金曰狂走刺人或欲自死罵詈不息稱鬼神語灸口吻頭赤白際一壯又小兒大小便不通灸口兩吻各一壯頰裡從口吻邊入往對頰裡去口一寸針主治馬黃黃疸寒暑溫疫等頰兩邊同法千金按千金翼針作鋥聚泉舌上當舌中吐出舌中直有縫陷中是穴治哮喘咳嗽及久嗽不愈若灸則不過七壯灸法用生薑薄切一片搭於舌上穴中然後灸之如熱嗽用雄黃末少許和於艾炷中然後灸之如冷嗽用款冬花為末和艾炷中灸之灸畢以清茶連生薑細嚼咽下又治舌苔舌強亦可治用小針出血大成左金津右玉液舌下兩旁紫脈上類經捲舌取之大成按大全曰金津一穴在舌下左邊玉液一穴在舌下右邊醫經小學曰舌底紫脈有二穴左為金津右為玉液奇效良方曰在舌下兩脈紫脈上是穴捲舌取之治重舌腫痛喉閉用白湯煮三稜針出血海泉舌下中央脈上類經按大全曰在舌理中奇效良方曰在舌下中央脈上是穴治消渴用三稜針出血瘧論曰舌下兩脈廉泉也海疑是廉字之誤廉泉之說既見舌柱舌下之筋如柱者類經按終始篇曰重舌刺舌柱又按海泉舌柱疑是同處懸命一名鬼祿鬼邪妄語灸懸命十四壯穴在口唇里中央弦弦者是也又用剛刀決斷絃弦者乃佳千金按千金翼剛作鋼明堂作上唇中央弦上頭縫額角發尖處治頭目昏沉太陽痛大全按是頭維穴歟下頤頤下骨陷中次注按骨空論云髓空在腦後五分顱際鋭骨之下一在齦基下次注曰當頤下骨陷中有穴容豆中誥圖經名下頤面八邪穴外科全書云面八邪一承光兩穴在髮際二攢竹兩穴在眉心三禾窖在口上唇人中兌端左右四人迎在口下唇回發五處以繩橫度口至兩邊既得口度之寸數便以其繩一頭更度鼻盡其兩邊兩孔間得鼻度之寸數中屈之取半合於口之全度中屈之先覓頭上回發當回發千翼有中字灸之以度度四邊左右前後當繩端而灸前以面為正並依年壯多少一年凡三灸皆須瘡瘥又灸壯數如前若連灸火氣引上其數處回發者則灸其近當鼻也若回發近額者亦宜灸若指面為瘢則缺其面處然病重者亦不得計此也千金按千金翼連灸作速灸督脈卒癲灸督脈三十壯三報穴在直鼻中上入髮際千金左角結喉維角舌根按以上四穴出千金翼方雜法篇中無穴注額頂按出大全鶴膝風條無穴注未知何處中矩一名垂矩在齆下骨里曲骨中此一穴出華他傳也主中風舌強不能語及舌乾燥丹波康賴醫心方按燥一本作濿誤也背腰部第二肩頭灸癬法八月八日日出時令病人正當東向戶長跪平舉兩手持戶兩邊取肩頭小垂際骨解宛宛中灸之兩火俱下各三壯若七壯十日愈千金按資生經云灸牙疼法隨左右所患肩尖微近後骨縫中小舉臂取之當骨解陷中灸五壯豫親灸數人皆愈灸畢頃大痛良久乃定永不發豫親病齒痛百方治不驗用此瘥肩柱骨肩端起骨尖上大成按與肩頭穴同處巨闕俞第四椎名巨闕俞主胸膈中氣灸隨年壯千翼第四椎名厥陰俞主胸中膈氣積聚好吐隨年壯灸之同上按與腹部巨闕同名異穴千金曰胸膈中氣灸闕腧注曰扁鵲云第四椎下兩旁各一寸半名闕腧詳於背部二行中臣覺背上甲內側反手所不及者骨芒穴上捻之痛者是也千金骨芒穴上六分千翼按千金注曰臣覺亦作巨攪千金翼云狂走喜怒悲泣灸巨覺而甲作俠注曰一云巨闕俞又雜法篇作巨覽注曰一作覺千金頭注曰骨芒疑膏肓之誤胃脘下俞三穴治消渴咽喉干灸胃脘下腧三穴灸百壯穴在背第八椎下橫三間寸灸之千金背甲中間狂走刺人或欲自死罵詈不息稱鬼神語灸背甲中間三壯報灸之倉公法神效千金腰目消渴小便數灸腰目在腎俞下三寸亦挾脊骨兩旁各一寸半左右以指按取千金以指按陷中千翼按千金曰消渴小便數灸當脊梁中央解間一處與腰目上兩處凡三處腰目窖腰痛灸腰目窖七壯在尻上約左右是千金腰眼一名鬼眼大成一名癸亥阿是要穴令病人平眠以筆於兩腰眼宛宛中點二穴各灸七壯此穴諸書所無而居家必用載之云纍試纍驗類經按腰目以下三穴蓋同穴也針灸大成曰鬼眼專主癆蟲令病人舉手向上略轉後些則腰上有兩陷居家必用云治諸癆瘵已深難治者以癸亥日二更盡入三更令病人平眠以筋於兩腰眼點兩穴各灸七壯纍試纍驗類經曰癸亥二更後將交夜半乃六神皆聚之時勿使人知令病者解去下衣舉手向上略轉後些則腰間兩旁自有微陷可見是名鬼眼穴即俗人所謂腰眼也正身直立用墨點記然後上床合面而臥用小艾炷灸七壯或九壯十一壯尤好其蟲必於吐瀉中而出燒燬遠棄之可免傳染比四花等穴尤易且效岡本阿是要穴一名癸亥頂椎千金脊梁中央消渴小便數灸兩手小指頭及足兩小趾頭並灸頂椎佳又灸當脊梁中央解間一處與腰目上兩處凡三處千金按千金翼灸黃法脊中椎上七壯蓋同處督俞一名高蓋資生在六椎下兩旁各半寸通灸資生入門正坐取之金鑑禁針資生按資生背俞第二行載此穴曰銅人經缺此穴明堂經有之今依明堂入在此恐銅人本不全也類經寸半作二寸入門灸三壯主寒熱心痛腹痛雷鳴氣逆高蓋與腎俞同名氣海俞在十五椎下兩旁各寸半通灸資生入門正坐取之大成按類經寸半作二寸入門入足太陽經主腰痛痔漏資生曰明堂有氣海俞而銅人無之恐銅人本不全關元俞在十質椎下兩旁各寸半通灸資生入門伏而取之大成金鑑按類經寸半作二寸入門入足太陽經主風勞腰痛泄痢虛脹小便難婦人瘕聚諸疾資生曰明堂有關元俞而銅人無之恐銅人本不全髃骨次注新校正見肩髃下中樞次注靈臺次注陽關次注闕俞千金一名厥陰俞資生以上四穴載背部中行部督脊小兒驚癇脊強反張灸大椎並灸諸臟腧及督脊上當中從大椎至窮骨中屈更從大椎度之灸度下頭是督脊也右背部十二處十日兒可灸三壯一月以上可灸五壯千金五胠俞素問見譩嘻下精宮入門見志室下痞根專治痞塊十三椎下各開三寸半多灸左邊如左右俱有左右俱灸入門以指揣摸自有動處即點穴灸之大約穴與臍平類經中空從腎俞穴量下三寸各開三寸是穴此即膀胱經之中髎也大成按不當中髎是注誤下極俞第十五椎名下極俞主腹中疾腰痛膀胱寒澼飲注下隨年壯灸之千翼按難經下極之腧滑壽曰兩陰之間屏翳處也不與此同千金無第十五椎及中字肩上脾俞下四寸挾脊梁一寸半二穴千翼脊背五穴類經治大人癲小兒驚癇法灸背第二椎及下極骨兩處以繩度中折繩端一處是脊骨上也凡三處畢復斷此繩作三折令各等而三合如某字以一角注中央灸下二角挾脊兩邊便灸之凡五處也以丹注所灸五處灸百壯削竹為度勝繩也千翼俠脊治霍亂轉筋令病人正合面臥伸兩手著身以繩橫兩肘尖頭依繩下挾脊骨兩旁相去一寸半灸一百無不瘥者千翼按注曰肘後方云此華他法濁浴挾膽腧旁行相去五寸千金按千金曰治胸中膽病千金翼同下腰八魁正中央脊骨上灸數多尤佳三宗骨是忌針千金按千金曰泄痢久下失氣勞冷灸下腰百壯三報千金翼無央字又按八魁三宗骨未詳東醫寶鑑魁作髎稍通榮衛四穴大小便不利欲作腹痛灸榮衛四穴百壯穴在背脊四面各一寸千金千翼按背脊四面未知何處恐脫語醫學綱目云在背脊四面各一寸八分腰眼下三寸挾脊相去四寸兩邊各四穴灸十壯至百壯回氣五痔便血失屎灸回氣百壯穴在脊窮骨上千金赤白肉下類經按千金翼回作回曰五痔便血失屎灸回氣百壯在脊窮骨上赤白下灸窮骨惟多為佳赤白下蓋言下穢物類經加肉字曰脊窮骨上赤白肉下更按窮骨上似無赤白肉果夫張氏之是乎團岡腹熱閉時大小便難腰痛連胸灸團岡百壯穴在小腸俞下二寸橫三間寸灸之千金按千金翼腹作腹中似中膂穴醫學綱目東醫寶鑑作環岡後腋治頸漏背後兩邊腋下後紋頭類經引千金腋後廉際兩筋間主腋外相引而痛手臂拘攣急不得上頭外臺按類經作後腋下穴阿是要穴曰頸漏今所謂氣腫一曰瘰癧漏也接脊小兒痢下赤白秋末脫肛每廁肚疼不可忍者灸十二椎下節間名接脊穴灸一壯如小麥大明堂胛縫背端骨下直腋縫尖及臂取二寸半瀉六吸主治肩背痛連胛醫綱按玉童賦曰肩脊痛兮五樞兼於背縫寶鑑無二寸半三字背籃治瘧如神令病人跣足於平正處並腳立用繩一條自腳枝周匝截斷卻於頂前般過背上兩繩盡處脊骨中是穴先點記待將發急以艾灸之三七壯其寒熱自止此法曾遇至人傳授妙不可言名曰背籃穴也壽世保元尾翠骨上三寸骨陷間明堂按與長強同名骨上蓋言窮骨上身八邪穴外科全書云身八邪一肩井在兩頸側二風門挾脊對第四節三肺俞挾脊對第五節四曲澤在兩臂曲按四節五節當作二節三節第二十二椎兩傍主腰背不便筋攣痹縮虛熱閉塞灸隨年壯兩旁各一寸五分千翼按脊椎二十一節古今通說今言二十二椎者連數項骨者歟恐有誤四花患門一名六花幼幼新書蘇沈良方曰灸三十種骨蒸法崔丞相灸勞法外臺祕要崔相家傳方及王寶臣經驗方悉編載然皆差誤昆陵郡有石刻最詳余取諸本悉校成此一書此古方極為委曲依此治人未嘗不驗往往一灸而愈豫在宣城久病虛羸用此而愈唐中書侍郎崔知悌序曰夫含靈受氣稟之於五行外臺作常同義構生申理降之以萬安方作於六疾岐黃廣記蔚外臺作抑有舊經攻灸兼行顯著斯術骨蒸病者又名傳尸又謂殗殜又稱伏連萬安方作死敗又曰無辜萬安方無此四字大夫以癖氣為根婦人以血氣為本無問長萬安方作老少多染此病嬰孺之流傳注更苦其為狀也發乾而聳而聳萬安方作露耳或聚或分或腹中有塊或腦後兩邊有結多者乃至五六或夜臥盜汗夢與鬼交雖自外臺萬安方作目視分明而四肢無力或上氣食少漸就沉羸縱延日時終於𣩄盡余昔忝洛十藥神書作潞州司馬嘗三十日灸治外臺萬安作活一十三人前後瘥者數逾二百至於貍骨獺肝徙聞曩說金牙銅鼻罕見其能未若此方扶危拯急非止單攻骨蒸又別療氣療風或瘴或癆或邪或患狀既廣灸治萬安作活不可具述略陳梗概又恐傳授訛謬以誤將來今故具萬安作具故圖形狀庶令覽者易悉使所有外臺萬安作在流布頤外臺萬安作顱用家藏未暇外請名醫旁求上藥還魂返魄何難之有遇斯疾可不務乎陳仕賢濟世良方曰青囊經云此四花穴法醫者圖要精於點取患