body:
  text: 卷之五足部第九並圖骨度篇曰橫骨上廉以下至內輔之上廉長一尺八寸內輔之上廉以下至下廉長三寸半內輔下廉以下至內踝長一尺三寸內踝以下至地長三寸膝膕以下至跗屬長一尺六寸跗屬以下至地長三寸髀樞以下至膝中長一尺九寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸足長一尺二寸廣四寸半足太陰脾及股凡二十二穴隱白素問一名鬼壘千金一名鬼眼醫燈續焰足大指端內側也為井靈樞爪甲上去端如韭葉素問爪甲角外臺禁灸入門按明堂載華佗穴蓋隱白也詳於奇穴部千金指作趾下諸穴皆同太都靈樞本節之前下陷者之中也為滎靈樞大指本節內側赤白肉際肘後按本節謂大指本節承上文也前舊作後甲乙千金千金翼外臺次注資生以下諸書從之醫學綱目獨作本節之前是也不然則太白不應容核骨下故今訂之金鑑作次節末骨縫非也肘後側下赤字誤作寸今改訂之太白靈樞核骨之下也為腧靈樞內側陷者中甲乙赤白肉際類經按核舊誤作腕經脈篇云脾足太陰之脈起於大指之端循指內側白肉際過核骨後甲乙千金千金翼外臺次注皆作核故知腕字傳寫之誤今訂之核梅核桃核之核大指本節後骨之如梅核者是也甲乙等謂內踝前大骨即然骨也次注解腕字以為內踝前者不知其誤也發揮流注條作覆骨注之曰一作核骨俗云孤枵骨是也孤枵骨踝骨別名非核骨也類經云即大指本節後內側圓骨也得之甲乙內側下有核骨字省之公孫靈樞去本節之後一寸別走陽明靈樞為原千金按本節之後一寸近上側逼骨本節者大指之本節也入門金鑑作太白後一寸不是類經曰內踝前陷中正坐合足掌相對取之千金說源經者不與本輸篇同未知其據暫記俟後日商丘靈樞內踝之下陷者之中也為經靈樞內踝下微前甲乙前有中封後有照海此穴居中神應內踝下有橫紋如偃口形類經三穴隔小筋增注按丘入門作坵金鑑作邱口恐刀字三陰交甲乙一名承命一名太陰千金內踝上三寸骨下陷者中甲乙骨後筋前入門孕婦禁刺類經按千金及千金翼灸㿗卵法作八寸誤千金曰狂邪驚癇灸承命穴在內踝後上行三寸動脈上又曰女人漏下灸太陰名三陰交千金翼云太陰內踝上一名三陰交又云針足太陰穴在內踝上一夫一名三陰交今並移入於別名骨下謂䯒骨後也肘後曰踝尖上三寸金鑑從之非也凡踝上踝下之屬皆除骨言之資生曰昔宋太子善醫術出苑逢一妊婦太子診曰女令徐文伯診曰一男一女針之瀉三陰交補合谷應針而落果如文伯言外臺引集驗方曰內踝上大脈並四指是也捷法之說既見上漏谷甲乙一名太陰絡資生內踝上六寸骨下陷者中甲乙禁灸入門按谷大全作裕絡千金作胳聚英作經誤聚英吳文炳並大成骨下作䯒骨下金鑑作夾骨地機甲乙一名脾舍甲乙膝下五寸甲乙膝內側輔骨下陷中伸足取之明堂按甲乙曰太陰郄別走上一寸空在膝下五寸刺腰篇曰刺散脈在膝前骨肉分間絡外廉束脈王冰注之曰是地機機入門作箕蓋以音通輔舊作轉資生同傳寫之誤內輔骨至踝骨一尺三寸先取其中為六寸半少下為漏谷其下取中乃三陰交也其六寸五分中除一寸半取地機共著䯒骨金鑑作從漏谷上行五寸在膝下五寸內側夾骨陷中非矣從漏谷上行則五寸半陰陵泉靈樞輔骨之下陷者之中也伸而得之為合靈樞膝下內側甲乙與陽陵泉內外相對一曰稍高一寸許類經禁灸入門按靈樞曰陰之陵泉或無之字陽陵泉亦同伸而得之言伸足而得之也以指按輔骨後旁骨而上則至輔骨下指自止者此穴也資生作當曲膝取之金鑑作曲膝橫紋頭非也類經聚英作或曲膝取之廢古書一何至於此岡本以此穴為曲泉上是曲膝之失也血海甲乙一名百蟲窠大全膝臏上內廉白肉際二寸半甲乙骨後筋前入門陷中類經按外臺資生發揮半作中誤千金翼聖濟作二寸千金注入門大成作三寸金鑑作一寸並非也類經作膝內輔上橫入五分拘矣箕門甲乙魚腹上越兩筋間動脈應手太陰內市甲乙陰股內資生血海上六寸入門禁刺入門類經一說按越兩筋千金無越兩二字千金翼外臺無兩字又按外臺一作股上起筋間類經聚英醫統從之資生發揮大全寶鑑醫統吳文炳亦作越筋間越起字之訛字畫相近而誤寶鑑引靈樞曰股上起筋間是外臺一說之祖然今本無此語甲乙曰太陰內市千金千金翼外臺並作陰市內蓋字之訛太陰內市疑是入陰股內暫記俟來哲今以資生系本注足厥陰肝及股凡二十二穴大敦靈樞一名水泉千金一名大順醫學正傳足大指之端及三毛之中也為井靈樞爪甲上與肉交者素問去爪甲如韭葉甲乙按次注曰爪甲角非也此穴取爪甲上近三毛之中處是古來之說也類經載一說曰內側為隱白外側為大敦聚英醫統從之非也凡井穴靈樞有言內外側又有不言之似不可混焉甲乙有靈樞所不言而言之者乃古傳不可廢唯此穴曰及三毛之中又繆刺篇云三毛上何取外側千金曰足大指聚毛中是也又云石淋灸水泉三十壯大敦是也今為一名又云衄時癢癢便灸足節理三毛中十壯劇者百壯衄不止灸之並治陰卵腫蓋指大敦聚英醫統作大指縫間非也行間靈樞足大指間也為滎靈樞動脈陷者中甲乙大指次指岐骨間上下有筋前後有小骨尖其穴正居陷中類經按大全作大指外間千金外臺脈下有應手二字太衝靈樞行間上二寸陷者之中也為腧靈樞足大指本節後二寸或曰一寸五分甲乙動脈應手次注按甲乙載二說諸書從之考之其云自行間二寸則帶本節而言云自本節後二寸則除本節也然則一寸五分之說近是今據靈樞取行間穴上二寸是矣外臺作二寸半類經曰在足大指本節後行間上二寸內間有絡亙連至地五會二寸骨罅間動脈應手陷中資生曰診太衝脈可決男子病死生聚英作診病人太衝脈有無可以決死生又注太谿曰男子婦人病有此脈則生無則死張介賓注衝陽曰仲景所謂趺陽也按仲景趺陽者非穴名指趺上動脈太衝衝陽太谿共所謂趺陽也中封靈樞一名懸泉千金內踝之前一寸半陷者之中搖足而得之為經靈樞斜行小脈上千金貼足腕上大筋陷中類經為原千金按一寸半甲乙千金並翼方外臺以下諸書作一寸與商丘混今從古說千金雜病論次注作一寸半是也搖足甲乙以下皆作仰足取之陷者中伸足乃得之千金筋極篇作內踝前筋里宛宛中癭瘤篇作兩足趺上曲尺宛宛中千金曰為原說既見蠡溝靈樞一名交儀資生去內踝五寸別走少陽靈樞陷者中明堂按諸書作內踝上儀大全作儀千金曰交儀在內踝上五寸不言蠡溝一名故從資生中都甲乙一名中郄千金一名太陰外臺厥陰郄內踝上七寸䯒中與少陰相直甲乙脛骨中外臺為經千金按與少陰相直五字未詳少恐太之誤以上二穴取䯒骨中外臺一作陰陵泉三陰交中間膝關甲乙犢鼻下二寸陷者中甲乙按千金千金翼作三寸非類經聚英寶鑑大成吳文炳作犢鼻下二寸旁千金曰厥陰郄蓋誤曲泉靈樞輔骨之下大筋之上也屈膝而得之為合靈樞大筋上小筋下陷者中甲乙膝內屈紋頭千金按輔骨內輔骨也陰包甲乙一名陰胞大全膝上四寸股內廉兩筋間足厥陰別走甲乙陷者中明堂踡足取之看膝內側必有槽者中類經按包資生曰明堂作胞今從徐鳳為一名別走甲乙注曰此處有缺外臺類經同五里甲乙陰廉下去氣衝三寸陰股中動脈甲乙按千金千金翼作陰廉下二寸外臺作陰廉下二寸去氣衝三寸未知孰是陰廉去氣衝二寸則此穴在陰廉下一寸恐字誤岡本以為陰股橫紋中亦可疑刺禁論曰刺陰股下三寸張注曰五里穴也陰廉甲乙羊矢下去氣衝二寸動脈中甲乙陰股橫紋中岡本按類經金鑑作羊矢下斜里三分直上未詳類經曰羊矢在陰旁股內約紋縫中皮肉間有核如羊矢入門載羊矢穴詳於奇穴部足少陰腎及股凡二十穴湧泉靈樞一名地衝甲乙足心也為井靈樞足下中央之脈素問取足心者使之跪素問陷者中屈足卷指宛宛中甲乙按沖聚英作衢足心腳掌中心也肘後曰灸蹶心當拇指大聚筋上六七壯名湧泉此說恐有訛千金作腳心大趾下大筋又作足心下當拇指大筋上外臺所引甄權明堂並作白肉際非然谷靈樞一名龍淵甲乙一名然骨類經然骨之下者也為滎靈樞足內踝前起大骨下陷者中甲乙內踝前直下二寸千金按淵千金作泉說已見素問曰傷少陰之絡刺足內踝之下然骨之前又曰無積者刺然骨之前次注曰然谷穴也千金翼聚英作一寸太谿靈樞一名呂細類經內踝之後跟骨之上陷者中也為腧靈樞動脈甲乙內踝後五分類經即原也類經按聚英曰男子婦人病有此脈則生無則死說已見類經曰原者未知何據大鐘靈樞當踝後繞跟別走太陽靈樞動脈次注大骨上兩筋間聚英按甲乙千金外臺資生等作足跟後沖中次注作內踝后街中又作足跟後聚英吳文炳大成作踵中按沖街踵皆傳寫之誤當作陷入門作太谿下五分拘矣照海甲乙一名陰蹺大全足內踝下一寸甲乙容爪甲千金前後有筋上有踝骨下有軟骨其穴居中神應按神應經曰內踝下四分類經一云內踝下四分微前高骨陷中非也千金千金翼外臺無一寸二字素問云陰陽蹺四穴王冰注之以為陰蹺照海陽蹺申脈水泉甲乙少陰郄太谿下一寸在足內踝下甲乙微後增注為原千金按下疑後誤然千金千金翼外臺從之以下諸書皆同故不謾改之太谿在踝後則其下一寸當內踝後故以增注示其意已千金水泉一名大敦說見太敦復留靈樞一名伏白一名昌陽甲乙一名外命外臺上內踝二寸動而不休為經靈樞陷者中甲乙前旁骨是交信後旁筋是復留二穴只隔一筋類經按留甲乙作溜古字通用千金作伏留無異義動而不休言動脈也類經作前旁骨是復溜後旁筋是交信聚英醫統吳文炳金鑑從之是傳寫之誤故今二穴換地矣金鑑筋作骨神應經作踝後五分與太谿相直且有除踝語然踝上皆除踝而言骨度分寸固然交信甲乙足內踝上二寸少陰前太陰後筋骨間陰蹺之郄甲乙復溜前入門三陰交後下一寸增注按入門作三陰交後非也此穴在後下一寸也少陰前言本經復溜穴太陰後言三陰交也千金千金翼外臺聚英醫統共作太陰後廉資生曰太陰後廉前筋骨間腨金鑑作從復溜斜外上行復溜穴之後二寸許後旁筋非也又資生曰按素問氣府論陰蹺穴注云謂交信也在內踝上二寸少陰前太陰後筋骨間陰蹺之郄竊意陰蹺即交信也至氣穴論陰陽蹺穴注乃云陰蹺穴在內踝下足謂照海陰蹺所生則是陰蹺乃照海非交信云云王冰注素問此類極多學者須知之築賓甲乙陰維之郄在足內踝上腨分中甲乙按賓入門作濱腨分中腨腹分肉之中也金鑑曰俗名腿肚聚英醫統作內踝上五寸入門曰骨後大筋上小筋下屈膝取之是陰谷之注誤不可從陰谷靈樞輔骨之後大筋之下小筋之上也按之應手屈膝而得之為合靈樞與曲泉並向膕處增注按此穴在曲泉後大筋小筋之間也按之應手謂動脈也甲乙作膝下內輔骨後次注類經聚英醫統金鑑從之千金千金翼外臺資生入門發揮寶鑑無下字是也輔骨吳文炳作側骨足陽明胃及股凡三十穴厲兌靈樞足大指內次指之端也為井靈樞爪甲上與肉交者素問去爪甲角如韭葉甲乙外側衛生寶鑑按繆刺篇曰足中指次指爪甲上王太僕既辨之大指下內字衍宜削內庭靈樞次指外間也靈樞陷者中甲乙按次指大指次指也入門作次指三指岐骨陷中金鑑作次指本節前岐骨外間非也陷谷靈樞中指內間上行二寸陷者中也為腧靈樞足大指次指外間本節後陷者中去內庭二寸甲乙按明堂谷作骨甲乙舊作大指次指間外臺從之共間上脫外字今據千金千金翼資生補之入門作骨陷中衝陽靈樞一名會原甲乙一名會湧聖濟足跗上五寸陷者中也為原搖足得之靈樞骨間動脈上去陷谷三寸甲乙內庭上五寸入門按跗甲乙作趺同三寸千金方一說神應類經作二寸金鑑陷谷條作從衝陽下行二寸共非也素問云刺跗上中大脈血出不止死張介賓曰即仲景所謂跗陽說已見千金翼脫肛篇曰衝陽穴恐有誤謬載於奇穴部解谿靈樞上衝陽一寸半陷者中也為經靈樞腕上甲乙系鞋處明堂足大指次指間直上跗上宛宛中類經去內庭上六寸半入門按溪明堂作溪甲乙注並類經曰氣穴論注作二寸半今本作一寸半刺瘧論注作三寸半誤豐隆靈樞去踝八寸別走太陰靈樞外踝上八寸下廉胻外廉陷者中甲乙按發揮無下廉之廉字聚英踝作跗非矣巨虛下廉素問一名下廉靈樞一名下巨虛千金下上廉三寸靈樞條口下一寸外臺三里下六寸入門舉足取穴資生按三寸外臺作二寸非資生引明堂曰兩筋兩骨罅陷宛宛中蹲地坐取之是誤引上廉注也肘後曰上廉下一夫不取素問曰巨虛者蹺足䯒獨陷者下廉者陷下者也條口甲乙下廉上一寸甲乙上廉下二寸外臺舉足取之資生三里下五寸類經按肘後曰上廉下一夫資生作廉上一寸廉字上脫下字又引明堂作上廉下上下字畫易誤蓋傳寫之誤巨虛上廉素問一名上廉靈樞一名上巨虛千金下三里三寸靈樞蹺足䯒獨陷者素問犢鼻下䯒外廉六寸次注䯒骨外大筋內骨之間明堂兩筋兩骨罅陷宛宛中蹲坐取神應按肘後曰三里下一夫不取三里素問一名下陵靈樞一名鬼邪千金膝下三寸分間素問下陵膝下三寸䯒骨外三里也為合靈樞低跗取之同上䯒外廉甲乙附脛骨外邊捻之凹凹然也肘後兩筋肉分間次注大筋內筋骨之間陷者宛宛中明堂重按之則足跗上動脈止矣次注小兒禁灸類經一說按氣府論曰三里以下至足中指各八俞分之所在穴空次注曰謂三里上廉下廉解谿衝陽陷谷內庭厲兌八穴也針解篇曰所謂三里者下膝三寸也所謂跗之者舉膝分易見也新校正曰按全元起本跗之作低胻太素作付之按骨空論跗之疑跗上刺腰痛論曰刺陽明於䯒前次注曰正三里穴也按取此穴上逼骨下傍筋不附骨則無驗捷法甚多不可從肘後曰以病人手橫掩下並四指名曰一夫指至膝頭骨下指中節是其穴不取一夫說既見只以附脛骨以下系本注聚英一說入門作犢鼻下三寸非也凡言膝上膝下皆除膝臏骨而言之資生本事方作舉足取之發揮聚英醫統從之蓋原針解篇類經作豎膝低跗取之原邪氣臟腑病形篇犢鼻素問膝下胻上膝解大筋中甲乙膝頭眼外側入門形如牛鼻故名類經刺犢鼻者屈不能伸靈樞禁灸入門刺膝臏出液為跛素問按膝下千金並翼方次注外臺作膝臏下胻上言䯒骨上骨空論云䯒骨空在輔骨之上端次注曰謂犢鼻也膝解舊作俠解千金次注外臺資生聚英吳文炳同傳寫之誤也聖濟明堂發揮類經作骨解胻千金資生作骭骭腳脛也外臺腳氣篇作膝蓋上外角宛宛中不是金鑑作膝蓋骨下胻骨上陷中俗名膝眼此處陷中兩旁有空膝眼非指穴名然易混屈不能伸言取此穴屈足而取之梁丘甲乙一名跨骨大成陽明郄膝上二寸甲乙兩筋間千金按丘金鑑作邱千金一說作三寸大成作膝臏上一寸非陰市甲乙一名陰鼎甲乙膝上三寸伏兔下若拜而取之甲乙陷者中次注膝內輔骨後大筋下小筋上類經禁灸甲乙雖云禁灸家傳亦灸七壯大成次注曰灸三壯按千金消渴篇作當伏兔上行三寸臨膝取之入門作伏兔陷中又按素問云股骨上空在股陽出上膝四寸次注曰在陰市上伏兔穴下在承捷也按今此處無穴名蓋陰市穴也未詳梁丘直膝頭上斜從分肉到橫骨旁橫紋止髀關此其流注之溪谷可考矣伏兔素問一名外勾大全一名外丘寶鑑膝上六寸起肉間甲乙正跪坐取之資生膝蓋上七寸資生一說左右各三指按捺上有肉起如兔狀因以此名類經膝髀罅上六寸向里入門禁灸甲乙千金狂邪鬼語灸百壯按兔素問作菟千金翼聚英吳文炳同兔菟通吳昆作兔外臺起肉作起內寫誤蓋言七寸者自膝蓋上度之髀關甲乙膝上伏兔後交分中甲乙跨骨橫紋中入門禁灸類經一說按分發揮類經作文又通類經作膝上一尺二寸拘矣髀大全作脾又作髃誤足少陽膽及股凡二十八穴竅陰靈樞足小指次指之端也為井靈樞爪甲上與肉交者素問去爪甲如韭葉甲乙第四指外側入門按千金翼作去爪甲角如韭葉俠谿靈樞足小指次指之間也為滎靈樞二岐骨間本節前陷者中甲乙按俠聚英吳文炳作夾千金無二字金鑑作地五會下行一寸拘矣地五會甲乙足小指次指本節後間陷者中甲乙灸之令人瘦不出三年死甲乙禁刺入門按資生類經聚英入門醫統吳文炳大全大成作去俠谿一寸拘矣凡取之骨節陷罅不用折量所以古書不言分寸也入門脫會字臨泣靈樞上行一寸半陷者中也為腧靈樞小指次指本節後間陷者中去俠谿一寸五分甲乙按靈樞曰臨泣上行言臨泣者自俠谿上行千金千金翼外臺作去俠谿一寸半是也臨泣下當脫俠谿二字此穴取岐骨際者非也岐骨間而不逼骨故靈樞云一寸半陷者中大全一說去俠谿七分半非丘墟靈樞外踝之前下陷者中也為原靈樞外廉踝下如前甲乙骨縱中聚英伸腳取之千翼一說按入門丘作坵金鑑作邱如大全入門作微寶鑑同甲乙曰去臨泣一寸千金千金翼外臺次注明堂資生以下諸書作三寸此穴不可用分寸故不取懸鐘甲乙一名絕骨千金足外踝上三寸動者脈中足三陽絡按之陽明脈絕乃取之甲乙骨絕頭陷中外臺當骨尖前類經按者字衍千金並翼方外臺無脈字外臺絡上有大字陽明跗上脈也踝上就䯒骨而上三寸許則有絕隴處其骨鋒尖者俗呼楊枝骨也其前是懸鐘也千金咳嗽篇作內踝上字誤也又千金曰腳外踝上一夫又云四寸本事方資生一說作四寸四寸則與陽輔穴相併不可從外臺灸腳氣篇云一尺肘後作外踝上三寸余指端取踝骨上際屈指頭四寸便是與下廉頗相對分間二穴也千金翼云外踝上三指當骨上取法以草從手指中紋橫三指令至兩畔齊將度外踝從下骨頭與度齊向上當骨點之並非是神應經云雖曰外踝上除踝三寸必以絕隴處為穴此說為得陽輔靈樞一名絕骨素問一名分肉類經外踝之上輔骨之前及絕骨之端也為經靈樞外踝上四寸輔骨前絕端如前三分去丘墟七寸甲乙按氣穴論云分肉二穴次注曰外踝上絕骨之端三分筋肉分間陽維脈氣所發新校正曰甲乙經無分肉穴疑是陽輔素問直解曰臍上三寸水分穴也恐非又骨空論云外踝上絕骨之端灸之次注曰陽輔穴也刺瘧云針絕骨王曰陽輔穴也難經云髓會絕骨滑壽曰絕骨一名陽輔按與懸鐘同一名恐有差謬去丘墟七寸則以踝骨為三寸外臺作膝蓋下外側三寸旁廉骨當小指兩筋間非也類經引次注曰作如後二分今本與甲乙同醫門摘要曰輔骨當作䯒骨非也千金翼諸風篇曰外踝上三寸一云四寸又云一夫光明靈樞去踝五寸別走厥陰靈樞外踝上甲乙陷者中明堂外丘甲乙足少陽郄少陽所生在外踝上七寸甲乙骨陷中入門陽交後增注按丘金鑑作邱甲乙舊作內踝寫誤陽交已作外踝千金外臺以下諸書作外踝故今訂之陽交甲乙一名別陽一名足窌甲乙陽維之郄在外踝七寸斜屬三陽分肉間甲乙與外丘並入門下廉後外丘前增注按陽明經下廉本經外丘太陽經飛揚共踝上七寸是三陽之分肉也陽陵泉靈樞膝外陷者中也為合伸而得之靈樞膝下一寸䯒外廉甲乙膝下外尖骨前千金陷中千翼側骨下宛宛中外臺按靈樞曰陽之陵泉說已見神應經無泉字蓋脫字也臟腑病形篇曰其寒熱者取陽陵泉刺腰痛篇云刺少陽成骨之端出血成骨在膝外廉之骨獨起者婁善全曰按此謂陽陵泉吳昆曰陽關穴也張注曰此乃胻骨之上端所以成立其身故曰成骨甲乙成作盛氣穴論曰寒熱俞在兩骸厭中二穴次注曰骸厭謂腳外挾膝之骨厭中王水舍兩字為骸厭兩字不可除集註曰膝解為骸兩骸厭中二穴謂少陽之陽陵泉也入門作膝品骨下一寸外廉兩骨陷中類經作尖骨前筋骨間亦通神應經作膝下外骨前六分拘矣類經入門聚英醫統吳文炳金鑑大成作蹲坐取是原於臟腑病形篇陽陵泉者正豎膝予之齊取之說也陽關甲乙一名關陵千金注一名陽陵聚英一名關陽寶鑑陽陵泉上三寸犢鼻外陷者中甲乙外輔骨上膝蓋旁筋骨間岡本禁灸甲乙禁針入門按千金作關陽蓋錯置後人遂以為一名歟資生入門作二寸金鑑作膝上二寸非也素問云寒府在附膝外解營類經曰謂在膝下外輔骨解間也凡寒氣自下而上者必聚於膝是以膝臏尤寒故名寒府營屈也當足少陽經之陽關中犢甲乙髀骨外膝上五寸分肉間陷者中甲乙禁刺灸入門按犢千金外臺以下諸書作瀆未知孰是入門作下瀆字誤又作大骨外聚英吳文炳並曰少陽之絡別走厥陰諸書所不言也本經之絡乃光明也恐誤本事方曰風市是中瀆非詳於奇穴部環跳甲乙一名臏骨大全一名分中吳昆兩髀厭分中素問髀樞中側臥伸下足屈上足取之甲乙硯子骨下宛宛中神應屈上足橫紋頭骨下容指陷中增注按千金作鈈銚千金翼作環銚髀厭猶兩骸厭中軸髀樞謂髀上廉就小腹動搖處其下直下行當膝頭者也氣府論有髀樞中旁各一之紋恐陰股橫紋將盡之中碾子骨下旁是穴也屈上足按之則自有陷可容指伸則筋骨張起其陷即無焉硯子骨入門作碾子骨千金翼一說無子字大全作硯子骰與股通分中是分肉之分中即繆刺論所謂刺樞中厥病篇所謂側而取之在樞閤中之中言髀樞中吳昆曰分中穴名即環跳也以其當身之半故曰分中果是異說暫系之一名以示學者外臺曰環跳風市疑其別名非醫門摘要曰按此穴肩上前後左右之中央自兩乳引繩而取之妄誕足太陽膀胱及股凡三十六穴至陰靈樞足小指之端也為井靈樞爪甲上與肉交者素問小指外側去爪甲如韭葉甲乙爪甲角千金宛宛中明堂通谷靈樞本節之前外側也為滎靈樞陷者中甲乙按本節小指之本節也承上文束骨靈樞本節之後陷者中也為腧靈樞足小指外側甲乙赤白肉際次注京骨靈樞足外側大骨之下為原靈樞赤白肉際陷者中按而得之甲乙按聚英曰小指本節後大骨名京骨其穴在骨下而赤白肉作赤白骨字之誤金門甲乙一名關梁甲乙足太陽郄一空在足外踝下間陷中千金外踝下一寸類經陽維所別屬甲乙按聚英作梁關醫統吳文炳大成同一空骨空也聚英作申脈下一寸即外踝下一寸五分近白肉處何有骨空又神應經作外踝下少後丘墟後申脈前可謂欠其詳外踝下可容爪甲而定申脈當其下摸索骨空而得之申脈甲乙一名鬼路千金一名陽蹺大全外踝之下半寸所素問陽蹺所生足外踝下陷者中容爪甲許甲乙禁灸入門按資生發揮入門吳文炳大成作白肉際恐非此穴外踝下五分所容爪甲許則不至白肉際故不取千金曰勞冷氣逆腰臗冷痹屈伸難灸陽蹺一百壯在外踝下容爪指此穴大全為一名據此僕參甲乙一名安邪甲乙跟骨下陷者中拱足得之足太陽脈之所行也為經甲乙白肉際明堂按下醫統作上誤為經本輸篇及本書以崑崙為經穴疑誤故今削之崑崙靈樞外踝之後跟骨之上為經靈樞陷中細脈動應手甲乙外踝從地直上三寸兩筋骨中千金妊婦刺之落胎聚英按入門作崑崙誤大全曰一名下崑崙資生曰明堂有上崑崙又有下崑崙銅人只云崑崙而不載下崑崙按千金翼明堂有內崑崙然則下崑崙非一名自是異穴也三崑崙詳於奇穴部蓋其中一崑崙即此穴素問云外踝後灸之次注曰崑崙穴也跗陽甲乙一名附陽大全大成陽蹺之郄足外踝上三寸太陽前少陽後筋骨間甲乙陷者中明堂宛宛中資生飛揚下入門按跗千金千金翼次注外臺聖濟資生大全寶鑑作付明堂類經聚英入門金鑑醫統作附吳文炳陽作揚少陽膽經也太陽本經也諸書皆無異論然太陽恐少陰之誤也大成引聚英作一名付陽大全亦同附付跗相通非一名暫記而不削飛揚靈樞一名厥陽甲乙去踝七寸別走少陰靈樞足外踝上甲乙陷者中明堂骨後入門按靈樞揚作陽聖濟發揮類經金鑑同資生大全作九寸非刺腰痛篇曰刺飛揚之脈在內踝上五寸少陰之前與陰經之會似指此穴靈樞甲乙並云飛揚足太陽之絡別走少陰然內踝上五寸則蠡溝穴也按內當作外五當作七暫記俟智者刺腰痛篇新校正有五寸作二寸為復溜穴之說其文繁故不記於此承山靈樞一名魚腹一名肉柱甲乙一名傷山千金腨下去地一尺所素問兌腨腸下分肉間陷者中甲乙按傷山寶鑑大成作腸山果是也腨外臺作踹非也資生聚英一雲腿肚下類經作腿肚下尖入門作拱足去地一尺取之承筋甲乙一名腨腸一名直腸甲乙腨下陷脈素問腨腸中央陷者中甲乙禁刺甲乙按腨外臺作踹非千金曰脛後從腳跟上七寸類經聚英入門大全金鑑從之七寸二字誤次注作腨中央如外如外二字亦誤外臺引救急方云以繩從腳心下度至腳踵便截斷度則回此度從腳跟縱量向上盡度頭當腨下際宛宛中是穴千金霍亂篇注又有取繩度之之法恐致差謬並不取合陽甲乙膝約紋中央下二寸甲乙按千金發揮聚英大成金鑑作三寸入門大全寶鑑一說作一寸並非也委中素問一名郄中素問委中央靈樞一名血郄類經一名腿凹金鑑膕中央為合委而取之靈樞約紋中動脈甲乙曲腳之中背面取之又云膝後屈處次注兩筋間神應陷中類經令人面挺腹地而取之資生一云禁灸發揮按委屈也緩緩屈膝而取之病形篇曰屈而取之即是也素問曰刺解脈在郄中結絡如黍米刺之血射以黑見赤血而已次注曰郄中則委中穴靈樞曰膀胱合入於委中央又曰若脈陷取委中央併入一名資生引甄權曰曲踿內委陽素問三焦下輸在足於太陽之前少陽之後出於膕中外廉名曰委陽是太陽絡也手少陽經也三焦者足少陽太陰之所將太陽之別也上踝五寸別入貫腨腸出於委陽並太陽之正入絡膀胱約下焦靈樞屈伸而索之同上膝腕橫紋尖入門按四時氣篇云邪在三焦約取之太陽大絡甲乙索作取足太陽之陽舊作指今據甲乙及諸書訂之前千金翼資生作後而無少陽之後四字蓋脫文也甲乙外廉下有兩筋間扶承下六寸此足太陽之別絡也屈身而取之之文扶承是承扶之穴千金資生聖濟等並作扶承詳於承扶下扶承下六寸千金外臺資生聖濟等皆從之然承扶下六寸者殷門穴也殷門注曰肉郄下六寸肉郄承扶一名也因知承扶下六寸五字殷門之注誤寫於茲也否則扶承二字殷門之訛故不取也屈身是屈伸之訛外臺入門同資生類經吳文炳寶鑑醫統金鑑既作屈伸是也委陽實在委中之外兩筋間不問分寸自明委屈也委陽名義固然故扶承下六寸五字為衍文次注曰去臀下橫紋六寸亦承甲乙謬醫學綱目曰詳銅人云委陽在承扶下六寸以今經文考之當一尺六寸蓋銅人說始於甲乙甲乙之說乃脫簡而脫去一尺二字也今按其取穴是雖然甲乙等必取近穴以註釋故言膕外廉豈歷殷門浮郄而取諸承扶乎未見經注用尺余聚英六寸作二寸六分醫統吳文炳作一寸六分不可解矣入門作委中外二寸鑿矣諸家於經注讀承扶下六寸字而不讀膕中外廉字此何心哉注證發微削膕中外廉字其疏謬最甚次注謂浮郄穴上側也者亦誤矣浮郄甲乙委陽上一寸屈膝得之甲乙膕外廉橫紋上一寸增注按後人不知甲乙委陽注有衍文於承扶下五寸取此穴者妄也甲乙為屈膝得之可以證也千金千金翼作展足外臺資生發揮聚英寶鑑作展膝非殷門甲乙肉郄下六寸甲乙膝後膕上兩筋之間去臀下橫紋六寸次注禁灸入門按肉郄者承扶一名大成作浮郄下三寸非也承扶甲乙一名肉郄一名陰關一名皮部甲乙尻臀下股陰腫上約紋中甲乙禁灸入門按千金千金翼明堂資生大全入門作扶承承扶扶承混稱通用千金千金翼作股陰下紋中注曰一云尻臀下陷紋中外臺作股陰上衝紋中一云股陰下衝紋中明堂作尻臀下衡紋中聚英作股陰上衡紋中入門作橫紋中資生腫作沖按腫恐衍衡集韻與橫通沖說文通道也其義似通然未見指約紋而為沖紋者沖疑衡誤
