front:
  text: 自序舅氏淡園崎翁作經穴匯解上下二卷以其季子失明從事於針刺故有此著也余幼時在武城侍膝下校之無何季子夭翁亦棄此書而不省也余之東歸從遊二三子偶問俞穴余素不解針刺往往失其對於是想往時匯解之事乞之翁再閲則所引僅僅三五家而已未足以取徵於斯焉余乃以家藏書修補之增為八卷頃得堀立考遂輸通攻諸説頗具餘業已脫稿故不取其説安井元越俞穴折衷全抄通攻採擇之不精憾多遺漏余固淺見寡聞引證疏脫豈啻遂輸通攻而已哉希後之覽者正之享和癸亥仲春之日南陽原昌克撰
  hash: sha256:d471208dac9f17aec5e48f0192a5a0947aa0a4559ea86c08063d98646f220c10
  markers:
