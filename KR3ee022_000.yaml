body:
  text: 敘余重表弟山崎子政善世以針科仕朝尤妙手爪之運見為侍醫兼醫學教諭嘗語余曰靈素之外明堂尚矣甲乙收而傳焉繼之有徐叔向秦承祖甄權等書俱繫於亡佚是可惜也宋仁宗仿貞觀故事命翰林醫官王惟一撰定銅人針灸圖經於是三陰三陽合任督而為十四孔穴三百六十五其義始備矣元滑壽著發揮一依忽公泰金蘭循經云忽氏之書此間無傳然考其文正與銅人同則循經全採之於銅人而滑氏不及寓目於銅人也自此而降各家撰述頗多得失互存後學不能無迷今本之於靈素甲乙參之於銅人圖經而上自千金外臺下至明清諸書搜羅衆説會粹精要正之以經脈流注量之以尺度分寸揣之以定郤骨間動脈宛宛中則莫有孔穴乖錯之弊明堂之能事畢矣若夫方圓迎隨之微吹雲見蒼之妙則在於得之心手豈可言傳耶水藩侍醫原子子柔撰經穴匯解八卷纂二十有餘家之説考證辨訂定為一家之學以嘉惠後學殆與子政之言符蓋其用心也勤矣書已上梓以問序於余余非顓門故昧乎經俞之義焉得折辭然子柔在數百里之外懇請不已回綴所聞於子政揭於卷端以念讀斯書者云文化四年歲在丁卯仲春上浣東都醫官督醫學丹波元簡撰水戶藩扈從士員立原任書凡例一孔穴注解以甲乙經為古千金方外臺祕要次之至後世隨意增減諸説紛紜使人茫然故此編務辨諸家之謬令學者知所適從一今世言經穴者率皆奉滑氏十四經發揮穴歌以為金科玉條乃就各經揣摩以認俞穴或自手而到於頭或自足而到於頭唯其流注是視不復審各體全穴故至數穴相接之處動致混錯如下廉豐隆耳門聽宮聽會重取一穴而莫之能省蓋發揮穴注雖據資生經為文然其部分穴名不主各體而主各經蓋仿外臺祕要更於手足十二經之外加奇經任督二脈創設十四經之目因配以諸穴學者由是而學焉所以失也今取俞穴先就頭面腹背項頸各部悉詳其處所然後推求絡經上下前後猶指掌故此據甲乙千金以分諸部為圖若其流注則具之於後一經絡流注交會及穴歌盡具十四經發揮其與經脈篇有異同則岡本為竹著臟腑經絡詳解悉之奇經八脈亦同今諸經俞穴有異同者外臺祕要移肺經中府雲門入脾經之類必記之備參考灸壯刺分則諸書異同稍少而至攻病則有不可守者故不載穴下舉具於續編主治部中如禁刺灸穴亦不可不知焉載在各穴下一此編一主甲乙經故系諸本注但內經文可徵者先記而後及甲乙使學者知古書可據也有異同辨之兩可者共載誤謬必從有考證者所增補者書增注每穴名下必記其書目者又從其古者一千金方曰吳蜀多行灸法有阿是之法阿是天應穴取病人稱快者自是陷中而經脈所歷也故奏驗不鮮乃古所謂痛所為腧之義也然徒執阿是而謂經穴之似迂者去大道而從捷徑也療其病不知其所以愈也所謂阿是而無名稱者皆載之續編主治部中一凡奇穴別分部其阿是穴而無名目者不收録本邦之灸法傳異域者載在聖濟總録神應經等又如九曜點之類乃今不録詳諸續編主治中一同身寸者不必用只急卒之際或用之而其法不一諸説載在開卷第一者所以先其急也一孔穴注解資生經等引他書者就其所引之書校之若不見其文者直書資生經或書今本不見一閲書之際遇其異名則不易知乃細書異稱於目録穴名下便其搜索一引書目録只載其孔穴下所引據者於考案條中所證訂如素難諸注諸史注疏之類總不注於穴下者皆不列目録而誇博洽且偶有目録外書而注穴下者則正録題名若癸辛雜識幼幼新書五云抄等是也引書省題名例細書目録下一家藏聖濟總録謄寫本也其分寸字畫不能無疑故多不取徵於此吳文炳針灸大成無注於穴下者楊繼洲針灸大成往往載其説於穴下單記大成者楊氏之大成也如吳氏針灸大成只記吳文炳不言大成以別之一流注編中穴下所細注一載甲乙經文故不記甲乙經若有引他書者則必記其所引書名又不曰某經之所發某經之所溜單記所發所溜者省本經之字也但肺經一條悉加太陰經之字以示之其經絡別走某經之類亦省本經字一奇穴部所載穴名注文不同而其穴相同者不敢改論焉以其不拘經絡流注也一凡奇穴同名異穴者於各條不下注説但如與腧穴同名者必注曰與某部某穴同名異穴教讀者不誤
