body:
  text: 卷之三胸部第五骨度篇曰胸圍四尺五寸腰圍四尺二寸結喉以下至缺盆中長四寸缺盆以下至𩩲𧂭長九寸過則肺大不滿則肺小𩩲𧂭以下至天樞長八寸過則胃大不及則胃小天樞以下至橫骨長六寸半過則迴腸廣大不滿則狹短橫骨長六寸半兩乳之間廣九寸半按𩩲𧂭胸前岐骨際也缺盆中天突也天樞謂臍心臍心不易見故以旁穴而言按兩乳間九寸半甲乙經亦同今試折量兩乳間為九寸半則一寸當一指比之胸圍四尺五寸則略合其他如手足大概相同以兩乳間八寸折法不啻胸圍不合其他亦然舉體分寸一從骨度篇至兩乳間特不用何居此不知胸部除任脈之失也胸部任脈廣一寸半而其旁各四寸直兩乳學者思諸兩乳間橫折八寸之法未知出干何人神應經曰橫寸膺部腹部並用乳間橫折作八寸腹部應有橫寸悉依上法張介賓輩一從之終為定法千載無見者悲哉洗冤錄曰左右肋骨男子各十二條八條長四條短婦人各十四條今驗之是也胸中行自天突下行至中庭凡七穴天突素問一名玉戶甲乙一名天瞿千金缺盆之中靈樞頸結喉下二寸中央宛宛中低頭取之甲乙按玉寶鑑作五誤素問云任脈氣所發者喉中央二次注曰謂廉泉天突二穴千金千金翼外臺作五寸甲乙注引氣府論注曰五寸今本作四寸聚英醫統寶鑑吳文炳同明堂作五分發揮入門大成作一寸類經作三寸共不是次注入門作低針取之字誤骨度篇曰自結喉至天突四寸是主骨度而言之正面正身取之甲乙經以為結喉下至天突二寸是主取穴刺針而言之故曰低頭取之也取此穴者低頭取之故資生經曰其下針直橫下不得低手何則低手傷咽喉此解低頭取之義也低頭則咽喉沉而針刺無害不可不知也今人不知低頭則二寸正面則四寸之義謾作二說非也近世多自天突至岐骨際折作八寸四分如然則中庭當岐骨際不可從也按骨度篇自天突至岐骨際九寸又云膺中骨間各一今用九寸即八寸四分為中庭穴其下至岐骨際六分是古法也璇璣甲乙天突下一寸中央陷者中仰頭取之甲乙按璣千金作機恐誤氣府論云膺中骨陷中各一次注曰謂璇璣華蓋紫宮玉堂膻中中庭六穴也胸部載分寸舉其大概也故曰陷者中只取骨間下同大成作一寸六分非說見下華蓋甲乙璇璣下一寸陷者中仰頭取之甲乙按發揮作二寸入門寶鑑大成金鑑作一寸六分共非矣又不合骨度之數一二肋骨密而不疏作一寸者取之骨間之義也紫宮甲乙華蓋下一寸六分陷者中仰頭取之甲乙玉堂難經一名玉英甲乙紫宮下一寸六分陷者中仰頭取之甲乙膻中難經一名元兒甲乙一名上氣海類經一名元見大全玉堂下一寸六分陷者中仰而取之甲乙橫直兩乳間千金禁刺千翼按膻千金千金翼外臺作𦽅古通用大全曰一名𦽅中不取資生類經而作臥難經曰玉堂下一寸六分直兩乳間陷者是諸家以為註文混入本文故不載本文千金心臟篇曰胸痹心痛灸𦽅中百壯穴在鳩尾上一寸忌針非也中庭甲乙膻中下一寸六分陷者中仰而取之甲乙按明堂作膻中下一寸入門金鑑作鳩尾上一寸此自天突至岐骨際作八寸四分之誤也胸第二行自俞府挾璇璣兩旁各二寸下行至步廊凡十二穴俞府素問一名輸府大全寶鑑巨骨下去璇璣旁各二寸陷者中仰而取之甲乙按甲乙外臺明堂俞作輸下皆同資生聖濟大全寶鑑作腧千金千金翼發揮聚英作俞是也俞府出內經俞輸腧以音通用大全寶鑑以為一名今暫從之千金翼而作臥外臺作仰臥而巨骨胸前巨骨也非穴名璇璣次注作任脈非也大全曰璇璣之旁三寸所不是醫門摘要曰胸部間一肋取穴不可泥一寸六分可謂能知取穴之法也彧中甲乙俞府下一寸六分陷者中仰而取之甲乙按而千金並翼方作臥外臺作仰臥而骨間各取一穴同上明堂云一寸非矣彧千金千金翼外臺明堂聖濟資生聚英寶鑑作或入門作域類經以下諸書每穴有去中行二寸之解不是說見下神藏甲乙彧中下一寸六分陷者中仰而取之甲乙按而千金翼作臥靈墟甲乙神藏下一寸六分陷者中仰而取之甲乙按千金曰墟或作牆入門作虛聚英醫統作去中行各開一寸字誤神封甲乙靈墟下一寸六分陷者中仰而取之甲乙步廊甲乙神封下一寸六分陷者中仰而取之甲乙按廊千金外臺聖濟資生作郎類經曰挾中庭入門曰去中庭外非也橫對中庭稍下六分許胸第三行自氣戶挾俞府兩旁各二寸下行至乳根凡十二穴氣戶甲乙巨骨下俞府兩旁各二寸陷者中仰而取之甲乙按氣府論云膺中骨間各一類經聚英醫統吳文炳金鑑大成每穴有去中行四寸之解說見下次注曰去膺窗上四寸八分聚英醫統吳文炳無上字金鑑曰巨骨下一寸並拘寶鑑曰資生云自氣戶至乳根六穴去膺中行各四寸相去各一寸六分今本不載庫房甲乙氣戶下一寸六分陷者中仰而取之甲乙按岡本作一寸非也取諸骨間不必拘說既見屋翳甲乙庫房下一寸六分甲乙陷者中仰而取之千金按次注曰氣戶下三寸二分聚英曰巨骨下四寸八分隔穴而說分寸者不能無誤膺窗甲乙屋翳下一寸六分甲乙陷中聖濟按資生窗作牕同字次注作胸兩旁挾中行各相去四寸巨骨下四寸八分誤乳中甲乙當乳資生即乳頭上入門禁刺灸甲乙微刺資生又寶鑑引入門曰針宜淺刺二分今本不見按甲乙千金千金翼外臺無注古書之所妙次注曰膺窗之下即乳中也資生注云亦相去寸六分非是相去二字不成義類經曰一傳胎衣不下以乳頭向下盡處俱灸之即下乳根甲乙一名薛息千金乳下一寸六分陷者中仰而取之甲乙乳下第一肋間宛宛中千金按千金方曰薛息在乳下第一肋間宛宛中是也今移入一名寶鑑作一寸四分非矣醫學正傳曰婦人在乳房下起肉處陷中只陷中二字可取胸第四行自雲門挾氣戶兩旁各二寸下行至食竇凡十二穴雲門素問巨骨下氣戶兩旁各二寸陷者中動脈應手舉臂取之甲乙刺太深令人逆息甲乙禁針入門按氣穴論云膺俞十二穴次注曰謂雲門中府周榮胸鄉天溪食竇左右則十二穴也資生雲作云通用次注有每穴橫去任脈六寸之解類經聚英從之說見下中府脈經一名膺中俞甲乙一名肺募千金一名府中俞大全雲門下一寸乳上三肋間陷者中動脈應手仰而取之甲乙禁灸入門按凡胸部諸穴各在骨間不待折量而言分寸者言大概也千金外臺一云一寸六分明堂大成岡本從之非也胸骨狀如偃月故第二行折量稍長第三行與中行平學者察諸膺中俞聚英醫統作膺俞素問曰膺俞次注曰中府穴周榮甲乙中府下一寸六分陷者中仰而取之甲乙禁灸入門寶鑑按榮甲乙作營誤今訂之胸鄉甲乙周榮下一寸六分陷者中仰而取之甲乙天溪甲乙胸鄉下一寸六分陷者中仰而取之甲乙食竇甲乙天溪下一寸六分陷者中仰而取之甲乙舉臂取之千金按金鑑作腹哀上行三寸或從乳上三肋間動脈應手處往下六寸四分迂甚矣次注曰雲門食竇舉臂取之余並仰取之腹部第六腹部折量諸說眾多不知所適從按除中行法內經云衝脈氣所發者二十二穴挾鳩尾外各半寸至臍寸一挾臍下旁各五分至橫骨寸一腹脈法也甲乙經云自幽門挾巨闕兩旁各半寸循衝脈下行至橫骨又至肓俞云直臍旁五分甲乙銅人等皆云衝脈足少陰之會蓋以骨空論為主也獨難經云並足陽明之經挾臍上行恐非也鳩尾內經所稱指蔽骨不可以為穴名也其名本以蔽骨狀似鳩尾古書指蔽骨者十之八九不可不知也鳩尾外無穴而言挾鳩尾外即除蔽骨而取之也又至臍言挾臍則除臍可見也鳩尾與臍上下相照其中間明於言外是古文辭法也又內經云足陽明脈氣所發者膺中骨間各一挾鳩尾之外當乳下三寸挾胃脘各五挾臍廣三寸各三下臍二寸挾之各三甲乙經云自不容挾幽門兩旁各一寸五分至氣衝又自期門上直兩乳挾不容兩旁各一寸五分下行至衝門因此考之臍旁五分足少陰經也其旁一寸五分足陽明經也其旁一寸五分上直兩乳足太陰經也共計三寸五分取一繩自臍旁橫量至直乳下斷去之又去二分半折為三寸五分以定三經此不問除任脈幾寸始得其法矣去二分半說見下世人皆云胸部每行至腹內屈五分兩乳間八寸腹脾經相去七寸不知何據骨度篇曰胸圍四尺五寸腰圍四尺二寸腰減於胸三寸雖今人皆然兩乳相去九寸半是古法也胸部各以二寸相去至乳中左右共八寸其所餘寸半此任脈與鳩尾與臍之分也凡九寸半腹部各相去凡三寸半而為七寸合任脈之分一寸半凡八寸半胸去中行四寸七分強至乳中腹去中行四寸二分強至直乳中此腰減於胸三寸則腹居於其中可知減於胸自臍至橫骨六寸半又橫骨長六寸半腹部四行共不出其兩端然則自胸至腹漸漸狹而腹至橫骨更狹故二行三行四行依分量目巧取之何有內屈之理諸書一據兩乳八寸說故如其所載去中行幾寸去任脈幾寸皆無稽之言故不取也而今不言任脈廣幾寸者無明文也甲乙經不容注曰去任脈三寸除幽門挾巨闕五分不容挾幽門一寸五分所餘一寸兩旁合為二寸又千金方曰去任脈二寸所餘五分兩旁合為一寸不知孰是故今以臍與鳩尾定除任脈之分量不言幾寸者內經之意也世人以兩乳八寸之度除任脈果如何耶其說至中府雲門去乳中二寸而窮矣故其言曰以同身寸奚一胸之際而乳間用長尺乳後用短尺豈有此理乎極知兩乳間八寸無稽之言也腹中行自鳩尾下行至會陰凡十五穴鳩尾素問一名尾翳靈樞一名𩩲𧂭甲乙一名神府千金一名𧂭聚英大成臆前蔽骨下五分甲乙其骨垂下如鳩尾形故以為名人無蔽骨者從岐骨下行一寸聖濟禁刺灸甲乙宜針外臺引甄權此穴大難針大好手方可針資生按古書中稱𩩲骭者有三義或岐骨或蔽骨或謂穴名又稱鳩尾者亦同後人不之知也素問曰鳩尾下三寸胃脘胃脘上脘也又足陽明脈氣所發之章云挾鳩尾之外當乳下三寸挾胃脘言陽明經至直乳挾蔽骨下行岐骨下三寸至上脘旁復下行也又云𩩲骭至臍八寸太倉居其中太倉中脘也言自岐骨際至臍八寸中脘在其中央也此𩩲骭指岐骨際挾鳩尾之外之鳩尾指蔽骨何則蔽骨有長短故皆據岐骨為度蔽骨長為五分乃稱鳩尾穴者皆在岐骨下一寸千金傷寒篇曰灸心下三處第一處去心下一寸名巨闕第二處去心下二寸名上脘第三處去心下三寸名胃脘各灸五十壯然人形大小不同恐寸數有異可繩度隨其長短寸數最佳取繩從心頭骨名鳩尾頭度取臍孔中屈繩取半當繩頭名胃脘又中屈半繩更分為二分從胃脘向上度一分即是上脘又上度取一分即是巨闕此說不是俗多以從鳩尾穴至臍為八寸或自蔽骨為八寸而以腹部臍上七寸五分折量諸穴置其間故不合遂以中脘為鳩尾下三寸或三寸半妄說也又按甲乙經曰上脘在巨闕下一寸五分去蔽骨三寸中脘在上脘下一寸居心蔽骨與臍之中此皇甫氏之誤也滑壽遂以𩩲骭鳩尾共做蔽骨而看故曰上脘去蔽骨三寸註上脘曰巨闕下一寸當一寸五分強合內經鳩尾下三寸文蓋鳩尾穴在蔽骨下五分古來相傳之說也滑壽曰無蔽骨者從岐骨際下行一寸是也然不辨蔽骨長短故後人論說棼然今按岐骨至臍為八寸岐骨下行一寸為鳩尾穴此蔽骨長五分為常人之度其下五分為鳩尾穴是大概而言之由此觀之假令蔽骨長一寸亦以為五分自蔽骨端至臍中折為七寸五分以定其穴其旁準擬而取之也若蔽骨短不見者以岐骨下一寸取鳩尾恐無害學者察諸村上親方骨度正誤曰𩩲𧂭者蔽心骨而從岐骨之間垂下如指之大骨也附胸骨之部分也是胸腹之界限也不察於此而以岐骨為限以分骨度豈合經旨乎舍蔽骨而取岐骨豈合骨度乎其弊由不知𩩲𧂭有三義肘後曰心厭者指鳩尾或言心厭尖心厭之說多參差蓋不知有三義也厭與蔽同護於心臟之意也廣雅曰𩩲骭缺盆骮也玉篇曰肩骨不是巨闕脈經一名心募大成鳩尾下一寸甲乙按肘後方曰正心厭尖頭下一寸不是又曰心厭尖尖四下一寸以赤度之此文不解恐有脫誤資生曰鳩尾拒者少令強一寸中人有鳩尾拒之亦不可解千金外臺巨闕注散見各篇者差謬多不與明堂篇所記同以其文繁故不錄於此金鑑曰兩岐骨下二寸大成亦作鳩尾兩岐骨下一寸兩字不可解骨度正誤曰巨闕一穴今人多言臍上六寸非也是亦自張氏始是由岐骨蔽骨之差也當作六寸五分矣此說亦誤上脘脈經一名胃脘一名上紀素問一名胃管鄉藥集成一名上管寶鑑巨闕下一寸千金臍上五寸類經鳩尾下二寸增注孕婦禁灸類經不針鄉藥集成按甲乙經作巨闕下一寸五分去蔽骨三寸也非矣說既見為一寸五分腹部旁穴皆不合內經每寸一穴意上脘中脘下脘外臺皆作管中脘甲乙一名太倉素問一名胃募千金𩩲骭至臍八寸太倉居其中為臍上四寸素問上脘下一寸甲乙鳩尾下三寸千金孕婦禁灸類經按至臍臍上皆自臍中度之經云上紀者胃脘也次注曰謂中脘資生類經以胃脘上紀為中脘一名而經曰鳩尾下三寸胃脘五寸胃脘脘管也上脘中脘皆胃脘也然則上紀者蓋上脘一名資生類經共承王冰之誤千金翼胃病篇曰心下二寸名胃管又曰胃管在心鳩尾下三寸是上脘中脘共稱胃管又針灸中篇作心下四寸甲乙作在心蔽骨與臍之中非也說既見肘後方曰在心厭下四寸千金霍亂篇曰在心厭下四寸臍上一夫巨闕注言心厭尖者指蔽骨此言心厭者似指岐骨然易混故不取建里甲乙中脘下一寸甲乙臍上三寸類經鳩尾下四寸入門孕婦禁灸類經禁灸入門下脘脈經一名幽門聖濟建里下一寸甲乙臍上二寸類經鳩尾下五寸入門孕婦禁灸外臺引甄權按難經曰太倉下口為幽門滑壽曰在臍上二寸下脘之分以幽門不為穴名今從聖濟總錄氣府論曰鳩尾下三寸胃脘五寸胃脘水分甲乙一名中守千金一名分水明堂下脘下一寸臍上一寸甲乙鳩尾下六寸入門孕婦禁灸外臺引甄權禁刺資生注曰明去水氣惟得針水溝針余穴水盡即死何於此卻云可針今校勘不針為是按明堂醫學綱目作分水今為一名難經云大腸小腸之會為闌門滑壽曰在臍上一寸水分穴諸家以闌門不為水分一名暫記之以俟知者又奇穴有水分神闕外臺古名臍中甲乙一名氣舍外臺禁刺甲乙按古書無注氣穴論曰臍一穴甲乙千金並翼方次注皆曰臍中而無神闕之名此名見於外臺資生大全寶鑑舍作合恐字誤陰交甲乙一名少關一名橫戶甲乙一名丹田神相全編臍下一寸甲乙自臍中心度之增注孕婦禁灸外臺引甄權按外臺甄權云穴在陰莖下附底宛宛中程敬通曰似屬會陰非陰交也類經聚英醫統吳文炳並曰三焦募神相全編曰丹田臍下一寸是也氣海脈經一名脖胦一名下肓甲乙一名丹田本事臍下一寸五分甲乙宛宛中明堂忌不可針千金孕婦禁灸外臺引甄權按脖吳文炳作藨大成作𧑓肓作音吳文炳作一寸非本事方曰氣海一穴道家名曰丹田石門甲乙一名利機一名精露一名丹田一名命門甲乙一名三焦募大成引聚英今本不見臍下二寸甲乙女子禁刺灸中央不幸使人絕子甲乙按甲乙曰三焦募孫真人曰至如石門關元二穴在帶脈下相去一寸之間針關元主婦人無子針石門則終身絕嗣神庭一穴在於額上刺之主發狂灸之則愈癲疾其道幽隱豈可輕侮之哉關元素問一名下紀素問一名次門甲乙一名丹田資生一名大中極大全一名小腸募大成引聚英今本不見齊下關元三寸素問按周密癸辛雜誌曰張安道養生訣云丹田在臍下三寸是也資生經曰臍下二寸名石門明堂載甲乙經云一名丹田千金素問注亦謂丹田在臍下二寸世醫因是遂以石門為丹田誤矣丹田乃在臍下三寸難經疏論之詳而有據寶鑑曰關元一名丹田按陰交氣海石門關元皆名丹田恐有誤類經曰此穴當人身上下四旁之中故又名大中極疑是中極之解誤寫於此也暫存之脈經甲乙並曰小腸募中極脈經一名氣原一名玉泉甲乙一名膀胱募千翼臍下四寸甲乙關元下一寸千金孕婦禁灸外臺針即有子又云灸不及針資生按脈經甲乙並曰膀胱募曲骨甲乙一名尿胞一名屈骨一名屈骨端千金橫骨上中極下一寸毛際陷者中動脈應手甲乙按臍中以下至橫骨長六寸半是古法也今人臍心下至橫骨折作五寸此誤讀張介賓說遂至此張氏至曲骨折作五寸謂毛際曲骨穴非謂橫骨也甲乙經中極下一寸為曲骨當橫骨上一寸半毛際從俗說則此穴當陰毛中橫骨故知其非是千金曰小便數起灸玉泉下一寸名尿胞一名屈骨端又赤白沃陰中干痛惡合陰陽小腹䐜堅小便閉刺屈骨入寸半灸三壯在中極下一寸即曲骨也今移為一名會陰甲乙一名屏翳甲乙一名金門千金一名平醫大全一名下極金鑑大便前小便後兩陰之間甲乙按千金云金門在穀道前囊之後當中央是也從陰囊下度至大孔前中分之今移為別名腹第二行自幽門挾巨闕兩旁各半寸下行至橫骨凡二十二穴幽門甲乙一名上門甲乙巨闕兩旁各五分陷者中甲乙按明堂入門大全作一寸半千金心臟篇作一寸金鑑從之以上諸書似有所見然不合經文今定不容穴內又一寸五分取此穴通谷甲乙幽門下一寸陷者中甲乙挾上脘類經按聚英引素問注曰自肓俞至幽門去中行各一寸誤也今閱次注曰挾巨闕兩旁相去各半寸下五穴各相去一寸是謂幽門以下五穴上下之間各一寸非去中行之謂不然不合內經挾鳩尾外各半寸至臍寸一之文而相去二字惑諸人陰都甲乙一名食宮甲乙一名通關醫綱通谷下一寸甲乙挾胃管千金按醫學綱目引摘英曰通關在中脘旁各五分針入八分左捻能進飲食右捻能和脾胃許氏曰此穴一針四效凡下針後良久覺脾磨食覺針動為一效次針破病根腹中作聲為二效次覺流入膀胱為三效又次覺氣流行腰後骨空間為四效主治五噎吞酸多睡嘔吐不止是為陰都穴明矣乃今移入一名石關甲乙一名石闕千金陰都下一寸甲乙並建里醫門摘要商曲甲乙一名高曲千金石關下一寸甲乙並下脘醫門摘要按商曲寶鑑作商谷肓俞甲乙商曲下一寸直臍旁五分甲乙按肓千金外臺金鑑作盲資生作育類經曰商曲下一寸當作二寸內經云挾鳩尾外各半寸至臍寸一蓋古必自幽門至肓俞有七穴甲乙經以來已缺之甲乙商曲下一寸以直臍旁之字見之後人誤以二作一也距古之遠無所可考今姑不取商曲下一寸五字唯定此穴於臍旁五分從張氏說中注甲乙肓俞下一寸資生按甲乙千金外臺次注作肓俞下五分發揮類經聚英入門醫統寶鑑共從資生據內經挾臍下旁各五分至橫骨寸一之義則資生為得四滿甲乙一名髓府甲乙中注下一寸甲乙挾丹田千金按髓外臺作隨聚英吳文炳大成府作中千金曰丹田兩邊相去各一寸半千金翼無半字蓋是脫字也丹田在臍下二寸是也此說可從又曰挾丹田兩旁相去三寸即心下八寸臍下橫紋是也不可從丹田是石門也發揮作氣海旁一寸非也氣穴甲乙一名胞門一名子戶甲乙四滿下一寸甲乙按脈經曰胞門在太倉左右三寸太倉中脘別名也千金婦人篇曰胞門關元左邊二寸是右二寸名子戶此二說不與本穴相關涉又冠中字詳於奇穴部又婦人良方胎動不安論曰服藥致補暖而反使胞門子戶為藥所燥搏自注曰巢氏病源併產寶並謂之胞門子戶張仲景謂之血室大赫甲乙一名陰維一名陰關甲乙氣穴下一寸甲乙按千金腎臟篇曰屈骨端三寸不合諸書且千金屈骨端為曲骨橫骨之別名益不可解此也千金言屈骨者不一說見下橫骨素問一名下極甲乙一名屈骨千金大赫下一寸甲乙肓俞下五寸發揮陷中入門禁刺入門按大全周身經穴賦作橫谷又曰一名屈骨端千金曰屈骨端陰上橫骨中央宛曲如卻月中央是也此名橫骨千金翼同千金霍亂篇灸慈宮注曰橫骨在臍下橫門骨是蓋橫門骨言橫骨也又陰㿗篇曰灸玉泉穴在屈骨下陰又三焦篇曰水道穴在挾屈骨相去五寸千金翼曰屈骨在臍下五寸屈骨端水道兩旁各二寸半又淋閉篇曰玉泉下一寸名尿胞一名屈骨端曲骨穴下宜合考凡言屈骨者不一恐有差卻月入門作如仰月陷中曲骨外一寸半吳文炳作仰月中央去腹中行各一寸半李時珍作偃月醫統作臥月洗冤錄曰婦人隱處其骨為羞秘骨不可撿驗蓋橫骨也腹第三行自不容挾幽門兩旁各一寸半下行至氣衝及急脈凡二十六穴不容甲乙幽門旁一寸五分去任脈三寸兩肋端相去四寸甲乙對巨闕類經按兩字諸書作四此穴對巨闕巨闕旁二寸直貼肋端四肋之數不合且以肋數言之必有第字至此特不冠第字只千金作直四肋端次注冠第字而期門言第二肋期門在不容旁而二四易位故人多疑之今考之不容直貼左右兩肋端此肋為岐左右分垂如一肋而相分故因其形狀言兩也甲乙曰去任脈三寸按幽門挾巨闕兩旁五分不容幽門旁一寸五分凡二寸也參當作二去任脈旁二寸取此穴類經引此文作二寸千金千金翼外臺作去任脈二寸是也甲乙經曰相去四寸謂相去兼任脈而量之也次注作挾腹中行兩旁相去各四寸誤讀甲乙文增各字則相去字不成語今刪去任脈三寸並相去四寸之數言入門作平巨闕三寸醫統聚英作去中行任脈各三寸共受甲乙寫誤而不深考也明堂作在上管兩旁各一寸非矣承滿甲乙不容下一寸甲乙對上脘類經按千金及翼方大腸篇曰挾巨闕相去五寸巨闕在心下一寸灸之者挾巨闕兩邊各二寸半非說既見梁門甲乙承滿下一寸甲乙對中脘類經孕婦禁灸類經關門甲乙梁門下太乙上甲乙梁門下一寸千金對建里類經按千金翼門作明誤外臺作五分非也太乙甲乙關門下一寸甲乙對下脘類經按千金並翼方外臺次注資生聖濟寶鑑作太一無異義千金翼門作明誤滑肉門甲乙太乙下一寸甲乙天樞上一寸對水分類經按聚英醫統作下挾臍下一寸至天樞去中行三寸下挾之下字吳文炳作一天樞脈經一名長溪一名谷門甲乙一名大腸募肘後一名循際一名長谷千金去肓俞一寸五分挾臍兩旁各二寸陷者中甲乙滑肉門下一寸次注魂魄之舍不可針千金孕婦禁灸同上按谷門千金千金翼外臺資生聖濟類經發揮聚英大全醫統作谷門音通資生溪作雞肓作育千金脾臟篇曰長谷挾臍相去五寸一名循際又曰挾臍相去三寸魂魄之舍不可針大法在臍旁一寸合臍相去可三寸也千金翼作挾臍相去各二寸聚英吳文炳作去肓俞半寸蓋寸半之誤大成作一寸脫字奇穴部魂舍可合考外陵甲乙天樞下大巨上甲乙天樞下一寸次注對陰交類經按千金作天樞下半寸非也半寸當作寸半當時或有此說外臺作長溪下五寸東洋先生曰寸疑當作分又從千金之說也景岳全書曰在臍左右各開一寸半灸疝立效永不再發屢用屢驗臍者陰交之誤大巨甲乙一名腋門甲乙長溪下二寸甲乙外陵下一寸次經對石門類經按腋外臺作掖千金作臍下一寸兩旁各二寸非也長溪天樞也水道甲乙大巨下一寸增注按甲乙千金千金翼次注外臺共作大巨下三寸以下諸書從之聚英吳文炳作二寸千金千金翼曰挾屈骨相去五寸此水道蓋奇穴詳奇穴部寶鑑作天樞下五寸非是說見下歸來甲乙一名溪穴甲乙水道下一寸增注按甲乙千金千金翼氣府論注聖濟作二寸水熱穴論注新校正作三寸外臺作五寸千金注資生引外臺作三寸說見下千金婦人篇作挾玉泉五寸不是氣衝素問一名氣街素問歸來下鼠鼷上一寸動脈應手甲乙宛宛中資生灸之不幸使人不得息甲乙禁刺資生按大全曰一名氣衝衝沖古通用非一名不取骨空論曰毛際動脈歸來下動脈是也千金外臺作歸來下一寸鼠鼷素問曰刺氣街中脈血不出為腫鼠僕注曰氣街在腹下挾臍兩旁相去四寸鼠僕上一寸動脈應手新校正云別本僕作鼷張介賓曰僕當作鼷千金翼作鼠𪖈醫門摘要曰鼠鼷羊矢同非矣羊矢骨與是不同按王冰言挾臍兩旁相去四寸者誤又水熱穴論注曰臍下橫骨兩端鼠鼷上一寸本草別錄馬刀條曰除肌中鼠鼷外臺箕門注曰鼠鼷痛小便難金鑑曰腿班中有肉核名曰鼠鼷溪鼷音通說文曰小鼠也即春秋言鼷鼠食郊牛角者陳藏器曰鼷鼠極細卒不可見尹文子曰鄭人謂玉未琢者為璞周人謂鼠未臘者為璞周人遇鄭賈人曰欲買璞乎鄭賈曰欲之出璞視之鼠也因謝不取戰國策同蓋僕鼷者璞之轉訛也按毛際腿中肉核動應手俗所謂橫根所是也千金外臺並作歸來下一寸入門作天樞下八寸夫臍下至橫骨六寸半骨度為然何得八寸素問曰挾鳩尾之外當乳下三寸挾胃脘各五次注曰謂不容承滿梁門關門太乙五穴也又曰挾臍廣三寸各三注曰謂滑肉門天樞外陵也又曰下臍二寸挾之各三注曰謂大巨水道歸來也馬蒔曰鳩尾下三寸胃脘五寸言鳩尾下一寸曰巨闕又下一寸半曰上脘今曰三寸者正以鳩尾上之蔽骨數起也鳩尾下三寸半為胃之中脘今五寸者字之誤也以下至橫骨言自中脘以下有建里下脘水分神闕陰交氣海石門關元中極曲骨等穴共計一十三寸今曰六寸半一者疑當為二六寸半者二則為十三寸也是腹部中行之脈法也此注牽強附會可笑也巨闕下一寸半取上脘穴強合經文此承皇甫氏之謬也不知臍下至橫骨六寸半為一十三寸說以一為二故誤如此解書何難之有如其無徵何學者察諸折衷曰天樞與任脈神闕相對氣衝與任脈曲骨相對而自曲骨至神闕相去五寸也如斯從天樞至氣衝亦當相去五寸然甲乙說天樞氣衝之間相去分寸甚有餘而難合於曲骨神闕相去之寸恐非也經曰下臍二寸各三二寸中有三穴也不可解凡臍下四寸而別取此氣衝穴於毛際與經文合從甲乙千金等大巨水道歸來相去為二寸則至歸來六寸歸來下半寸間取此穴而不合經文毛際語竊疑素問上文言挾臍三寸各三至此乃言下臍二寸各三二字三誤不然則各字不穩且大巨水道歸來各每寸一穴則與外陵並度之得臍下四寸乃歸來下一寸為氣衝穴正與橫骨二穴相對又挾鳩尾之外當乳下三寸之三亦五之誤然則挾鳩尾之旁當乳下行五寸每寸一穴各字義亦穩矣仍記數言以待來哲因次注挾中行二寸語以此穴為橫骨兩端不覺衝門同處甲乙千金以氣衝屬腹部三行以衝門屬四行腹部四行自兩乳下行至橫骨端因知自胸至小腹漸狹也而其書挾任脈幾寸使人知在某行中也甲乙千金以部分列故言自某穴挾某穴幾寸至某穴言起自某穴旁下行至某穴也外臺始以穴系經而以任脈屬腎經督脈屬膀胱經及滑壽十二經合任督二脈為十四經爾後說經穴者一據十四經至一行中別布置三四所乃每穴不能言挾某幾寸後人不知此義也故以腹部四行置橫骨六寸半中準擬分量目巧度之骨度正誤曰自天樞至橫骨六寸半蓋腎經與任脈不為臍下五寸也脾胃之兩經可取於六寸半矣是亦臆說古書言橫骨有二義以橫骨為穴名故有此誤急脈素問厥陰毛中素問陰髦中陰上兩旁相去二寸半按之隱指堅然甚按則引上下也其左者中寒則引少腹下引陰丸善為痛為少腹急中寒此兩脈皆厥陰之大絡通行其中故曰厥陰急脈即睪之系也可灸而不可刺也次注按類經曰此穴自甲乙經以下諸書皆無是遺誤也金鑑堅然作而堅腹第四行自期門上直兩乳挾不容兩旁各一寸半下行至衝門凡十四穴期門傷寒論一名肝募大成第二肋端不容旁各二寸五分上直兩乳舉臂取之甲乙承滿旁增注按第二肋及兩肋說詳於不容下本文不容字寫誤當作承滿其旁各一寸五分上直兩乳第二肋端是期門也第二肋千金曰奔㹠灸期門百壯穴直兩乳下第二肋端旁肋舊作脅誤針灸篇婦人病中作肋第二肋言乳下第二肋也端本事方作間非矣不容當兩肋端其旁一寸五分則在膺骨間而甲乙千金共屬腹部可疑之一也不容在肋端其旁一寸五分又謂肋端可疑之二也在膺骨間而謂肋端可疑之三也自大橫倒量上行至不容不合骨度之數者一寸可疑之四也故謂傳寫之誤也今試自直臍大橫穴量之大橫上三寸腹哀腹哀上一寸五分日月日月上五分橫平當通谷也通谷旁一寸五分承滿也承滿旁一寸五分直兩乳下行當肋端於是不容誤謬可始解矣近世唯取不容二字不取肋端直兩乳五字何也聚英作乳直下一寸半大成作乳旁一寸半直下又一寸半不是寶鑑曰令人仰臥從臍心正中向上五寸以墨點定從墨點兩邊橫量各二寸半此乃正穴大約直兩乳為的此說為是而言二寸半者不可從日月甲乙一名膽募一名神光千金期門下五分千金按千金外臺資生聖濟作期門下五分是也次注作第三肋端橫直心蔽骨旁各二寸五分上直兩乳無稽之言也何則日月在期門下五分期門乳下肋端是也假使期門在不容旁蔽骨下一寸五分旁此不容也其下五分無橫直心蔽骨之理資生經有陷中字此以期門取不容旁之誤也以為期門在不容旁一寸五分則此穴亦在胸中骨間故謂陷中杜撰也甲乙經作期門下一寸五分蓋據期門在不容旁之文後人謾補入一寸字也故今從千金等聚英日月無說見輒筋腹哀甲乙日月下一寸五分甲乙禁針灸入門按入門作日月下一寸非也說見期門大橫甲乙一名腎氣醫綱腹哀下三寸直臍旁甲乙按千金作二寸資生聖濟發揮類經聚英醫統吳文炳作三寸五分寶鑑作一寸六分共非也說見上腎氣穴醫學綱目引扁鵲曰臍旁相去各四寸主治腳氣蓋此穴也乃今移入一名千金膀胱篇曰挾臍兩邊各二寸五分非也腹屈甲乙一名腹結甲乙一名腸結千翼一名腸窟外臺一名陽窟聚英吳文炳大橫下一寸三分甲乙按資生作三分蓋脫一寸字也府舍甲乙腹結下三寸甲乙按千金針灸篇婦人病作去大橫五寸聚英吳文炳作腹哀下三寸入門寶鑑作大橫下三寸大成作腹結下二寸寶鑑同之共非也醫門摘要曰衝門上七分是也衝門甲乙一名慈宮甲乙一名上慈宮聚英上去大橫五寸在府舍下橫骨兩端約紋中動脈甲乙按千金曰泄利所傷煩欲死者灸慈宮二七壯在橫骨兩邊各二寸半不是側脅部第七凡二十穴骨度篇曰角以下至柱骨長一尺行腋中不見者長四寸腋以下至季脅長一尺二寸季脅以下至髀樞長六寸按角額角也柱骨天柱骨也共見面部淵腋靈樞一名腋門千金注腋下三寸素問宛宛中舉臂取之甲乙禁灸甲乙禁刺入門按千金等作泉腋唐祖諱淵故避之太淵亦作太泉類經聚英以下諸書終以為一名不是千金注引中風篇曰腋門在腋下攢毛中一名泉腋即淵腋是也今本無此文諸風篇有腋門穴與此文相似詳於奇穴部輒筋甲乙腋下三寸復前行一寸著脅甲乙淵腋前一寸入門按著次注作搓復發揮作腹聚英曰一名神光一名膽募期門下五分陷中第三肋端橫直蔽骨旁二寸五分上直兩乳側臥屈上足取之是次注日月之註文而神光膽募日月之別名也聚英輒筋下缺日月穴蓋脫簡吳文炳醫統大成受其誤也金鑑亦不知其誤而作從淵腋下行復前一寸三肋端橫直蔽骨旁七寸五分半直兩乳謬妄不可讀大包靈樞脾之大絡名曰大包出淵腋下三寸布胸脅靈樞出九肋間及季脅端甲乙側脅入門腋下六寸大全脅下至季肋一尺二寸此穴居其中增注按聚英吳文炳作皃肋間皃疑九誤天池靈樞一名天會甲乙乳後一寸腋下三寸著脅直掖撅肋間甲乙側脅陷中入門按脅千金作肋而無三寸字撅千金翼作掘本輸篇曰腋下三寸手心主也名曰天池語而不詳次注作乳後二寸入門作乳外二寸金鑑作乳旁一二寸許骨空論云撅骨王冰曰尾窮謂之撅骨撅䕅通用說文曰撅臀骨也䕅本作蒚非此義醫門摘要曰按禮內則云不涉不撅矣撅字言肋骨形如撅字彙云撅揭衣也肋骨皆如撅何特此穴曰撅肋或曰撅與掘通又轉與崛通崛起貌金鑑作撅起肋骨按直腋下乳後有肋骨稍高大崛起者是也余嘗刳剝刑屍觀肋骨枚枚無所異不見崛起者按字書曰撅投也蓋此穴逼骨而取之也腋下三寸前行一寸乃輒筋當肋後其肋前是天池也大包言側脅天池言著脅則以僅著脅部也脅或作肋著肋亦通乳中天溪二穴相併然在膺骨陷中則天溪微高天池在乳後一寸逼肋骨胸鄉天溪食竇諸穴胸部四行雖在側脅屬胸部實是著脅處則以乳後一寸取此穴逼骨欲投肋下之處也章門脈經一名長平一名脅窌甲乙一名脾募千金一名肋髎大全大橫外直臍季脅端側臥屈上足伸下足舉臂取之甲乙按千金明堂作大橫文外文蓋之誤千金肺臟篇及千金翼無文字季脅者淵腋直下肋骨到此其末不似偃月其骨頭向前其尖曰端脅與腹部之交就脅之所盡曰季脅而不言季肋者向後更有小肋也愈知言季脅之有字法也京門下注有季肋之文可證也千金千金翼外臺次注以下諸書皆作季肋不辨其義也神應類經大成作臍上二寸兩旁各六寸入門作橫取六寸資生注所引難疏及聚英作兩旁九寸皆拘矣類經又曰臍上一寸八分兩旁各八寸半是帶脈之注不可從肘後曰小肋屈頭也大全一名季肋是京門也故不取類經曰肘尖盡處是穴此捷法也假令用此法必取季脅端可也凡用捷法者說既見醫門摘要曰類經云脾募也按在腹曰募在背曰俞募者募結之義而經脈結聚於此俞者輸也脈氣轉輸於此也千金翼曰多汗四肢不舉少力灸長平五十壯在挾臍相去五寸不針而言不針者可疑千金曰泄痢不嗜食雖食不消灸長谷五十壯三報穴在挾臍相去五寸一名循際是天樞異名而穴注與章門同大全曰飛虎即童門也童章字相似恐是章門誤又支溝一名又奇穴有飛虎京門甲乙一名氣府一名氣俞甲乙一名腎募大成監骨腰中季肋本挾脊千金屈上足伸下足舉臂取之類經按俞外臺作輸季肋資生類經作季脅蓋據素問兩季脅之間灸之文也然言兩季脅之間未辨何穴也或誤讀章門下注言季脅也季脅季肋說既見監骨次注作骼骨又居髎下注云監骨次注作骼骨骼與髂通監有攝守義左傳君行則有守守曰監監骨攝持腰股之骨也髂玉篇腰骨也曰監骨曰腰髖骨曰腰髁骨由此觀之監髖髁共髂之轉音同義古書皆言監骨蓋古言也而此穴如與腰骨不相與而章門當季脅淵腋直下則在向後季肋之本肋末連接腰骨略屬腰部故曰監骨腰中王太僕監骨下加與字益通就脅腹之交取章門故曰季脅向後更有小肋其本是京門也即曰季肋是也章門曰端京門曰本可以見也千金翼外臺與千金同甲乙作監骨下腰中挾脊季肋下一寸八分是以帶脈註文混入於此傳寫之誤故從千金折衷曰以帶脈之法恐非也法疑注誤可謂能解書也類經作臍上五分旁九寸半拘矣帶脈甲乙季脅下一寸八分甲乙陷者宛宛中明堂按千金千金翼外臺作季肋後人不辨章門季脅之義妄改作肋也果其說之是乎帶脈當微如後而下也不得取於季脅章門下神應經曰季肋下一寸八分臍上二分旁七寸半類經作臍旁八寸半肥人九寸瘦人八寸拍何則肥瘦人人殊如腹便便者豈得用折量乎五樞甲乙帶脈下三寸一曰水道旁一寸五分甲乙陷中資生按旁千金千金翼外臺作下入門作外自章門至居髎凡八寸三分骨度季脅至髀樞六寸間不可容此四穴岡本斜從小腹向陰毛際取此諸穴恐非也甲乙千金載五樞水道旁一寸五分一說今量之自季脅章門穴至五樞四寸八分章門直臍旁也水道臍下四寸也骨度篇季脅下至髀樞六寸以臍下至橫骨六寸半之寸當之略相同然水道間府舍說分寸者不穩但取之帶脈下三寸可也明堂作帶脈下二寸大成作水道旁五寸五分非也維道甲乙一名外樞甲乙章門下五寸三分甲乙按類經作中極旁八寸五分不可從居窌甲乙章門下八寸三分監骨上陷者中甲乙按監骨次注作骼骨蓋內經云兩骼髎者是也髀樞與少腹交腰之處崛起骨謂之髂骨說已見骨度篇曰季脅以下至髀樞長六寸據此則八寸三分當作六寸三分脅側六寸之際何容八寸三分髂骨上三分許陷者是也謂章門下則維道微前行居髎亦旁骨斜下何則帶脈五樞謂季脅下帶脈下者可見凡謂髎者取骨罅巨髎顴髎肩髎八髎類可徵也或取之環跳下股骨頭而合八寸三分之法然其上有環跳而屬足部居髎在其下屬季脅之中謬誤較然次注作章門下四寸三分四恐字誤金鑑從維道下行三寸非也
