body:
  text: 卷之八奇穴部第十二四肢第四䚡石子頭還取病人手自捉臂從腕中大澤紋向上一夫接白肉際灸七壯治馬黃黃疽等病千金按䚡千金翼作臂澤作淵是也河口腕後陷中動脈千金按千金翼作手腕後陷中動脈此與陽明同類經曰按此當是手陽明陽溪之次千金曰心痛灸臂腕橫紋三七壯又曰治疔瘡掌後橫紋後五指男左女右七壯即瘥已用得效疔腫灸法雖多然此一法甚驗出意表也此二處亦似河口地神治自縊死灸四肢大節陷大指本紋名曰地神灸七壯千金虎口心痛灸兩虎口白肉際七壯千金按千金翼曰治煩熱頭疼刺虎口飛虎即童門穴也又云是支溝穴以手於虎口一飛中指書處是穴也大全按此穴缺其詳詳於支溝條大骨空手大指第二節前尖上屈指當骨節中灸二七壯主治內障久痛及吐瀉類經中節上屈指當骨尖陷中大成禁針類經按醫學綱目灸九壯以口吹火滅千金翼曰脾風占候言聲不出或手上下灸手十指頭次灸人中大椎兩耳門前脈去耳門上下行一寸次兩大指節上下六穴各七壯小骨空手小指二節尖上大全按玉龍賦曰治眼爛能止冷淚醫學綱目曰灸七壯亦吹火滅千金翼曰喉痹針兩手小指爪紋中出血三大豆許即愈左刺左右刺右此處相近拳尖中指本節前骨尖上握拳取之類經按千金曰風翳患右目灸右手中指本節頭骨上五壯如小麥大左手亦如之千金翼曰牙疼灸兩手中指背第一節前有陷處七壯下火立愈中魁手中指第二節前骨尖上屈指得之又曰在手腕中上側兩筋間陷中灸二七壯蓋此以陽溪言也觀者辨之主治五膈五噎類經宛宛中金鑑按千金翼曰牙齒疼灸兩手中指背第一節前有陷處七壯下火立愈大成曰治五噎反胃吐食可灸七壯宜瀉之又陽溪二穴亦名中魁中泉手腕外間陽池陽溪中間陷中類經五虎四穴手食指無名指背間本節前骨尖上各一穴握拳取之類經按奇效良方曰手食指及無名指第二節骨尖握拳得之治五指拘攣可灸五壯二白四穴掌後橫紋上四寸手厥陰脈兩穴相併一穴在兩筋中一穴在大筋外針三分瀉兩吸主治痔漏下血裡急後重或癢或疼醫綱即郤門也在掌後橫紋中直上四寸一手有二穴一穴在筋內兩筋間即間使後一寸一穴在筋內與筋內之穴相併大成四關四穴即兩合谷兩太衝是也大成按關吳文炳作開奇效良方太衝作行間龍玄側腕交叉脈神應兩手側腕叉紫脈上大成按醫學綱目作在列缺上青脈中灸之主治下牙疳龍虎側腕紫脈中小學按醫經小學曰龍虎側腕紫脈中滿口牙疼灸七壯恐是龍玄然不可改暫記四縫四穴手四指內中節是穴用三稜針出血治小兒猢猻勞等證大成神授牙癰灸神授二七壯隨人大指上直去骨罅處起用患人手一跨癰疽神祕灸經手心犬癇之為病手足拳攣灸兩手心一壯千金灸黃手心中七壯千翼療卒死令人痛爪其人人中取醒不起者卷其手灸下紋頭隨年壯外臺交脈卒中風灸手交脈三壯左灸右右灸左其炷如鼠屎形橫安之兩頭下火千金短氣不得語灸小指第四指間交脈上七壯同上齒疼灸外踝上高骨前交脈上七壯千翼高骨掌後寸部前五分針一寸灸七壯治手病大成金門瘰癧之發於項後耳之間纍纍如貫珠者是也法當灸金門二壯掌後三寸半是穴外科大成劍巨馬刀之發在耳後侵入髮際微腫堅硬如石甚者引頂痛也當灸劍巨二七壯在掌後三寸外科大成肘尖忤注灸手肘尖隨年壯千翼治瘰癧左患灸右右患灸左如初生時男左女右灸風池入門肘骨尖上屈肘得之大成肘尖端處金鑑按千金腸癰篇曰屈兩肘正灸肘頭鋭骨各百壯下膿血即瘥千金翼曰灸手肘尖注曰一作紋外科大成曰取穴令患者端坐叉手平胸肘後突出尖骨是灼艾人須立於患人後因穴在後面內側小尖骨尖以指按之患處痠麻者是真穴此乃大肘尖之旁小肘尖仰手與小指對直者是也按此骨尖小指即麻為驗此穴與肩尖穴多不取不真惟此取法最確故重表而出之宜珍之勿忽今按恐是少海穴衝陽肘外屈橫紋外頭千翼按千金翼注曰是曲池穴衝陽在足趺上五寸外臺同外科全書曰足八邪足左右五指岐骨間各有四穴其衝陽穴亦可刺在足背對中指近曲處左右亦同蓋同名異穴也千金曰狂走刺人或欲自死罵詈不息稱神鬼語灸兩肘內屈中五壯又治五尸灸手肘紋隨年壯千金翼曰呀嗽灸兩屈肘里大橫紋下頭隨年壯又疔腫在左灸左臂曲肘紋前取病人三指外於臂上處中灸之兩筋間從不痛至痛腫在右從右灸不過三四日瘥此他散見諸篇主治部中詳之硯子骨豌豆瘡灸兩手腕硯子骨尖上三壯男左女右千金頭注曰硯明板作晛硯子骨未詳何處硯千金翼作研無異義天心乾八寸許祕旨按文不解所圖在勞宮內旁橫紋掌盡處橫紋掐至中指尖主吐祕旨按千金曰灸掌後橫紋後五指男左女右七壯即瘥已用得效疔腫灸法雖多然此一法甚驗出於意表也𦙀門大指節下五分治氣促氣攻𦙀門推向橫紋主吐橫門門疑是紋字推向𦙀門主瀉祕旨靠山大指下掌根盡處婉中能治瘧疾痰壅祕旨按婉當作腕千金翼曰轉筋在兩臂及胸中灸手掌白肉際七壯威靈虎口下兩旁岐有圓骨處遇卒死症揉掐即醒有聲則生無聲則死祕旨一扇門二扇門中指兩旁挾界下半寸是穴治熱不退汗不來掐此即汗如雨不宜太多祕旨精靈四指五指挾界下半寸治痰壅氣促氣攻祕旨二人上馬小指下里側對兌邊是穴治小便赤澀清補腎水祕旨按千金曰短氣不得語灸小指第四指間交脈上七壯外勞宮指下正對掌心是穴治糞白不變五穀不消肚腹泄瀉祕旨一窩風掌背根盡處婉中治肛痛極效急慢驚風又一窩風掐至中指尖主瀉祕旨按婉當作腕鬼城千金一名十宣良方邪病大喚罵詈走灸十指端去爪一分千金在手十指頭上去爪甲角一分每一指各一穴兩手共十穴故名十宣治乳蛾用三稜針出血則效良方按千金曰治卒忤死灸十指爪下各三壯蓋同處十宣大成良方等所説乃鬼城也今移入一名十指頭短氣不語灸手十指頭合十壯千金脾風占候聲不出或上下手當灸手十指頭同上按合外臺作各是也手足陽明千金手足十指頭手足陽明謂人四指凡小兒風病太動手足掣瘲者盡灸手足十指端又灸本節後千金按外臺引備急方云療卒死而張目反折者灸手足兩爪甲後各十四壯手大指節理灸黃法屈大指節理各七壯千翼按外臺引肘後云卒心腹煩滿灸兩手大拇指內邊爪後第一紋頭各一壯又千金曰脾風占候聲不出或上下手灸兩大指節上下各七壯又曰治目卒生翳灸大指節橫紋三壯左灸右右灸左資生曰小兒雀目夜不見物灸手大指甲後一寸內廉橫紋頭白肉際各一壯醫學綱目引摘玄曰喉痹頷腫如升水粒不下手大指背頭節三稜針刺之出血以上所説大抵似同處蓋取奇穴者無定論臨機應變其巧拙各分蓋古人之治理不必拘拘大拇指頭五尸灸兩手大拇指頭各七壯千金按千金又曰水通身腫灸兩手大指縫頭七壯八邪八穴大成一名八關醫綱在手五指岐骨間左右各四穴大成大都二穴在手大指次指虎口赤肉際握拳取之大成按良方曰治頭風牙疼類經曰治虛勞一法取手掌中大指根稍前肉魚間近內側大紋半指許外與手陽明合谷相對處按之極酸者是穴此穴同長強各灸七壯甚妙更按此穴與大指節理宜合考上都二穴在手食指中指本節岐骨間握拳取之大成中都二穴一名液門在手中指無名指本節岐骨間大成按少陽經液門同名下都一名中渚亦少陽經之穴名下都二穴在手無名指小指本節後岐骨間一名中渚也中渚之穴在液門下五分兩手八穴故名八邪大成良方曰以上三穴治手臂紅腫按醫學綱目引潔古曰眼痛睛欲出者須八關大刺十指出血即十指縫今移入八邪之一名五云抄又載八關即八邪刺瘧篇云諸瘧而千金作血脈不見刺十指間出千翼作見血血去必已千金引此文且曰先視身之赤如小豆者盡取之八邪八關之名古典不載大成所説主治同良方三門一名少骨手次指本節後內側陷中治蜂窩疽外科大成鬼眼四穴手大拇指去爪甲角如韭葉兩指並起用帛縛之當兩指岐縫中是穴又二穴在足大趾取穴亦如在手者治五疳等症當正發時灸之大效良方按醫燈續焰曰足大拇指離爪甲一韭葉許名鬼眼穴金鑑曰鬼眼在足兩大指內去爪甲如韭葉許此二説不説手鬼眼又有鬼哭穴其法亦同蓋奇穴隨意命名頗致紛煩鬼哭治鬼魅狐惑恍惚振禁以患人兩手大指相併縛定用艾炷於兩甲角及甲後肉四處騎縫著火灸之則患者哀告我自去為效入門按千金曰治卒中邪魅恍惚振禁灸鼻下人中及兩手足大指爪後甲本令艾丸半在爪上半在肉上七壯不止十四壯炷如雀屎大千金翼曰野千金無野字狐魅合手大指急縛大指灸合間二七壯當狐鳴而愈外臺引備急方曰卒死而口噤不開者縛兩手大拇指灸兩白肉中二十壯蓋皆同處資生引秦承祖而共無鬼哭之名手五册手髓孔足五册足髓孔灸手五册次灸手髓孔次灸手少陽次灸足五册次灸足髓孔千金偏風篇灸猥退風半身不隨法先灸天窗云云次手髓孔腕後尖骨頭宛宛中次手陽明大指奇後次腳五册屈兩腳膝腕紋次腳髓孔足外踝後一寸千翼癲狂二三十年者灸天窗云云次足五册同上按五册髓孔其法不詳未見他籍載之手太陽手小指端灸隨年壯治黃疽千金苦心下急熱痹小腸內熱小便赤黃刺手太陽治陽在手第二指本節後一寸動脈千翼鼻中擁塞針手太陽入三分在小指外側後一寸白肉際宛宛中同上按第二指者食指也凡手十指各有灸刺穴拳尖中魁大小骨空既舉之綱目曰主治困睡多無名指第二節尖灸一壯屈指取之千金曰一切病食疰灸手小指頭隨年壯男左女右又曰男㿗灸手季指端七壯病在右可灸左左者灸右之類不可枚舉凡無名稱者詳載於主治部中足趾亦同但如大拇指頭十指頭雖非穴名舉其一二使後學知每指有刺灸之穴而已奪命聚英一名惺惺入門一名蝦蟆醫綱手膊上側筋骨陷中聚英曲澤上一尺醫綱禁灸醫綱按聚英引劉宗厚曰暈針奪命穴救之男左女右取之不回卻再取右女亦然此穴正在手膊上側筋骨陷中蝦蟆兒上自肩至肘正在當中注曰劉氏止言奪命穴而不言何經何絡今按此穴分是肺大腸脈分而古亦無奪命穴醫學綱目曰在曲澤上一尺針入三分主治氣昏暈東醫寶鑑作目昏暈入門曰針暈者神氣虛也不可起針以針補之急用袖掩病人口鼻回氣內與熱湯飲之即蘇良久再針甚者針手膊上側筋骨陷中即蝦蟆肉上惺惺穴或三里即蘇若起針壞人綱目又曰直兩乳頭以篾量過當兩臑脈絡上灸之臑絡脈俗呼為蝦蟆穴也主治紫白癜風按奪命惺惺蝦蟆三名共是同穴今併名為一頃或傳小兒丹毒治法其法以口吮臑膊上久而滿口皆血甚良蓋是奪命穴也鸖頂膝蓋骨尖上灸七壯主治兩足癱瘓兩腿無力醫綱腳後跟白肉後際針灸隨便治馬黃黃疽寒暑諸毒等病千金按外臺引救急方曰霍亂轉筋灸足跟後黑白肉交際當中央千金曰腰痛灸腳跟上橫紋中白肉際十壯良漏陰女人漏下赤白四肢酸削灸漏陰三十壯穴在內踝下五分微動腳脈上千金按千金翼無腳字膝眼四穴千金一名膝目外臺一名鬼眼金鑑膝頭骨下兩旁陷者宛宛中是千金膝蓋下兩邊外臺膝前大全禁灸資生按大全作膝根誤金鑑曰膝蓋骨下胻骨上陷中千金八種灸法有膝眼穴曰腳氣初得腳弱使速灸之關儀女人陰中痛引心下及小腹咬痛腹中五寒灸關儀百壯穴在膝外邊上一寸宛宛中是千金按五寒恐有訛謬蓋五臟寒之言歟營池四穴一名陰陽女人漏下赤白灸營池四穴三十壯穴在內踝前後兩邊池中脈上千金按千金翼作池上脈陰陽女人漏下赤白泄注灸陰陽隨年壯三報穴在足拇趾下屈里表頭白肉際是千金橫紋兩旁乃陰陽二穴就橫紋上以兩大指中分望兩旁抹為分陰陽治肚腹膨脹泄瀉二便不通臟腑虛並治祕旨按千金翼同祕旨不言足大指者蓋遺脫也環谷靈樞按出於四時氣篇説見下風市兩髀外可平倚垂手直掩髀上當中指頭大筋上捻之自覺好肘後可令病人起正身平立垂兩臂直下舒十指掩著兩髀便點當手中央指頭髀大筋上是灸之百壯多亦任人輕者不可減百壯重者乃至一處五六百壯勿令頓灸三報之千金平立垂手當中指頭髀兩筋間是外臺膝上七寸外側兩筋間類經從環跳下行膝上外廉金鑑按四時氣篇曰徒㽷先取環谷下三寸以鈹針針之馬蒔曰按各經無環谷穴止足少陽膽經有環跳穴今曰三寸意者風市穴乎外臺曰黃帝三部針灸經無風市二穴此處恐是環跳風市疑其別名未詳所出本事方曰風市即中犢在髀骨外膝上五寸分肉間陷中並非千金曰尿床垂兩手兩髀上盡指頭上有陷處灸七壯是指風市膝下妊娠三月灸膝下一寸七壯千金轉筋脛骨痛不可忍灸膝下廉橫筋上三壯同上按千金翼作屈膝下廉膝外灸癧瘍法五月五日午時灸膝外屈腳當紋頭隨年壯兩處灸一時下火不得轉動千翼女膝一名丈母一名女須一名女壻癸辛雜識足跟後同上按周密癸辛雜識曰劉漢卿即中患牙槽風久之頷穿膿血淋漓醫皆不效在維陽有丘經歷益都人妙針法與漢卿針委中及女膝穴是夕膿血即止旬日後用此法頷骨蛻去別生新者其後又張師道亦患此證復用此法針之而愈殊不可曉丘嘗治消渴者以酒酵作湯飲之而愈皆出於意料之外委中穴在腿䐐中女膝穴在足後跟俗言丈母腹痛灸女壻腳後跟乃舛而至此亦女膝是也然灸經無此穴又云女須穴巨陽腰痛灸足巨陽七壯巨陽在外踝下千金足太陽一名鬼路胞衣不出刺足太陽入四分在外踝後一寸宛宛中千金身重腫坐不欲起風勞腳疼灸尺太陽五十壯針入三分補之千翼按巨陽太陽共是同義然不可合以為一並存以備後考千金曰狂癲鬼語灸足太陽四十壯千金翼曰足太陽名鬼路千金十三鬼穴鬼路注曰申脈足太陽蓋申脈歟千金翼尺字恐足之誤腎系消渴小便數陰市二處在膝上當伏兔上行三寸臨膝取之或三二列灸相去一寸名曰腎系者注曰黃帝經云伏兔下二寸千金華他療男子卒疝陰卵偏大取患人足大指去爪甲五分內側白肉際明堂按千金曰癰腫灸兩足大拇指奇中立瘥又老人小兒大便失禁灸兩腳大指去甲一寸三壯又灸大指奇間各三壯程敬通曰奇間當是岐間資生作岐是也千金又曰瘑瘡灸足大指奇間二七壯又大人小兒癰腫灸兩足大拇趾奇中立瘥仍隨病左右大抵似華他穴足大指節橫理千金按詳於大敦承命狂邪驚癇病灸承命三十壯千金按穴注詳於三陰交少陽維內踝後一寸動筋中是外臺按筋當作脈太陰蹺內踝下向宛宛中是外臺太陰內踝上一夫千金按此穴治㿗疝名太陰者一載中都一載三陰交又千金翼曰婦人逆産足出針足太陰入三分足入乃出針穴在內踝後白肉際陷骨宛宛中又外臺曰太陰二穴在內踝上八寸骨下陷中是指地機邪宜與三陰交條並考外臺又曰黃帝三部針灸經並銅人腧穴經並無少陰維太陰太陰蹺三穴名厥陰治卒㿗灸足厥陰在左灸右在右灸左三壯在足大趾本節間千金按是蓋指大敦穴也八風八穴大成一名八邪外科全書足五指岐骨間兩足共八穴故名八風按靈樞曰五指間各一凡八痏足亦如是乃是手八邪足八風之祖外科全書曰足八邪足左右五指岐骨間各有四穴其衝陽穴亦可刺在足背對中指近曲處左右亦同嘗考針經在足又名八風穴衝陽穴既見宜合考氣端千金八沖足十趾去指奇一分兩足凡八穴曹氏名曰八沖極下氣有效其足十趾端名曰氣端日灸三壯並大神要其八沖可日灸七壯氣下即止千金按外臺引蘇恭曰若腳十指痠疼悶漸入趺上者宜灸指頭正中甲肉際三炷即愈千金翼作足十指奇端去奇一分八會狂走易罵灸八會隨年壯穴在陽明下五分千金獨陰大成一名獨會小學足三指下橫紋灸外腎腫平小學足趾下橫紋中類經足第二指下大成按大全曰婦人産難不能分娩獨陰即至陰穴類經曰即至陰穴當是足小指也未詳孰是皆主治小腸疝氣心腹痛乾嘔吐女人經血不調死胎胞衣不下又醫學綱目有獨陰穴在足四指間灸三壯主治月經不調又醫經小學曰獨會在足二指下橫紋中間又治産難獨陰獨會蓋同穴也內踝尖足內踝骨尖大成按千金曰若筋急不能行者內踝筋急灸內踝上四十壯外踝筋急灸外踝上三十壯立愈又曰癥瘕灸內踝後宛宛中又諸惡漏中冷息肉灸足內踝上外踝尖卒淋灸外踝尖七壯千金重舌灸外踝上三壯同上外踝尖上三寸類經按內外踝上針灸多效千金外臺所載極多詳於主治部中而有言白肉際青脈上交脈又踝上容爪甲者幼幼新書曰臘釣不熱乳食尋常多睡眼不開灸足踝上四寸男內踝女外踝各三七壯綱目引東陽曰治久漏瘡足內踝上一寸灸三壯至六壯通理足小指上二寸主婦人崩中及經血過多針入二分灸二七壯寶鑑大趾甲下尸厥而死脈動如故刺大趾甲下內側去甲三分千金按千金又曰扁鵲云卒中惡風心悶煩毒欲死急灸足大趾下橫紋隨年壯立愈今按大趾甲下十三鬼穴中鬼壘也指隱白髖骨膝蓋上梁丘旁外開一寸類經委中上三寸髀樞中垂手取之大成梁丘兩旁各開一寸五分兩足共四穴大成按三説不同又小學有腕骨腕骨腕骨四穴梁丘旁各開寸半腿痛小學按與髖骨同處髖腕若有一誤跨骨即梁丘穴也大成維會足外踝上三寸此即玉泉穴也大成按楊繼洲曰此兩解不可俱屬經外奇穴並存以俟知者前承山小兒望後趺將此穴久掐久揉有效祕旨按無穴注而所圖在䯒前對承山處鞋帶穴小兒望後仰掐此祕旨按無穴注而所圖在跗上外臺引文仲曰療傳尸立腳於系鞋處橫紋以手四指於紋上量脛骨外逼脛當四指中節按之有小穴取一縷麻刮令薄以此麻緩繫上灸令麻縷斷男左女右患多滅鼠尾瘰癧穴法用草一莖男比左手女比右手中節橫紋攢量過四肢紋盡處比交折斷將至絲螺骨尖中比至腳後惣筋中是穴鼠尾左灸左右灸右俱有俱灸一年五壯年深多灸又曰二鼠尾在手臂上大肉處是穴瘡瘍經驗全書內崑崙治腳轉筋針內崑崙穴在內踝後陷中入六分氣至瀉之千翼按千金翼又曰少腹堅大如盤盂胸腹中脹滿飲食不消婦人癥聚瘦瘠灸內踝後宛宛中隨年壯上崑崙資生下崑崙上崑崙針五分下崑崙外踝下一寸大筋下資生引明堂按資生曰明堂有上崑崙又有下崑崙銅人只云崑崙而不載下崑崙豈銅人不全耶抑名不同未可知也但上經云內崑崙在外踝下一寸下經曰內崑崙在內踝後五分未知其孰是豫謂既云內崑崙則當在內踝後矣下經之穴為通上崑崙在外踝故也伏鬼腓腸鹿溪按上三穴千金驚癇篇足部十四處灸穴下載之未詳其處慈門千金按千金曰悲泣邪語鬼忙歌哭灸慈門三十壯千金翼曰狂邪鬼語灸慈門五十壯下滿千金筋極篇千翼轉筋條大幽千金風癇篇千金翼同胡脈千金翼雜療篇肋戶犬癇之為病手足拳攣灸兩手心一壯灸足太陽一壯灸肋戶一壯千金食門出外臺飲郤注按以上六穴無注解未詳其處曲尺小品方曰在一腳趺上脛之下接腕曲屈處對大指岐當踝前兩筋中央陷者中是也醫心方扁鵲十三鬼穴鬼宮鬼信鬼壘鬼心鬼路鬼枕鬼床鬼市鬼路鬼堂鬼藏鬼臣鬼封千金方曰凡百邪之病源起多塗其有種種形相示表癲邪之端而見其病或有默默而不聲或復多言而謾説或歌或哭或吟或笑或眠坐溝渠啖食糞穢或裸形露體或晝夜遊走或嗔罵無度或是蜚蠱精靈手亂目急如斯種類癲狂之人今針灸與方藥並主治之凡占風之家亦以風為鬼斷千翼凡下無十字扁鵲曰百邪所病者針有十三穴也凡針之體先從鬼宮起次針鬼信便至鬼壘又至鬼心未必須並針止五六穴即可知矣若是邪蠱之精便自言説論其由來往驗有實立得精靈未必須盡其命求去與之男從左起針女從右起針若數處不言便遍穴千翼作遍而無穴字針也依訣而行針灸等處並備主之千翼以下無五十字仍須依掌訣捻目治之萬不失一黃帝掌訣別是術家祕要縛鬼禁劫五嶽四瀆山精鬼魅並悉禁之有目在人兩手中十指節間第一針人中名鬼宮從左邊下針右邊出第二針手大指爪甲下名鬼信即少商入肉三分第三針足大趾爪甲下名鬼壘千翼有五指皆針四字即隱白入肉二分第四針掌後橫紋名鬼心入半寸注曰即太淵穴也千翼寸作解第五針外踝下白肉際足太陽名鬼路火針七鋥鋥三下注曰即申脈穴也第六針大椎上入髮際一寸名鬼枕即風府火針七鋥鋥三下第七針耳前髮際宛宛中千翼無上七字耳垂下五分名鬼床即頰車火針七鋥鋥三下第八針承漿名鬼市從左出右第九針手橫紋上三寸兩筋間名鬼路注曰即勞宮穴也千翼有此名間使四字第十針直鼻上入髮際一寸名鬼堂火針七鋥鋥三下注曰即上星穴也第十一針陰下縫灸三壯女人即玉門頭名鬼藏第十二針尺澤橫紋外頭千翼作橫紋中內外兩紋頭接白肉際名鬼臣火針七鋥鋥三下注曰此即曲池穴也第十三針舌頭一寸當舌中下縫刺貫出舌上名鬼封仍以一板橫口吻安針頭令舌不得動已前若是手足皆相對針兩穴若是孤穴即單針之按千金翼之文大同小異或語句上下而其意同者不注腳氣八處灸穴千金曰凡腳氣初得腳弱使速灸之並服竹瀝湯灸訖可服八風散無不瘥者惟急速治之若人但灸而不能服散服散而不灸如此者半瘥半死雖得瘥者或至一二年復更發動覺得便依此法速灸之及服散者治十十愈此病輕者登時雖不即惡治之不當根源不除久久期於殺人不可不精以為意初灸風市次灸伏兔千翼無灸字下同次灸犢鼻次灸膝兩眼千翼作膝目次灸三里次灸上廉次灸下廉次灸絶骨凡灸八處第一風市穴可令病人起正身平立垂兩臂千翼作手直下舒十指掩著兩髀便點當千翼無當字手中央千翼無央字指頭髀大筋上是千翼無是字灸之百壯多亦任人四字千翼作逐輕重灸之輕者不可減百壯重者乃至一處五六百壯勿令頓灸三報之佳第二千翼無勿以下十字伏兔穴令病人纍夫端坐以病人手夫掩橫千翼作橫掩膝上夫下旁與曲膝頭齊上旁側夫際當中央是灸百壯亦可五十壯第三犢鼻穴在膝頭蓋骨上際外骨邊骨邊千翼作角平處以手按之得節解則是一千翼有法字云在膝頭下近外三骨箕踵中動腳以手按之得窟解是灸之五十壯可至百壯第四膝眼千翼作目穴在膝頭骨下兩旁陷者宛宛中是千翼有灸百壯之三字第五三里穴在膝頭骨節下一夫附脛骨外是一千翼有法字云在膝頭骨節下三寸人長短大小當以病人手夫度取灸之百壯第六上廉穴在三里下一夫亦附脛骨外是灸之百壯第七下廉穴在上廉下一夫一云二字千翼作亦字附脛骨外是灸之百壯第八絶骨穴在腳外踝上一夫亦云四寸是千翼有灸百壯之三字凡此諸穴千翼無穴字灸不必一頓灸盡壯數可日日報灸之三日之中灸令盡壯數為佳凡病一腳則灸一腳病兩腳則灸兩腳凡腳弱病皆多皆多千翼作多著兩腳又一方云如覺腳惡千翼作異下同便灸三里及絶骨各一處兩腳惡者合四處千翼作穴灸之多少隨病輕重大要雖輕不可減百壯不瘥速以次灸之多多益佳按八穴皆冠第幾之二字為次千金翼無諸穴既有本條宜參考
