人中直唇取之甲乙陷中類經鼻柱下溝中央神應按聚英醫統大成作近鼻孔非是醫學綱目曰口含水突處七種類稿曰人居天地之中天氣通於鼻地氣通於口天食人以五氣鼻受之地食人以五味口受之此穴居中故云若曰人有九竅自人中而上皆雙自人中而下皆單故云此則可名為竅中又老子釋略曰鼻為天門口為地戶天地間人中是也兌端千金唇上端甲乙上唇中央尖尖上入門按甲乙兌端作壯骨字誤目録又作兌骨明堂作頤前下唇之下開口取之是承漿穴不可從大全曰唇珠上珠字無謂此強作歌括之弊也齦交素問唇內齒上齦縫中甲乙齦縫筋中資生按齒上類經作上齒千金外臺無中字金鑑大成齗作齦義同內經集注曰齦交穴一在唇內齒下齦縫中蓋上古以齦交有二督脈之齦交入上齒任脈之齦交入下齒也以上下之齦齒相交故名齦交未知據何書不可從盧復醫種子曰蜀僧慧融入淅遊會稽針佝僂人使之臥取齦交穴骨節漸伸尋愈此穴乃督之井也脊中骨節屬督脈所轄氣機一透骨自然伸似玄門轉河車法能開關交會可至長生況一伸骨節乎斯法書不從載慧融靜中悟出承漿甲乙一名天池甲乙一名鬼市千金一名懸漿資生一名垂漿聖濟頤前唇之下開口取之甲乙唇下宛宛中肘後下唇之下千金下唇稜下明堂陷中發揮面第二行直曲差下行凡八穴攢竹甲乙一名員在一名始光一名夜光一名明光甲乙一名元柱醫統眉頭又云眉本素問陷者中甲乙禁刺灸入門按員在資生作員柱寶鑑大成作圓柱在疑寫誤明光資生大成作光明始光聚英醫統吳文炳作始元睛明甲乙一名淚孔甲乙外臺作淚孔淚淚同字一名淚空聚英目內眥素問內眥外甲乙禁灸資生禁刺入門按千金作精明精睛音通類經曰內眥外一分宛宛中入門曰紅肉陷中並非也甲乙次注皆曰灸三壯醫統曰或問睛明迎香承泣絲竹空皆禁灸何也曰四穴近目目畏火故禁灸也以是推之則知睛明可灸王注誤矣而醫統穴下注灸三壯可謂矛盾迎香甲乙一名衝陽甲乙鼻空外廉素問禾窖上鼻下孔旁甲乙不宜灸外臺按孔外臺作乳字誤千金作和窖上一寸鼻孔旁誤入門吳文炳並大成作禾窖上一寸神應經作鼻孔旁五分皆非説見下禾窖甲乙一名䪼外臺一名長頻資生直鼻孔下俠溪水溝旁五分甲乙禁灸入門按窖明堂作聊蓋音相通䪼大成作顪長頻大全作長髎聚英作長頰又大全曰禾髎一名禾窖髎窖同字故不取俠字下溪字衍千金等無之是也宜削之禾窖在水溝旁五分迎香又在禾窖上鼻下孔旁則迎香逼鼻孔取之氣府論云鼻孔外廉此之謂也千金曰迎香在禾窖禾原作和字訛上一寸是入鼻孔神應資生發揮等迎香注曰鼻孔旁五分者誤矣經絡流注右左行左右行則歷水溝過鼻孔外廉而上可以證也資生曰銅人經禾髎二穴在鼻孔下挾水溝旁五分明堂下經作禾窖窖即髎也上經乃作和窖皆云在鼻孔下挾水溝旁五分則是一穴也而銅人手少陽穴復有和窖二穴在耳前兌發陷中其穴相去遠矣恐明堂上經誤寫禾字作和字也面第三行直目上臨泣下行凡十二穴陽白甲乙眉上一寸直瞳子甲乙按入門陽作楊字誤資生聖濟作直目瞳子承泣甲乙一名鼷穴一名面窖甲乙目下七分直目瞳子甲乙陷中資生正視取之金鑑禁灸甲乙灸三壯資生禁刺資生按鼷外臺作溪千金翼曰目下七分匡骨下外臺甄權曰眼下八分共非是金鑑曰目下胞四白甲乙目下一寸面頄骨顴空甲乙直瞳子發揮正視取之類經禁灸類經入門按頄顴頯䪼義未詳頄音逵玉篇面顴也廣韻頰間之骨集韻與頯同𧎅骨也顴音權廣韻䪼也集韻輔骨曰顴或作𧌴或作櫅與頄頯音別義同通作權頯音逵集韻面頯也説文權也集韻頰骨一曰厚也或作頄䪼音拙面秀骨博雅顴頄䪼也俱混為同義然一骨數字可疑因考頄是頰間骨之總名餘字是頄骨中之名何則䪼者漢高祖隆䪼龍顏史記作隆準準音拙集韻面顴也莊子顙頯然注高露發美之貌爾雅博而頯注中央廣兩頭鋭乃頄骨秀鋭高露者也高祖頄骨鼻旁高秀連頰骨故曰龍顏從出高出也由是觀之目下宛宛際才容一指乃一寸也其間七分而取承泣其餘三分到頄骨秀高處是顴也顴髎下注己曰兌骨可以見也面舊作向氣府論云面鼽骨空各一王冰曰謂四白穴也又下文顴髎注有面頄骨字內經本不分部故曰面甲乙經據內經遂用面字傳寫誤作向故今改之千金外臺等無面以下五字鼽字書不載蓋頄古字經脈篇云目黃口乾鼽衄又云淚出鼽衄從九者音裘説文病寒鼻窒也鼽鼽易混故記巨窖甲乙挾鼻孔旁八分直瞳子甲乙按巨千金翼資生作臣字誤聚英吳文炳醫統大成共曰平水溝非也大成引聚英曰巨髎一名巨窖今本不見大全亦為一名髎窖義同今不取地倉甲乙一名會維甲乙挾口旁四分如近下甲乙有脈微微動若久患風其脈亦有不動者本事按會外臺寶鑑作胃千金翼一説曰口角一韭葉近下動脈資生本事口下有吻字分下有外字發揮無如近下三字大迎素問一名髓孔甲乙在口下當兩肩素問曲頷前一寸三分骨陷者中動脈甲乙地倉下斜向後頷骨上增注按三分千金千金翼外臺資生聖濟大成作二分次注以下諸書皆同甲乙面第四行直本神下行凡六穴絲竹空甲乙一名巨窖甲乙一名目髎外臺眉後素問陷者中甲乙眉尾骨後入門動脈增注禁灸甲乙按目髎大全作月髎巨窖恐字誤入門脫空字瞳子髎甲乙一名太陽一名前關千金注一名後曲外臺目外去眥五分甲乙動脈增注禁針灸入門按資生曰前關目後半寸亦名太陽穴又曰銅人有上關下關各二穴素問亦同明堂上下經有上關而無下關惟上經有前關穴又不與下關穴同在上關之下恐別自是前關穴一名太陽穴理風赤眼頭痛目眩澀等疾所不可廢故附入於下關之後乃今據千金方前關太陽即瞳子髎一名也資生為別穴者誤顴髎甲乙一名兌骨甲乙鼽骨下素問面頄骨下廉陷者中甲乙兌骨端外臺禁針灸入門面第五行直頭維下行凡十二穴頷厭甲乙耳前角上素問曲周顳顬上廉甲乙頭維直下發際增注禁深刺次注按醫學綱目曰周當作角非曲周者自額角下耳前髮際其形曲周者顳顬上廉資生大全並言腦空上廉非也顳顬注家多誤為腦空蓋腦空一名顳顬遂以相混耳既有上廉等之語非穴名者可見也即俗所謂米嚼也自發中出顏面者顳顬上廉頷厭也中央懸顱也下廉懸釐也皆取之髮際故謂曲周千金傷寒篇曰顳顬穴在眉眼尾中間上下有來去絡脈是其非腦空者可見外臺作曲角次注醫統作曲角下資生聖濟發揮聚英吳文炳寶鑑作曲周下類經作耳前曲角入門作對耳額角外金鑑作兩太陽曲角上廉大成作曲周上愈精愈疑稱角者有二額髮際作角者一耳前髮際作角者一故內經頭維曰額角又頷厭懸釐曰耳前角又言曲周者額角下髮際曲周者是也言耳前角者髮際曲周而更出又作角者是也故內經有角上角下語腦空穴在腦骨之空處故曰腦空一名顳顬不與此顳顬同故讀古文者不可不知也諸家不知角義及腦空義妄意改易可不慎哉諸書謂曲周下者即就眉上髮際而言下懸顱懸釐謂曲周上者就耳前髮際斜向目外眥者而言上上下字不易解世人多疑之故一從甲乙經千金同曲角曲周者所謂小額也懸顱甲乙一名髓空素問直解耳前角下素問曲周顳顬中甲乙按骨空論云髓空在腦後五分與此不同素問直解又載一説曰腦後三分鋭骨之下是與骨空論髓空混今為一名髓空者未知其當否暫記以資博聞千金翼作顳顬上廉中外臺作曲角顳顬上廉次注作曲角上資生聖濟發揮寶鑑作曲周上聚英作顳顬中廉入門作斜上額角中醫統作曲角下顳顬上廉吳文炳頷厭懸顱二穴同注類經金鑑作耳前曲角上兩太陽之中大成作曲周下以上諸説要皆是大同小異而與頷厭混懸釐甲乙曲周顳顬下廉甲乙按千金翼釐作犛字誤外臺周作角次注醫統吳文炳作曲角上兩太陽下廉資生聖濟發揮聚英寶鑑大成作曲周上金鑑作耳前曲角上入門作從額斜上頭角下陷誤上關素問一名客主人素問一名客主一名容主大全一名太陽醫壘元戎耳前上廉起骨端開口有孔甲乙動脈宛宛中資生下關上隔一骨醫門摘要禁深刺甲乙按千金千金翼外臺次注無端字發揮類經聚英入門醫統吳文炳作起骨上廉大成作耳前骨上千金翼作聽會上一寸金鑑曰聽會上直行一寸並非也靈樞云刺上關者呿不能欠呿張口也欠張口而復合也是開口取穴也即甲乙所謂開口有孔之義也聖濟曰若刺深令人欠而不得呿是費解下關素問客主人下耳前裛脈下空下廉合口有孔張口即閉甲乙耳中有干䘓抵不可灸甲乙注曰䘓抵一作適之不可灸一作針久留針按靈樞云刺下關者欠不能呿是合口有孔也資生類經聚英入門醫統寶鑑無下空二字裛古文動字千金翼曰耳門下一寸宛宛中動脈際側臥開口取之非頰車甲乙一名機關一名鬼床千金一名曲牙類經耳下曲頰端陷者中開口有孔甲乙按氣府論云耳下牙車之後各一次注曰謂頰車二穴也類經吳文炳寶鑑大成作曲頰端近前聚英頰作頷金鑑作近前八分入門作耳下八分據千金及翼方卒中風口噤不開灸機關二穴穴在耳下八分小近前之説並似拘矣資生引千金曰一名機門門是關字之誤又千金翼曰耳下二韭葉宛宛中側臥張口取之不可從也又千金十三鬼穴耳前髮際宛宛中耳垂下五分名鬼床是指頰車千金翼無耳前髮際宛宛中之七字今移入一名耳前凡八穴耳門甲乙在耳前起肉當耳缺者甲乙陷中資生耳中有膿及底耳聤耳皆不灸外臺禁灸有病不過三壯甲乙按厥病篇云耳鳴取耳前動脈馬蒔曰即耳門也外臺作耳中缺者寶鑑從之醫統作當耳缺者缺中並非和髎千金鋭發下素問耳前橫動脈甲乙耳門前入門一云禁灸類經按甲乙和作禾入門同千金千金翼外臺以下諸書作和今從之三書並無橫字資生曰和髎二穴在耳前鋭發陷中明堂上經亦有和窖二穴窖即髎也在鼻孔下挾水溝旁五分即銅人之禾髎明堂下經之禾窖也或者明堂上經誤寫禾字作和字爾恐人以和髎和窖為一穴故備論之按一疑二之誤鋭發者所謂波以左賀利聽會甲乙一名聽呵資生一名後關一名聽呵大全耳前陷者中張口得之動脈應手甲乙耳微前明堂耳珠前入門按類經呵作河資生神應發揮類經聚英醫統寶鑑大成作上關下一寸非矣類經金鑑作去耳珠下亦非本事方曰側臥張口取之吳文炳曰一名多所聞耳中珠子如赤小豆是聽宮之注聚英醫統亦同蓋誤聽宮作聽會也千金翼舌病篇曰聽會在上關下一寸動脈宛宛中一名耳門亦誤聽宮甲乙一名多所聞素問一名窗籠靈樞在耳中珠子大明如赤小豆甲乙按氣血論耳中多所聞二穴根結篇少陽根於竅陰結窗籠窗籠者耳中也甲乙明字衍諸書皆無之是也入門作耳前珠子旁是耳門穴也今據內經甲乙經當在耳中珠子上項頸部第二凡十九穴骨度篇曰結喉以下至缺盆長四寸廉泉靈樞一名本池甲乙一名舌本資生頷下結喉上舌本下甲乙當頤直下骨後陷者中千金諸風篇結喉上中央類經按舌本大成作舌水大全作吉本氣府論曰喉中央二次注曰謂廉泉天突二穴也刺瘧篇曰舌下兩脈廉泉也是謂兩脈中央也千金並翼方聖濟發揮無舌本下之下字入門寶鑑下作間聚英醫統作頷下結喉上四寸此穴何須折量類經曰仰而取之説見下人迎素問一名天五會甲乙挾喉之動脈也又頸側在嬰筋之前靈樞頸大脈動應手挾結喉以候五臟氣甲乙不灸禁深刺甲乙按資生聖濟聚英醫統大全吳文炳寶鑑大成無天字千金翼作大筋脈次注發揮類經聚英入門醫統大成金鑑作結喉側一寸五分此依甲乙扶突注然頸側諸穴不須分寸但取筋之前後此古法也此穴挾結喉聖濟曰仰而取之不取水突甲乙一名水門甲乙頸大筋前直人迎下氣舍上甲乙人迎下氣舍上二穴之中入門按突甲乙作天字誤類經曰挾氣舍上內貼氣喉千金注曰曲頰下一寸近後並非氣舍甲乙頸直人迎下挾天突陷者中甲乙貼骨尖上有缺類經按類經作挾天突邊入門寶鑑作挾旁拘矣金鑑作結喉下一寸非扶突素問一名水穴外臺嬰筋之後靈樞人迎後一寸五分甲乙按一寸五分説見前與人迎隔一大筋是穴也千金作氣舍後一寸半發揮吳文炳寶鑑聚英從之大成作氣舍上並非千金翼外臺次注作曲頰下一寸人迎後拘矣次注曰仰而取之非是凡頸側諸穴仰則筋脈難摸索故正面而取之天鼎甲乙一名天頂大全缺盆上直扶突氣舍後一寸五分甲乙側頰入門按天突側皆言缺盆取其形狀故靈樞指天突言缺盆之中者可見焉直扶突絶句言此穴在扶突直下當氣舍後也扶突與人迎隔筋其直下就氣舍後取之次注作半寸蓋寸半之誤資生聖濟以下諸書作扶突後一寸拘矣千金作頸缺盆直扶突曲頰下一寸人迎後與扶突注混不可從明堂作天頂蓋音通人以為一名暫從之天窗素問一名窗籠甲乙挾扶突素問曲頰下扶突後動脈應手陷者中甲乙頸大筋前資生按窗資生作窗籠外臺作聾聚英大全作龍靈樞云窗籠者耳中也張介賓曰即聽宮與此不同入門曰完骨下發際上頸上大筋處誤也前大成作間又奇穴部有天窗與之不同天容靈樞耳下曲頰之後靈樞頰車後陷中入門按甲乙無下字千金外臺等皆作耳下千金翼無曲字天牖素問頸筋間缺盆上天容後天柱前完骨後髮際上甲乙禁灸資生醫統曰資生云宜灸一壯今本無此文禁刺入門按完骨後千金千金翼外臺以下諸書作完骨下不是氣府論云下完骨後各一次注曰天牖二穴可以見也靈樞任脈側七次動脈一次人迎足陽明也二次扶突手陽明也三次天窗手太陽也四次天容足少陽也五次天牖手少陽也六次天柱足太陽也七次風府督脈也發揮作天窗後窗容字相似故誤耳千金作髮際上一寸入門從之就髮際上求之於嬰筋頸筋間乃上兩筋合下發際也故不須折量分寸其言一寸者誤入門作耳下大筋外類經云上挾耳後一寸亦誤矣明堂云貌骨穴下發際宛宛中貌骨穴未詳恐完骨之誤缺盆素問一名天蓋甲乙肩上橫骨陷者中甲乙禁深刺甲乙按天聚英吳文炳作尺骨空論云失枕在肩上橫骨間次注曰謂缺盆穴也資生發揮聚英醫統吳文炳並作下非是入門寶鑑作前馬蒔注證發微作去中行寸半非矣
