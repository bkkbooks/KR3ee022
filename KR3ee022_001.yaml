body:
  text: 卷之一折量分寸法凡取腧穴折量分寸之法説者不一以其專主同身寸而不據靈樞骨度篇故多為參差夫腧穴所在即肌肉之分理節解骨縫陷罅處也故曰動脈應手或曰宛宛中或曰陷者中則索宛陷摸動脈以得腧穴不必用分寸者可知矣古人雖或言分寸亦大概言之不必拘拘也且夫同身寸者古書所無也又名同指寸始見孫真人之説以本人手指度本人之身體故曰同也非布醫師之手指於病者而度之之謂也王太僕注素問每穴曰同身寸之幾寸後人遂廢骨度篇而用同身寸明堂灸經引扁鵲載同身寸醫書動假扁鵲而為根蒂未詳其由來按寸字起於寸口從𦚠從一本取布指診脈之象是人身專以寸口為一寸又家語云布指知寸公羊傳云膚寸而合注曰側手為膚皆言布指為寸非度手指兩紋中間而為寸之謂也試度兩乳間為九寸半以指布之一指當一寸則布指之義不為強定腧穴之際至其無骨節縫會可以憑認者則據骨度分寸折量之而後肥瘦長短各得其所及病急卒以己手布病者身體肥瘦長短以意將息譬鳩尾至臍中布指容八指則一指當一寸四指為中脘三指為上脘容七指則一指弱為一寸庶乎其不差其他同身寸未必用焉頃三人相會一人長五尺六寸以曲尺度同身寸得七分半一人長五尺三寸而得八分一人長五尺而得七分半且目口取一寸或以兩乳八寸之法取脊脅類皆無稽之甚不可從焉崔知悌曰凡孔穴尺寸皆隨人形大小須男左女右量手中指一節兩紋中心為一寸孫真人曰凡孔穴皆逐人形大小取手中指第一節為一寸千金翼無一字一云三寸者盡一中指也此二説同義徐鳳曰大指與中指相屈如環取中指中節橫紋上下相去長短為一寸謂之同身寸法楊繼洲曰手中指第二節內廷橫紋頭相去為一寸取稻稈心量或用薄篾量皆易折而不伸縮為準用繩則伸縮不便故不準後人多從此説孫真人曰凡孔穴在身皆是臟腑榮衛血脈流通表裡往來各有所主臨時救難必在審詳人有老少體有長短膚有肥瘦皆須精思商量準而折之無得一概致有差失其尺寸之法依古者八寸為尺仍病者男左女右手中指上第一節為一寸亦有長短不定者即取手大拇指第一節橫度為一寸以意消息巧拙在人又曰以肌肉紋理節解縫會宛陷之中及以手按之病者快然如此仔細安詳用心者乃能得之耳此説為得吾門以此説為法世人偶誤讀橫度大拇指第一節紋度大拇指上下兩橫紋間為一寸者非孫氏之意也凡言橫者以人身直立言焉手指亦同太淵大陵曲澤等條下皆有橫紋語可見也千金方又曰以古尺比今尺得八分本邦曲尺與唐尺同則八分今曲尺八分也試宛轉隨指橫度橫紋得曲尺一寸橫度第一節則得八分此言指廣即布指之義也且千金不言橫紋乃橫度第一節耳肘後方曰以病人手橫掩下並四指名曰一夫夫家語作扶公羊作膚蓋以音同千金方曰凡量一夫法覆手並舒四指對度四指上中節橫過為一夫夫有兩種有三指為一夫者此腳弱灸以四指為一夫也亦依支法存舊法外臺祕要方曰謹按明堂制當以立為正取穴必須直立膝臏骨坐立便即移動不定故宜立取之其寸取病人中指上節為一寸若取尺寸有長短取穴必不著又按秦承祖華陀等取穴並云三指四指為準取三里穴四指指闊六分四六二十四隻闊二寸四分取穴如何得著黃帝為本諸説並不可信今按灸腳氣八種法之類三里上下廉從肘後方以下諸書多有一夫法處穴致參差故不取一夫之法也只記諸説備考案孫思邈取手大拇指第一節橫度為一寸量手中指而為一寸頭面部第一靈樞骨度篇曰人長七尺五寸頭之大骨圍二尺六寸發所覆者顱至項尺二寸發以下至頤長一尺角額角以下至柱骨天柱骨長一尺兩顴之間相去七寸耳前當耳門者廣一尺三寸耳後當完骨者廣九寸項發以下至背骨背甲乙作脊長二二甲乙作三寸半結喉以下至缺盆中長四寸缺盆中天突也按類經曰如髮際不明則取眉心直上後至大杼骨折一尺八寸此説拘拘有頭顱大而項縮者有項長顱小者或有眉上顏額廣者此類不少故就各部骨度置穴蓋髮際不明則使病者上視顏額皺紋不生處是髮際如後髮際以啞門定之如以理説之則其失天壤可不慎乎前髮際旁行凡七穴神庭甲乙一名髮際本事髮際直鼻甲乙禁刺甲乙按外臺祕要方本事方資生經聖濟總録並作入髮際五分諸書從之千金翼方載一説曰入髮際一分東醫寶鑑曰額前皆拘矣類經有發高者髮際是穴發低者加二三分之説凡髮際高低以意將息而得穴亦無用之辨也今從古説曲差甲乙一名鼻沖甲乙挾神庭兩旁各一寸五分在髮際正頭取之甲乙按差徐氏針灸大全作羌誤十四經發揮類經針灸聚英吳文炳針灸大成楊繼洲針灸大成作入髮際醫宗金鑑作髮際間非也東醫寶鑑作入前後際誤也此穴去神庭一寸半則難折量今以直睛明上為曲差直瞳子髎上為本神其間以直目瞳子上入髮際五分為臨泣不然先定額角自神庭至額角為四寸五分分置四穴大原先安醫門摘要曰神庭直鼻上入髮際五分則曲差亦入髮際五分無稽之説不可從本神甲乙曲差兩旁各一寸五分在髮際甲乙按此穴直絲竹空上髮際故甲乙經屬髮際旁行部千金方屬面部第四行至絲竹空瞳子髎可見甲乙千金載一説曰直耳上入髮際四分千金翼作二分諸書皆有此説不取外臺作上目直耳上入髮際四分東洋先生曰蓋上目是一曰之誤又醫學入門作臨泣外一寸半而臨泣直瞳子處曲差本神中間頭維甲乙額角髮際挾本神兩旁各一寸五分甲乙禁灸甲乙按氣府論云足陽明脈氣所發者額顱髮際旁各三王冰次注曰謂懸顱陽白頭維左右共六穴也資生神應經類經聚英吳文炳金鑑作入髮際非矣營沼長之針灸則曰入髮際一寸五分妄矣千金曰灸頭兩角兩角當回毛兩邊起骨是也蓋指此穴神應經曰取曲鬢一寸非也頭中行直鼻中入髮際一寸卻行至風府凡八穴上星甲乙一名鬼堂千金一名明堂資生一名神堂類經囟上直鼻中央入髮際一寸陷者中可容豆甲乙神庭後入髮際一寸聖濟不宜多灸外臺引甄權按入門大全作神庭上五分非矣先以旋毛與耳上定百會至神庭為五寸一寸上星一寸囟會囟會百會中間置前頂從百會至腦戶四寸五分水熱穴論曰頭上五行行五王冰注曰頭上五行者當中行謂上星囟會前頂百會後頂次兩旁謂五處承光通天絡卻玉枕又次兩旁謂臨泣目窗正營承靈腦空也按中行凡七穴行五則余強間腦戶二穴未聞古人論及之者暫俟知者千金作神庭上二寸資生經載明堂經所謂明堂即此穴今移入一名千金翼針灸篇曰卒癲灸督脈三十壯在直鼻人中上入髮際三報之未知何處囟會甲乙一名囟上一名鬼門千金一名囟門李時珍奇經八脈考一名頂門大成上星後一寸骨間陷者中甲乙禁刺入門寶鑑按入門後作上醫門摘要作一寸五分非矣千金翼曰邪病鬼癲囟上主之一名鬼門千金注曰囟會一名鬼門字書云囟古作囟又諸風篇曰神庭上二寸隔上星説分寸故不取千金翼作一寸誤前頂甲乙囟會後一寸五分骨間陷者中甲乙按明堂作百會前一寸類經亦載此説非矣入門後作上百會甲乙一名三陽五會甲乙一名鬼門一名泥丸宮本事一名巔上一名天滿類經一名三陽一名五會大成巔上素問前頂後一寸五分頂中央旋毛中陷可容指甲乙頭頂凹中肘後直兩耳尖發揮按頂中央之頂外臺作項字誤資生神應發揮類經聚英古今醫統容指作容豆無異義甲乙旋毛中三字以大概而言之肘後方作直鼻中入髮際五寸神應經作去前髮際五寸後髮際七寸是以骨度折量也然腦戶在枕骨上妄用折量多差謬三陽五會史記扁鵲傳正義曰三陽太陽少陽陽明五會百會胸會聽會氣會臑會也或以此説注之難經曰八會者何也然府會太倉臟會季脅筋會陽陵泉髓會絶骨血會膈俞骨會大杼脈會太淵氣會三焦外一筋直兩乳內也熱病在內者取其會之氣穴也滕萬卿注之曰按內經載熱病五十九刺法各處熱邪隨分取之由是立八會法以適簡約蓋此八會十三穴諸熱在內者各隨其部分而治之虢太子尸厥取外三陽五會者豈止百會一穴疑兼取此會之五處者可知矣然三陽五會之名出甲乙經又肘後方治尸厥方針百會針入三分補之外臺方治尸厥針百會通鑑唐高宗苦頭重不能視召侍醫秦鳴鶴診之刺百會腦戶二穴胡三省曰針灸經百會一名三陽五會腦戶一名合顱是為百會一名者尚矣孫真人曰腳氣舊法多灸百會風府五臟六腑俞募頃來灸者悉覺引氣向上慎不得灸以上大忌之後頂甲乙一名交沖甲乙百會後一寸五分枕骨上甲乙陷者中明堂按入門百會後之後作下明堂枕上有玉字非強間甲乙一名大羽甲乙後頂後一寸五分甲乙腦戶前一寸半千翼一曰禁灸類經按先取枕骨上定腦戶腦戶百會間置後頂強間千金翼曰大門腦後尖骨上一寸似指強間羽門字畫相近詳於奇穴部腦戶素問一名匝風作各切一名會額甲乙一名合顱外臺跳骨上強間後一寸五分甲乙不可灸令人喑甲乙刺頭中腦戶入腦立死素問灸五壯次注按跳骨空論曰脊骨上空在風府上王冰曰上謂腦戶穴跳當作枕諸書作枕是枕骨圍頭大骨也仰臥當枕者骨空論云頭橫骨為枕是也自後頂至此廣三寸凡言枕骨腦戶蓋在枕骨之鋭者上又云顱際鋭骨蓋指之也甲乙曰跳骨蓋以鋭骨為跳骨跳字似有其意也通鑑秦鳴鶴刺高宗胡三省曰針令人啞舊傳鳴鶴針微出血頭疼立止蓋此穴以禁針微出血也風府素問一名舌木甲乙一名鬼枕一名鬼穴千金一名曹溪本事髓空在腦後五分顱際鋭骨之下素問七次脈頸中央之脈督脈也名曰風府靈樞頂上入髮際一寸大筋內宛宛中疾言其肉立起言休其肉立下甲乙禁灸甲乙按骨空論云風府在上椎上椎者蓋天柱骨之第一節伏而不見者也宛宛舊作穴穴今訂之此穴直高骨下不拘折量故甲乙經不言腦戶下一寸古説可見也千金作頂後入髮際一寸去上骨一寸千金翼作啞門上一寸入門大全作腦戶下一寸半不取頭第二行直眉頭挾中行各一寸半卻行至玉枕凡十穴五處甲乙督脈旁去上星一寸五分甲乙曲差後一寸增注禁灸甲乙灸三壯外臺按入門五作巨字誤類經金鑑作曲差後五分非也第二行前從眉頭睛明後至天柱繫一線定之曲差至玉枕為六寸半布置諸穴承光甲乙五處後二寸甲乙外臺五處後一寸千金千翼次注五處後寸半資生聖濟禁灸甲乙按三説不知孰是姑從甲乙經入門作巨處後字誤通天甲乙一名天臼甲乙承光後一寸五分甲乙按臼外臺作白寶鑑作伯類經一説直百會旁一寸五分是以承光為五處後一寸五分故有此解絡卻甲乙一名強陽一名腦蓋甲乙通天後一寸三分甲乙禁刺入門按腦醫統作胸字誤外臺作反行在通天後反行無謂神應經云腦後髮際上兩旁起肉上各一寸三分腦後枕骨挾腦戶自發際上四寸半然玉枕挾腦戶蓋此説非也諸書作通天後一寸五分説見下玉枕甲乙絡卻後七分甲乙次注七分半千金千翼外臺挾腦戶旁一寸三分起肉枕骨入髮際三寸甲乙一云禁刺類經按資生經曰銅人云玉枕在絡卻後一寸半明堂上下經皆云七分半若以銅人為誤則足太陽穴亦同若以明堂為誤不應上下經皆誤也豫按素問注云玉枕在絡卻後七分則與明堂之七分半相去不遠矣固當從素問為準然而玉枕二穴既挾腦戶矣不