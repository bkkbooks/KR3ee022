body:
  text: 卷之四手部第八夫欲取手足經穴先以指按井穴經渠緩緩從指所之而上則筋肉自分到肘中大筋外尺澤之處乃為流注之溪谷內經所謂分肉之間溪谷之會以榮衛舍大氣者是也如絡穴別走他經者則須據其經考之骨度篇曰肩至肘長一尺七寸肘至腕長一尺二寸半腕至中指本節長四寸本節至其末長四寸半按正誤曰自大椎下脊中至肘尖為一尺七寸妄手太陰肺及臂凡十八穴少商靈樞一名鬼信千金手大指內側去端如韭葉素問為井靈樞爪甲上與肉交者同上禁灸聖濟資生按凡去爪甲如韭葉者去其爪甲所與肉交形似韭葉者也故古典言爪甲上與肉交者俗人不悟以為去爪甲容韭葉許誤矣何則甲後容韭葉則過第一節也妄哉折衷云甲乙少澤穴下曰在手小指端去爪甲一分據之則韭葉之分寸當為一分凡爪甲上謂甲後也手之上下指尖頭為下前後指尖頭為前手指之內外以伏掌言之外臺甄權曰大拇指甲外畔當角是以反掌言之與古說不合外恐寫訛聖濟曰唐刺史成君綽忽頷腫大如升喉中閉塞水粒不下三日甄權以三稜針刺之微出血立愈魚際素問手魚也為滎靈樞手大指本節後內側散脈中甲乙禁灸入門按魚者謂手魚腹也此穴世人多取掌後橫紋內側誤矣靈樞曰魚際者手魚也滑壽曰曰魚曰魚際云者謂掌骨之前大指本節之後其肥肉隆起處統謂之魚魚際則其間之穴名也又孫真人脈論曰從肘腕中橫紋至掌魚際後紋卻而十分之所謂魚際指魚腹赤白肉際也凡魚腹四邊皆可謂魚際也脈論所說者非穴名也折衷曰凡手足拇指之節數原與諸指不同故於諸指也第三節為本節也於拇指也第二節為本節也即入門所謂魚際在大指二節後內側散脈中是也獨張氏以為本穴在寸口之前魚之後以側腕高骨強為本節非也十四經鈔曰經曰入寸口上魚循魚際出大指之端是可見經脈流行之次序然滑氏取穴於魚腹下腕骨上故於本文上魚下為句學者其再詳之太淵素問一名鬼心千金魚後一寸陷者中也為腧靈樞掌後甲乙橫紋頭明堂按魚後魚腹後也魚際後有腕骨阻腕骨是即一寸弱故此穴取腕後也聚英曰一名太泉非是說見淵液大成作掌後內側橫紋頭非也十二原篇云陽中之少陰肺也其原出於太淵不與本輸篇合經渠靈樞寸口中也動而不居為經靈樞陷者中甲乙脈中聖濟禁灸甲乙按動而不居謂動脈也入門云寸口下近關上脈中非矣列缺靈樞一名童玄折衷引醫統今本不見腕上分間去腕寸半別走陽明也靈樞骨罅宛宛中外臺引甄權旁關骨上側增注為原千金按分間謂分肉間也寸半舊作半寸字倒錯也據甲乙訂之外臺甄權曰腕後臂側三寸交叉頭兩筋骨罅宛宛中三寸二字誤也資生作以手交叉頭指末神應經作手側腕上寸半以手交中指頭末兩筋兩骨罅中發揮從之而中指作頭指注曰當作食指折衷曰第二指為頭指即食指也又謂之鹽指發揮注曰頭指當作食指非也類經引滑氏作食指末聚英醫統吳文炳共引滑氏作頭食指末大成作食指盡處入門作鹽指寶鑑引資生作中指今試之不當寸半處不可從也此穴當陽明經之分甲乙曰太陰之絡是脫別走陽明之四字也外臺注曰謹按銅人針經甲乙經九墟經無五臟所過為原穴惟千金方外臺秘要方有之蓋是林億之注也乃今原穴皆記各穴下又抄十二原篇徵古時有原穴原穴見太淵下與千金不同孔最甲乙太陰之郄去腕七寸甲乙陷者宛宛中明堂按去腕千金千金翼外臺明堂等作腕上入門寶鑑作腕側上金鑑云上骨下骨間未知所指不可從甲乙有專金二七水之父母八字千金外臺共不載是五行家之文非皇甫氏之文注語誤入本文注云此處缺文非也尺澤素問一名鬼受千金一名鬼堂千翼肘中之動脈也為合靈樞肘中約上甲乙臂屈橫紋中兩筋骨罅陷者宛宛中外臺引甄權大筋外入門禁灸甄權按尺甲乙作天刊誤明堂作釋臂屈下有伸字聚英作屈肘吳文炳肘中作肘後約上謂橫紋約上也俠白甲乙天府下去肘五寸動脈中手太陰之別甲乙尺澤上五寸岡本按俠吳文炳作夾壽世保元曰先於兩乳頭上塗墨合兩手直伸夾之染墨處即是穴也恐有差不可從天府素問腋內動脈靈樞腋下三寸臂臑內廉動脈中甲乙舉臂取之聖濟禁灸甲乙按資生類經曰以鼻取之入門作舉手以鼻取之吳文炳金鑑作以鼻尖點墨共是捷法也欲據此法須急舉手緩則當俠白故不取捷法吳文炳並大成作肘腕上五寸非也手厥陰心主及臂凡十六穴中衝靈樞中指爪甲上與肉交者素問為井靈樞去爪甲如韭葉陷者中甲乙爪甲角次注內端大全按內經甲乙諸書無內外側字次注聚英言爪甲角亦無內外文大全言內端者原於邪客篇稻垣道恆筋骨銅人圖曰手厥陰中衝穴古來不辨中指之內外靈樞二篇曰勞宮掌中中指本節之內間也勞宮在內間則中衝亦當在中指內側也七十一篇曰心主之脈出於中指之端內屈循中指內廉以上留於掌中既曰端內曰內廉明是中指內側爪甲角按本腧篇曰心出於中衝手少陰也是厥陰而言少陰張介賓曰以心與心胞本同一臟其氣相通皆心所主又引邪客篇曰手少陰之脈獨無腧然而此篇既論井滎腧經合則不當為無腧之解也金匱真言論曰南風生於夏病在心俞在胸脅又論俞者可見也只與邪客篇異例也本腧一篇不及手厥陰乃知脫少陰一條傳寫誤以厥陰作少陰邪客篇明言心主之脈出於中指端內屈循中指內廉以上厥陰起中指者可知也又經筋篇曰手心主之筋起於中指手少陰之筋起於小指之內側此篇不曰脈而曰筋其所通亦不同張曰經脈營行表裡經筋出入臟腑然而終篇不論此事蓋臆說古人皆言內經不出於一時一人之手若靈樞無異論然間亦有可疑者焉至心與心主之兩脈多不吻合蓋以不出一口之論也勞宮靈樞一名五里甲乙一名鬼路千金一名掌中類經掌中中指本節之內間也為滎靈樞掌中央動脈中甲乙橫紋資生按掌中手掌中央也明堂經作手心中以無名指屈指頭著處是也發揮曰資生經云屈中指以今觀之莫若屈中指無名指兩者之間取之為允今按資生經曰屈無名指著處是與滑氏所引不同入門曰屈中指取之皆捷法也予試之間有不合者不可用也屈指使掌中凹直中指內間橫紋中陷者此穴也捷法不可悉廢亦不可深泥也十三鬼穴鬼路即勞宮也詳於間使大陵靈樞一名心主脈經一名鬼心大全掌後兩骨之間方下者也為腧靈樞手腕第一約理中當中指肘後按千金注以鬼心為太淵大全為大陵折衷引千金亦為大陵蓋以千金掌後橫紋名鬼心有兩說未知孰是姑存二說方下謂陷中也脈經曰心主在掌後橫理中肘後曰心主云云其紋以肘後為詳故系之本注又以心主為一名千金曰吐血嘔逆灸手心主五十壯千金翼云大陵是也甲乙千金翼外臺資生發揮作兩筋間陷者中千金作兩骨間次注作掌後骨兩筋間類經聚英醫統金鑑作掌後骨下橫紋中義同十二原篇曰陽中之太陽心也其原出於大陵是心包經而為心之原者說已見內關靈樞去腕二寸出於兩筋之間靈樞絡別走少陽甲乙與外關相對類經大陵後二寸入門為源千金按靈樞曰刺兩關者伸不能屈兩關者內關外關也謂伸肘而取之也千金注曰外臺作五寸今本作二寸間使靈樞一名鬼路千翼兩筋之間三寸之中也為經靈樞掌後三寸陷者中甲乙大陵後三寸入門按三寸之中言掌後三寸兩筋之中間也肘後作兩腕後兩字衍鬼路千金翼云從手橫紋上三寸兩筋間針度之名鬼路此名間使大全歌括類經併為一名千金十三鬼穴注為勞宮者恐非也千金風癲篇作腕後五寸臂上兩骨間千金翼諸風篇作二寸誤郄門甲乙手心主之郄去腕五寸甲乙掌後千金大陵後五寸入門按千金注曰外臺云去內關五寸今本無此語曲澤靈樞肘內廉下陷者之中也屈而得之為合靈樞大筋內側橫紋中動脈神應按屈者屈肘也甲乙作屈肘入門作肘腕內橫紋中央非也天泉甲乙一名天溫甲乙曲腋下去臂二寸舉臂取之甲乙按溫外臺資生類經聚英寶鑑吳文炳醫統大成並作濕千金無去臂二字是也類經作去肩臂不穩據去臂二字則當曲澤上二寸對腋處然前人共取之於臑內廉對腋處腋下二寸自曲澤隨分肉而上則至腋下退二寸此穴也千金並翼方外臺作舉腋取之無異義手少陰心及臂凡十八穴少衝甲乙一名經始甲乙手小指內廉之端去爪甲如韭葉手少陰脈之所出也為井甲乙爪甲角資生按凡手指言內外者以伏掌而取之故此穴取小指爪甲角對無名指處直少府後也靈樞缺少陰一條本輸篇曰心出於中衝手少陰也說既見少府甲乙小指本節後陷者中直勞宮為滎甲乙掌內大全按本千金作大在掌中小指次指間橫直勞宮今世人取掌外側者非也類經聚英大成作骨縫亦粗金鑑曰小指本節末外側非也神門甲乙一名兌沖一名中都甲乙一名銳中聚英掌後銳骨之端靈樞陷者中為俞甲乙當小指次注動應於手同上按甲乙經作兌骨千金外臺等同兌銳通凡稱兌骨皆言骨頭尖者也兌眥兌肉共同滑壽張介賓以兌骨為腕下踝骨後世諸人不曉遂以據之岡本氏和語抄辨之詳矣果滑張之說是乎素問曰顱際兌骨又曰肘外銳骨豈頭肘有踝骨邪類經曰足跗後圓骨曰踝手腕後圓骨亦名踝圓銳形異何其言之妄也腕骨注曰起骨下陽谷注曰銳骨下養老注曰踝骨上豈一踝骨而有三名乎說詳於後予故以自肘至腕一尺二寸半法定之先取掌後橫紋後一寸當小指間點之此為通里穴次取橫紋與通里之中央動脈中此掌後五分乃為陰郄穴則神門自在掌後尖骨端橫紋微後可見也後人泥滑張之說以心經取諸側腕故以神門為腕骨中側腕宛宛中誤矣繆刺篇云少陰銳骨之端次注曰謂神門穴也今取心經於掌內側小指無名指間直到肘外銳骨之內也掌後側腕為小腸經說見於後俗醫之取此四穴唯布四指以定之妄謬甚矣次注作掌後五分不取少陰郄甲乙掌後脈中去腕五分甲乙當小指無名指間增注按甲乙少陰上有手字外臺次注作少陰郄千金並翼方資生聖濟無少字後世皆同通里靈樞掌後一寸別走太陽靈樞陷者中明堂直陰郄後增注按里千金千金翼作理掌甲乙作腕經脈篇云去腕一寸半馬蒔曰半字衍觀下掌後一寸可見是也諸書共無半字類經作腕側非也說見下靈道甲乙掌後一寸五分為經甲乙按甲乙或曰一寸諸書皆載之掌後一寸此通里也千金不載或曰一說是也少海甲乙一名曲節甲乙肘內廉節後陷者中動脈應手為合甲乙與小腸經小海挾肘內大骨相對增注禁灸甄權按小海少海二穴唯隔一骨內外耳故諸醫聚訟紛紛小海注曰挾肘內大骨外廉少海注曰挾肘內大骨內側其義較然著明故增注曰與小腸經小海挾肘內大骨相對小腸經支正既取外廉則小海又在大骨外可知也故甲乙少海注云肘內廉節後可見已外臺所引甄權曰穴在臂側曲肘內橫紋頭屈手向頭而取是少海穴欲取此經仰手微屈腕又微屈肘內向自掌後神門穴就分肉緩緩到肘內過大骨又內側數寸留腋下中央聚毛里是極泉也取小腸經亦屈腕屈肘若前法自後溪緩緩隨外側到肘內挾大骨出外廉是小海穴也俱以分肉探之奚疑故取小海唯過肘內大骨取陷者中則不拘甄氏所謂橫紋頭自得之也千金翼銅人資生入門類經聚英醫統共從甄氏說如次注明堂資生發揮吳文炳聚英醫統並云肘內大骨外去肘端五分岡本氏以為小腸經小海穴注混於此是也青靈明堂肘上三寸伸肘舉臂取之明堂禁刺入門按甲乙千金外臺不載此穴近時針灸書皆有入門作青靈泉發揮無伸肘字吳文炳作伸臂舉臂折衷曰小海後三寸極泉甲乙腋下筋間動脈入胸中甲乙臂內聖濟按千金胸作骨字誤千金翼外臺吳文炳無中字入門醫統寶鑑中作處折衷曰腋下中央聚毛里是穴得之手陽明大腸及臂凡二十八穴商陽靈樞一名絕陽甲乙手大指次指爪甲上去端如韭葉素問為井靈樞內側甲乙爪甲角千金禁灸入門按大指次指類經金鑑作食指入門大全作鹽指無異義下同二間靈樞一名間谷甲乙本節之前二間為滎靈樞內側陷者中甲乙按本節之前謂大指次指本節之前受上文故略之也三間亦同聚英吳文炳作食指說見上三間靈樞一名少谷甲乙本節之後三間為腧靈樞內側陷者中甲乙按聖濟作內廉側千金翼瘧病篇曰虎口第二指節下一寸合谷靈樞一名虎口甲乙大指岐骨之間為原靈樞大指次指間甲乙大指虎口兩骨間陷者中千金妊娠不可刺聖濟按大指與次指岐骨也明堂作兩骨罅間宛宛中無異義千金翼曰虎口後縱紋頭立指取之宛宛中縱紋頭不及岐骨故不取此穴孕婦禁刺蓋徐文伯故事說見於三陰交陽谿靈樞一名中魁甲乙兩筋間陷者中也為經靈樞腕中上側甲乙張大指次指取之金鑑按筋甲乙作旁非也腕中腕骨之中也十四經鈔作關骨下非也資生曰辛師舊患傷寒方愈食青梅既而牙疼甚有道人為之灸屈手大指本節後陷中灸三壯初灸覺病牙癢再灸覺牙有聲三壯疼止今二十年矣恐陽谿也今按治齲齒痛者合谷有奇驗其以為陽谿非偏歷靈樞去腕三寸別入太陰靈樞陷者中明堂上側增注按去腕甲乙以下諸書作腕後義同別入甲乙作別走聖濟聚英發揮寶鑑作腕中後溫溜甲乙一名逆注一名蛇頭甲乙腕後六寸甲乙動脈中明堂從偏歷穴上行三寸金鑑按溜千金千金翼明堂寶鑑作留古通用入門作流資生吳文炳醫統大成蛇作池大全作地聚英作沱字誤甲乙載少士五寸大士六寸千金外臺以下諸書從之凡分寸據其人折量豈獨此穴以大士少士別之耶故不取明堂作五寸六寸間亦不取徐氏歌作腕後五寸非銅人並大原先安醫門摘要作小士六寸大士五寸錯置下廉甲乙輔骨下去上廉一寸與輔齊兌肉其分外邪甲乙曲池下四寸類經按入門大全作曲池前五寸並非也輔骨下輔骨之前也與舊作恐蓋字誤今改作與千金無與輔以下九字邪斜也其分分肉也外臺資生聖濟以下諸書並無與齊二字邪外臺類經入門作斜資生作針聚英吳文炳大成引銅人作斜針上廉甲乙三里下一寸其分抵陽明之會外斜甲乙曲池下三寸類經按陽明之會舊作陽之會外臺等有明字今補之資生作其分獨抵陽明之會外斜針聖濟醫綱無針字醫統無斜針二字千金無其分以下八字入門大全作曲池前四寸非也手三里甲乙曲池下二寸按之肉起兌肉之端甲乙按明堂聚英作三里一名手三里大成吳文炳從之非是資生神應入門大全作曲池下三寸是上廉穴不可從也今從甲乙取之銳肉端可也折衷曰一名鬼邪非鬼邪是足三里曲池靈樞一名鬼臣千金一名陽澤千翼肘外輔骨陷者中屈臂而得之為合靈樞肘骨中以手按胸取之甲乙屈肘兩骨之中次注臂相連處本事按千金翼小腸篇曰陽澤一名鬼臣今移入一名按胸次注資生以下諸書作拱胸千金曰肘後轉屈肋曲骨之中轉輔之誤肋肘之誤資生作屈肘曲中蓋脫字兩骨外臺聖濟明堂發揮作曲骨此穴應屈肘迫其兩骨屈曲間取之千金諸風篇作兩肘外曲頭世人多據明堂本事方入門等取橫紋頭者誤也本事方曰臂相連處以手拱胸取之紋盡處是穴肘窌甲乙一名肘尖外科樞要肘大骨外廉陷者中甲乙與天井相併相去一寸四分類經近大筋入門曲池外旁微後隔骨陷中增注五里靈樞一名尺之五里靈樞天府下五寸素問肘上三寸行向里大脈中央甲乙禁刺甲乙按向千金並翼方作馬誤脈入門作筋臂臑甲乙一名頭沖千金一名頸沖千翼肘上七寸䐃肉端甲乙肩髃下一夫兩筋兩骨罅陷宛中平手取之不得拿手令急其穴即閉資生禁刺資生按七寸舊作七分䐃舊作膕皆傳寫之誤今據千金外臺等訂之一夫銅人圖作三寸是也然不可輒改千金曰頭沖在伸兩手直向前令臂著頭對鼻所注處灸之各隨年壯千金翼云一名臂臑又按千金翼伸兩作兩伸注作立外臺作住此法恐致差謬故不取手少陽三焦及臂凡二十四穴關衝靈樞手小指次指之端也為井靈樞爪甲上去端如韭葉素問與肉交者靈樞爪甲角甲乙無名指甲後千翼禁灸甄權按入門小指次指作四指資生一云握拳取之繆刺論雲手中指次指爪甲上去端如韭葉王冰曰謂關衝穴新校正曰按甲乙經關衝穴出手小指次指之端今言中指者誤也液門靈樞小指次指之間也為滎靈樞陷者中甲乙本節前陷入門按液甲乙千金翼外臺作腋千金作掖今從靈樞資生一云握拳取之中渚靈樞本節之後陷者中也為腧靈樞握掌取之入門按本節之後謂小指次指間本節之後也受上文故不重言千金外臺作本節後間諸書從之千金翼作小指次指後本節後間蓋上後字衍聚英寶鑑吳文炳醫統大成作液門下一寸拘矣陽池靈樞一名別陽甲乙腕上陷者之中也為原靈樞手表上甲乙自本節後骨直對腕中類經斜近外踝處增注禁灸資生聖濟按腕上腕骨之上也手表上千金外臺無上字入門作手掌背橫紋陷中同義聚英吳文炳大成作從本節直摸下至腕中心非也素問云掌束骨下灸之王冰曰陽池穴也吳昆曰陰郄穴也醫學綱目曰未詳當否外關靈樞去腕二寸靈樞陷者中別走心主甲乙兩筋間類經與內關相對大成按心主舊作心今據諸書補之兩筋大成金鑑作兩骨聚英吳文炳作陽池上一寸大全作腕後一寸並非也支溝靈樞一名飛虎類經上腕三寸兩骨之間陷者中也為經靈樞臂外千金外關上增注按大全曰飛虎穴即童門穴也又云是支溝穴以手於虎口一飛中指書處是穴也童是章書是盡之誤而章門未聞名飛虎恐有誤脫入門曰陽池後三寸無異義會宗甲乙腕後三寸空中甲乙支溝外旁一寸入門支溝會宗止隔一條筋支溝上側會宗外側岡本一云禁刺類經按空中言骨上空資生聖濟發揮吳文炳大成作空中一寸誤矣程敬通曰支溝在腕後三寸兩骨陷中會宗亦在腕後三寸空中腕後空唯兩骨陷中耳別無有空也一云在腕後三寸空中一寸而三陽絡又在支溝上一寸會宗故未易取也俟高明者訂之金鑑曰以支溝會宗二穴相併平直空中相離一寸也拘矣三陽絡甲乙一名通間次注臂骨空在臂陽去踝四寸兩骨空之間素問臂上大交脈支溝上一寸甲乙陽池後四寸入門禁刺甲乙按絡千金作胳誤明堂作肘前五寸是四瀆穴也通間聚英醫統吳文炳大成作通門四瀆甲乙肘前五寸外廉陷者中甲乙三陽絡上三寸半增注按寶鑑作六寸非也天井靈樞肘外大骨之上陷者中也為合屈肘乃得之靈樞大骨之後兩筋間甲乙曲肘後一寸叉手按膝頭取之兩筋骨罅資生所引甄權按千金作肘後外大骨類經作大骨尖後聚英作輔骨上兩筋叉骨罅中屈肘拱胸取之清冷淵甲乙肘上二寸伸肘舉臂取之外臺資生肘上三寸千金千翼天井上行一寸金鑑按甲乙作肘上一寸是天井穴也一恐字誤故不取千金千金翼入門大全作三寸外臺資生發揮聖濟類經聚英寶鑑醫統吳文炳大成作二寸不知孰是姑從王氏淵千金作泉說既見消濼甲乙肩下臂外開腋斜肘分下行甲乙在分肉如蛇頭者岡本按濼大全作瀝注證發微作鑠醫學綱目作爍分謂分肉也下行舊作下胻字之誤注曰一本無胻字聚英醫統吳文炳大成無行字此穴在開腋斜則肘分肉下行者故今據千金外臺次注訂之開發揮類經聚英寶鑑作間誤手太陽小腸及臂凡十六穴少澤靈樞一名小吉甲乙小指之端也為井靈樞去爪甲一分陷者中甲乙外側千金去爪甲角如韭葉入門前谷靈樞一名手太陽千金手外廉本節前陷者中也為滎靈樞小指外側甲乙按本節謂手小指本節承上文也下同千金曰若心下急熱痹小腸內熱小便赤黃刺手太陽治陽手太陽在手小指外側本節陷中今為一名又見奇穴部後谿靈樞手外側本節之後也為腧靈樞陷者中甲乙腕前起骨下明堂橫紋尖上大全仰手握拳取之類經按溪明堂作溪握掌外側腕前本節之後橫紋尖是也腕骨靈樞手外側腕骨之前為原靈樞起骨下陷者中甲乙按腕骨者掌臂相交之處又單稱腕又稱腕中腕上者皆同義此穴在腕前而名腕骨者以近腕也猶鳩尾下五分名鳩尾橫骨上寸餘名橫骨也世人多取諸踝骨前誤也欲取此穴則先握掌向內以手小指外側本節後橫紋頭盡處取後谿隨骨而上行腕前有小起骨其前是腕骨穴也凡言上下者向肩為上向指頭為下故內經去腕作上腕又上廉穴近肘下廉穴近腕是上下之辨也凡言前後者向指頭為前向肩為後故謂掌後腕後也又前谷在本節前後谿在本節後是前後之義也俗醫解起骨為踝骨而不考上下前後字只就踝骨前上側取此穴所以誤也靈樞有外側字豈欺我哉入門作掌後外側高骨下不知而臆斷可笑也起骨聖濟作銳骨陽谷靈樞銳骨之下陷者中也為經靈樞手外側腕中甲乙按銳骨說已見握掌向內則踝骨前有尖骨是銳骨也銳骨前陷中不待摸索即當腕骨之中腕中二字可見也今人多就踝骨後上側取此穴此不知上下義何粗之甚甲乙有外側二字豈得取之上側乎大全作手外側骨踝下骨踝蓋錯置而以銳骨為踝骨不可從養老甲乙手太陽郄在手踝骨上一空腕後一寸陷者中甲乙按空謂骨上之孔故內經有骨空論其他如大迎骨空面頄空或四髎第一空第二空可以見也千金並翼方外臺作踝骨一空在後一寸在蓋腕字之誤發揮類經以下諸書與甲乙同資生作踝骨上空寸蓋脫字也明堂空作穴無害吳文炳醫統聚英大成作云字誤世人取此穴於踝上一寸不知千金外臺有誤字也一穴失其所三穴不得真故歷摸後谿腕骨陽谷直隨外側上行腕後一寸正當踝骨外側自有一空此養老穴也然後甲乙腕後一寸踝骨上一空九字可讀也聚英作踝骨前上杜撰甚矣內經曰手太陽經出踝中亦可徵焉後讀岡本氏所著盡與予說同支正靈樞上腕五寸內注少陰靈樞去養老穴四寸陷者中明堂外廉類經按甲乙上腕作肘後諸書從之資生少陰作少陽誤小海靈樞肘內大骨之外去端半寸陷者中也伸臂而得之為合靈樞禁灸甄權按經筋篇云手太陽筋起小指之上結於腕上循臂內結於肘內銳骨之後彈之應小指之上張介賓曰結於肘下銳骨之後小海之次但於肘尖下兩骨罅中以指捺其筋則痠麻應於小指之上是其驗也伸甲乙作屈去端作肘端外臺引甄權之說作屈手向頭而取之類經吳文炳大成從之明堂聚英醫統作少海誤
